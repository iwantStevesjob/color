<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Guitar Tuner">
    <title>Guitar Tuner PWA</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #03dac6;
            --in-tune: #00ff66;
            --warning: #ffcc00;
            --out-tune: #ff4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        canvas {
            width: 100%;
            height: 150px;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background-color: #333;
            color: white;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            background-color: #555;
        }

        #start-btn {
            background-color: var(--accent-color);
            color: #000;
        }

        #start-btn:active {
            background-color: #01a394;
        }

        .strings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .string-btn {
            padding: 12px 0;
            background-color: var(--panel-bg);
            border: 2px solid transparent;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .string-btn span {
            font-size: 11px;
            color: #aaa;
        }

        .string-btn.active {
            border-color: var(--accent-color);
            background-color: #2a2a2a;
        }
        
        .string-btn.auto-target {
            border-color: rgba(3, 218, 198, 0.4);
        }

        .display-panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .note {
            font-size: 64px;
            font-weight: bold;
            line-height: 1;
            margin: 0;
            transition: color 0.1s;
        }

        .metrics {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: #ccc;
        }

        .meter-container {
            width: 100%;
            padding: 20px 0;
            position: relative;
        }

        .meter-bar {
            width: 100%;
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, 
                var(--out-tune) 0%, 
                var(--warning) 30%, 
                var(--in-tune) 50%, 
                var(--warning) 70%, 
                var(--out-tune) 100%);
            position: relative;
        }

        .meter-center {
            position: absolute;
            left: 50%;
            top: -5px;
            bottom: -5px;
            width: 2px;
            background-color: rgba(255,255,255,0.5);
            transform: translateX(-50%);
        }

        .needle {
            position: absolute;
            top: -10px;
            left: 50%;
            width: 4px;
            height: 32px;
            background-color: white;
            border-radius: 2px;
            transform: translateX(-50%);
            transition: left 0.1s ease-out, background-color 0.1s;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .status {
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="visualizer" width="600" height="300"></canvas>
    
    <div class="controls">
        <button id="start-btn">Start Microphone</button>
        <button id="mode-btn">Mode: Auto</button>
    </div>

    <div class="strings-grid" id="strings-container">
        <!-- Buttons generated by JS -->
    </div>

    <div class="display-panel">
        <div class="note" id="note-display">--</div>
        <div class="metrics">
            <div id="freq-display">0.0 Hz</div>
            <div id="cents-display">0c</div>
        </div>
        
        <div class="meter-container">
            <div class="meter-bar">
                <div class="meter-center"></div>
                <div class="needle" id="meter-needle"></div>
            </div>
        </div>
        
        <div class="status" id="status-display">Waiting for microphone</div>
    </div>
</div>

<script>
// --- PWA Generation (Manifest & App Icon) ---
(function generatePWA() {
    const svgIcon = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="20" fill="#1e1e1e"/>
        <path d="M 35 25 Q 50 10 65 25 L 65 55 Q 50 85 35 55 Z" fill="none" stroke="#03dac6" stroke-width="6"/>
        <line x1="42" y1="20" x2="42" y2="70" stroke="#fff" stroke-width="3"/>
        <line x1="50" y1="15" x2="50" y2="75" stroke="#fff" stroke-width="3"/>
        <line x1="58" y1="20" x2="58" y2="70" stroke="#fff" stroke-width="3"/>
    </svg>`;
    
    const svgDataUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgIcon);

    const manifest = {
        name: "Guitar Tuner",
        short_name: "Tuner",
        start_url: "./",
        display: "standalone",
        background_color: "#121212",
        theme_color: "#121212",
        icons:[{ src: svgDataUrl, sizes: "any", type: "image/svg+xml" }]
    };

    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    const manifestUrl = URL.createObjectURL(manifestBlob);

    const linkManifest = document.createElement('link');
    linkManifest.rel = 'manifest';
    linkManifest.href = manifestUrl;
    document.head.appendChild(linkManifest);

    const linkIcon = document.createElement('link');
    linkIcon.rel = 'apple-touch-icon';
    linkIcon.href = svgDataUrl;
    document.head.appendChild(linkIcon);
})();

// --- App Logic & State ---
const strings =[
    { note: 'E2', freq: 82.41 },
    { note: 'A2', freq: 110.00 },
    { note: 'D3', freq: 146.83 },
    { note: 'G3', freq: 196.00 },
    { note: 'B3', freq: 246.94 },
    { note: 'E4', freq: 329.63 }
];

let isAutoMode = true;
let manualStringIndex = 0;
let audioCtx = null;
let analyser = null;
let timeData = null;
let freqData = null;
let isListening = false;
let smoothedPitch = 0;
let framesSinceValid = 0;

// UI Elements
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const modeBtn = document.getElementById('mode-btn');
const stringsContainer = document.getElementById('strings-container');
const noteDisplay = document.getElementById('note-display');
const freqDisplay = document.getElementById('freq-display');
const centsDisplay = document.getElementById('cents-display');
const meterNeedle = document.getElementById('meter-needle');
const statusDisplay = document.getElementById('status-display');

// Build String Buttons
strings.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'string-btn';
    btn.innerHTML = `${s.note}<br><span>${s.freq.toFixed(2)}Hz</span>`;
    btn.onclick = () => {
        isAutoMode = false;
        manualStringIndex = i;
        modeBtn.innerText = "Mode: Manual";
        updateButtonStyles();
    };
    stringsContainer.appendChild(btn);
});
const stringBtns = document.querySelectorAll('.string-btn');

function updateButtonStyles(autoTargetIndex = -1) {
    stringBtns.forEach((btn, i) => {
        btn.classList.remove('active', 'auto-target');
        if (!isAutoMode && i === manualStringIndex) {
            btn.classList.add('active');
        } else if (isAutoMode && i === autoTargetIndex) {
            btn.classList.add('auto-target');
        }
    });
}
updateButtonStyles();

// Mode Toggle
modeBtn.onclick = () => {
    isAutoMode = !isAutoMode;
    modeBtn.innerText = isAutoMode ? "Mode: Auto" : "Mode: Manual";
    updateButtonStyles();
};

// Start Microphone
startBtn.onclick = async () => {
    if (isListening) return;
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            }
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;

        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        timeData = new Float32Array(analyser.fftSize);
        freqData = new Uint8Array(analyser.frequencyBinCount);

        isListening = true;
        startBtn.style.display = 'none';
        statusDisplay.innerText = "Listening for a clear note";

        requestAnimationFrame(processAudio);
    } catch (err) {
        statusDisplay.innerText = "Microphone access denied or failed";
        statusDisplay.style.color = "var(--out-tune)";
    }
};

// Simple Autocorrelation algorithm
function autoCorrelate(buf, sampleRate) {
    let size = buf.length;
    let rms = 0;

    for (let i = 0; i < size; i++) {
        let val = buf[i];
        rms += val * val;
    }
    rms = Math.sqrt(rms / size);
    if (rms < 0.01) return -1; // Not enough signal

    let r1 = 0, r2 = size - 1, thres = 0.2;
    for (let i = 0; i < size / 2; i++) {
        if (Math.abs(buf[i]) < thres) { r1 = i; break; }
    }
    for (let i = 1; i < size / 2; i++) {
        if (Math.abs(buf[size - i]) < thres) { r2 = size - i; break; }
    }
    
    buf = buf.slice(r1, r2);
    size = buf.length;

    let c = new Float32Array(size);
    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size - i; j++) {
            c[i] += buf[j] * buf[j + i];
        }
    }

    let d = 0;
    while (c[d] > c[d + 1]) d++;
    let maxval = -1, maxpos = -1;
    for (let i = d; i < size; i++) {
        if (c[i] > maxval) {
            maxval = c[i];
            maxpos = i;
        }
    }
    let T0 = maxpos;

    // Parabolic interpolation for better precision
    let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
    let a = (x1 + x3 - 2 * x2) / 2;
    let b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);

    return sampleRate / T0;
}

// Main Processing Loop
function processAudio() {
    analyser.getFloatTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);

    drawVisualizer();

    const pitch = autoCorrelate(timeData, audioCtx.sampleRate);
    
    if (pitch >= 50 && pitch <= 400) {
        if (smoothedPitch === 0 || framesSinceValid > 30) {
            smoothedPitch = pitch;
        } else {
            // Smooth pitch
            smoothedPitch = smoothedPitch * 0.8 + pitch * 0.2;
        }
        framesSinceValid = 0;
        updateUI(smoothedPitch);
    } else {
        framesSinceValid++;
        if (framesSinceValid > 60) {
            smoothedPitch = 0;
            resetUI();
        }
    }

    requestAnimationFrame(processAudio);
}

function updateUI(freq) {
    let targetStringIndex = manualStringIndex;
    let targetString = strings[manualStringIndex];

    if (isAutoMode) {
        let minDiff = Infinity;
        for (let i = 0; i < strings.length; i++) {
            let diff = Math.abs(freq - strings[i].freq);
            if (diff < minDiff) {
                minDiff = diff;
                targetStringIndex = i;
                targetString = strings[i];
            }
        }
        updateButtonStyles(targetStringIndex);
    }

    // Calculate cents
    let cents = 1200 * Math.log2(freq / targetString.freq);
    
    // Update display text
    noteDisplay.innerText = targetString.note;
    freqDisplay.innerText = freq.toFixed(1) + " Hz";
    let displayCents = Math.round(cents);
    centsDisplay.innerText = (displayCents > 0 ? "+" : "") + displayCents + "c";

    // Update needle position (-50 to +50)
    let needlePos = Math.max(-50, Math.min(50, cents));
    meterNeedle.style.left = `calc(${needlePos + 50}%)`;

    // Status & Colors
    let absCents = Math.abs(cents);
    let color = "white";
    let statusText = "";

    if (absCents <= 6) {
        statusText = "In tune";
        color = "var(--in-tune)";
    } else if (absCents <= 16) {
        statusText = cents > 0 ? "Tune down" : "Tune up"; // Warning range
        color = "var(--warning)";
    } else {
        statusText = cents > 0 ? "Tune down" : "Tune up";
        color = "var(--out-tune)";
    }

    statusDisplay.innerText = statusText;
    statusDisplay.style.color = color;
    noteDisplay.style.color = color;
    meterNeedle.style.backgroundColor = color;
}

function resetUI() {
    noteDisplay.innerText = "--";
    noteDisplay.style.color = "white";
    freqDisplay.innerText = "0.0 Hz";
    centsDisplay.innerText = "0c";
    meterNeedle.style.left = "50%";
    meterNeedle.style.backgroundColor = "white";
    statusDisplay.innerText = "Listening for a clear note";
    statusDisplay.style.color = "var(--text-color)";
    if (isAutoMode) updateButtonStyles(-1);
}

function drawVisualizer() {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);

    // Draw Waveform (Top Half)
    ctx.beginPath();
    ctx.strokeStyle = '#03dac6';
    ctx.lineWidth = 3;
    const sliceWidth = w / timeData.length;
    let x = 0;
    for(let i = 0; i < timeData.length; i++) {
        const v = timeData[i]; 
        const y = (h / 4) + (v * h / 4);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceWidth;
    }
    ctx.stroke();

    // Draw Frequency Bars (Bottom Half)
    const barWidth = (w / freqData.length) * 2.5;
    let barX = 0;
    ctx.fillStyle = '#bb86fc';
    for(let i = 0; i < freqData.length; i++) {
        const barHeight = (freqData[i] / 255) * (h / 2);
        ctx.fillRect(barX, h - barHeight, barWidth - 1, barHeight);
        barX += barWidth;
        if (barX > w) break;
    }
}
</script>
</body>
</html>
