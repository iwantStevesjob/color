<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QWBP Serverless WebRTC</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>

  <style>
    :root {
      --bg: #0f172a;
      --text: #f8fafc;
      --accent: #38bdf8;
      --panel: #1e293b;
      --muted: #94a3b8;
      --danger: #ef4444;
      --ok: #22c55e;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.5;
    }

    h1 {
      font-size: 1.5rem;
      text-align: center;
      color: var(--accent);
      margin-bottom: 5px;
    }

    p.subtitle {
      text-align: center;
      opacity: 0.8;
      font-size: 0.9rem;
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--panel);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 1.1rem;
      margin-bottom: 15px;
    }

    #reader {
      width: 100%;
      max-width: 300px;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      border: none;
    }

    #reader img {
      display: none !important;
    }

    #qr-container {
      background: white;
      padding: 10px;
      border-radius: 8px;
      min-width: 240px;
      min-height: 240px;
      display: grid;
      place-items: center;
    }

    #qr-container img {
      display: block;
      margin: 0 auto;
    }

    .chat-box {
      grid-column: 1 / -1;
      background: var(--panel);
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
    }

    #messages {
      height: 180px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: var(--bg);
      color: white;
    }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #334155;
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      padding: 10px;
      border-radius: 6px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .meta span {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }

    .log-chat {
      color: var(--accent);
    }

    .log-sys {
      color: var(--muted);
    }

    .log-err {
      color: #fca5a5;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <h1>QWBP Protocol Demo</h1>
  <p class="subtitle">QR-WebRTC Bootstrap Protocol • No signaling server • STUN only for srflx discovery</p>

  <div class="status" id="status-display">Initializing...</div>

  <div class="meta">
    <span id="role-badge">Role: pending</span>
    <span id="local-fp">Local FP: pending</span>
    <span id="remote-fp">Remote FP: pending</span>
  </div>

  <div class="actions">
    <button class="secondary" id="reset-btn">Reset Session</button>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>1. Scan Peer</h2>
      <div id="reader"></div>
      <p id="scan-hint" style="font-size: 0.8rem; opacity: 0.8; margin-top:10px;">Point camera at the other device</p>
    </div>

    <div class="panel">
      <h2>2. Your QR Code</h2>
      <div id="qr-container"></div>
      <p id="qr-gathering-text" style="font-size: 0.8rem; opacity: 0.8;">Gathering network data...</p>
    </div>
  </div>

  <div class="chat-box">
    <h2>Encrypted DataChannel</h2>
    <div id="messages"></div>
    <div class="input-group">
      <input type="text" id="chat-input" placeholder="Type a message..." disabled />
      <button id="chat-btn" disabled>Send</button>
    </div>
  </div>

  <script>
    const msgs = document.getElementById('messages')
    const chatInput = document.getElementById('chat-input')
    const chatBtn = document.getElementById('chat-btn')
    const statusDisplay = document.getElementById('status-display')
    const qrGatheringText = document.getElementById('qr-gathering-text')
    const scanHint = document.getElementById('scan-hint')
    const roleBadge = document.getElementById('role-badge')
    const localFpBadge = document.getElementById('local-fp')
    const remoteFpBadge = document.getElementById('remote-fp')
    const resetBtn = document.getElementById('reset-btn')

    const state = {
      pc: null,
      channel: null,
      scanner: null,
      scannerRunning: false,
      scanLocked: false,
      localReady: false,
      remoteHandled: false,
      pendingRemote: null,
      qrText: null,
      local: {
        fingerprint: null,
        creds: null,
        candidates: [],
        sdpTemplate: ''
      }
    }

    function log(msg, kind = 'sys') {
      const line = document.createElement('div')
      line.className = kind === 'chat' ? 'log-chat' : kind === 'err' ? 'log-err' : 'log-sys'
      line.textContent = msg
      msgs.appendChild(line)
      msgs.scrollTop = msgs.scrollHeight
      if (kind !== 'chat') console.log(msg)
    }

    function updateStatus(text) {
      statusDisplay.textContent = text
    }

    function shortFingerprint(fpBytes) {
      if (!fpBytes || fpBytes.length !== 32) return 'pending'
      return Array.from(fpBytes.slice(0, 4)).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase()
    }

    function setRole(roleText) {
      roleBadge.textContent = `Role: ${roleText}`
    }

    function setFingerprints() {
      localFpBadge.textContent = `Local FP: ${shortFingerprint(state.local.fingerprint)}`
      remoteFpBadge.textContent = `Remote FP: ${state.pendingRemote ? shortFingerprint(state.pendingRemote.fingerprint) : 'pending'}`
    }

    function resetChatUi() {
      chatInput.disabled = true
      chatBtn.disabled = true
      chatInput.value = ''
    }

    function enableChatUi() {
      chatInput.disabled = false
      chatBtn.disabled = false
    }

    async function init() {
      resetChatUi()
      updateStatus('Starting camera and gathering ICE...')
      setRole('pending')
      setFingerprints()

      await Promise.allSettled([
        startScanner(),
        setupWebRTC()
      ])
    }

    async function resetSession() {
      try {
        if (state.scannerRunning && state.scanner) {
          await state.scanner.stop()
        }
      } catch (_) {}

      try {
        if (state.channel) state.channel.close()
      } catch (_) {}

      try {
        if (state.pc) state.pc.close()
      } catch (_) {}

      state.pc = null
      state.channel = null
      state.scanner = null
      state.scannerRunning = false
      state.scanLocked = false
      state.localReady = false
      state.remoteHandled = false
      state.pendingRemote = null
      state.qrText = null
      state.local = {
        fingerprint: null,
        creds: null,
        candidates: [],
        sdpTemplate: ''
      }

      document.getElementById('qr-container').innerHTML = ''
      qrGatheringText.classList.remove('hidden')
      scanHint.textContent = 'Point camera at the other device'
      msgs.innerHTML = ''
      resetChatUi()
      log('Session reset.')
      await init()
    }

    async function startScanner() {
      if (state.scannerRunning) return
      state.scanner = new Html5Qrcode('reader')

      try {
        await state.scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          async (decodedText) => {
            if (state.scanLocked || state.remoteHandled) return

            let parsed = null
            try {
              parsed = decodeQWBPPayload(base64ToBytes(decodedText))
            } catch (_) {
              return
            }

            if (!parsed) return

            state.scanLocked = true
            state.pendingRemote = parsed
            setFingerprints()

            updateStatus(state.localReady
              ? 'Peer QR scanned. Negotiating...'
              : 'Peer QR scanned. Finishing local ICE gathering...')

            await stopScanner('Scanner paused after valid QWBP scan.')

            if (state.localReady) {
              await handleRemoteQWBP(parsed)
            }
          },
          () => {}
        )

        state.scannerRunning = true
        scanHint.textContent = 'Point camera at the other device'
      } catch (err) {
        log(`Camera error: ${err}`, 'err')
        updateStatus('Camera failed or permission denied.')
      }
    }

    async function stopScanner(hintText) {
      if (!state.scanner || !state.scannerRunning) return
      try {
        await state.scanner.stop()
      } catch (_) {}
      state.scannerRunning = false
      scanHint.textContent = hintText
    }

    function createPeerConnection() {
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        bundlePolicy: 'max-bundle'
      })

      pc.oniceconnectionstatechange = () => {
        log(`ICE State: ${pc.iceConnectionState}`)
      }

      pc.onconnectionstatechange = () => {
        log(`WebRTC State: ${pc.connectionState}`)

        if (pc.connectionState === 'connected') {
          updateStatus('Connected. DataChannel is live.')
          setFingerprints()
          stopScanner('Scanner stopped.')
        } else if (pc.connectionState === 'failed') {
          updateStatus('Connection failed. Press Reset Session and rescan.')
          log('Peer connection failed.', 'err')
        }
      }

      return pc
    }

    function createNegotiatedDataChannel(pc) {
      const channel = pc.createDataChannel('qwbp-chat', {
        negotiated: true,
        id: 0,
        ordered: true
      })
      bindDataChannel(channel)
      return channel
    }

    function bindDataChannel(channel) {
      state.channel = channel

      channel.onopen = () => {
        enableChatUi()
        log('DataChannel open. You can now send messages.')
      }

      channel.onclose = () => {
        resetChatUi()
        log('DataChannel closed.')
      }

      channel.onerror = (e) => {
        log(`DataChannel error: ${e?.message || 'unknown'}`, 'err')
      }

      channel.onmessage = (e) => {
        log(`Peer: ${e.data}`, 'chat')
      }
    }

    async function setupWebRTC() {
      const pc = createPeerConnection()
      state.pc = pc
      createNegotiatedDataChannel(pc)

      const gatherDone = waitForIceGathering(pc, 4000)

      pc.addEventListener('icecandidate', (event) => {
        if (!event.candidate) return
        const parsed = parseCandidate(event.candidate.candidate)
        if (parsed) addCandidate(parsed)
      })

      let offer = await pc.createOffer()
      state.local.fingerprint = parseFingerprint(extractSdpValue(offer.sdp, 'a=fingerprint:sha-256 '))
      state.local.creds = await deriveIceCredentials(state.local.fingerprint)
      setFingerprints()

      offer.sdp = patchLocalIceCredentials(offer.sdp, state.local.creds)
      await pc.setLocalDescription(offer)

      await gatherDone

      state.local.sdpTemplate = pc.localDescription.sdp
      if (state.local.candidates.length === 0) {
        throw new Error('No usable ICE candidates gathered.')
      }

      const payload = encodeQWBPPayload(state.local.fingerprint, state.local.candidates)
      generateQR(payload)

      state.localReady = true
      updateStatus('Your QR is ready. Scan the other device now.')
      log(`Gathered ${state.local.candidates.length} candidates.`)

      if (state.pendingRemote && !state.remoteHandled) {
        await handleRemoteQWBP(state.pendingRemote)
      }
    }

    function waitForIceGathering(pc, timeoutMs) {
      return new Promise((resolve) => {
        let done = false

        function finish() {
          if (done) return
          done = true
          clearTimeout(timer)
          resolve()
        }

        const timer = setTimeout(() => {
          log('ICE gathering timeout reached; continuing with gathered candidates.')
          finish()
        }, timeoutMs)

        if (pc.iceGatheringState === 'complete') {
          finish()
          return
        }

        pc.addEventListener('icegatheringstatechange', () => {
          if (pc.iceGatheringState === 'complete') finish()
        })
      })
    }

    function addCandidate(candidate) {
      if (candidate.protocol !== 0) return
      if (candidate.type !== 0 && candidate.type !== 1) return

      const hostCount = state.local.candidates.filter(c => c.type === 0).length
      const srflxCount = state.local.candidates.filter(c => c.type === 1).length

      if (candidate.type === 0 && hostCount >= 3) return
      if (candidate.type === 1 && srflxCount >= 1) return

      const dup = state.local.candidates.some(c =>
        c.family === candidate.family &&
        c.protocol === candidate.protocol &&
        c.type === candidate.type &&
        c.port === candidate.port &&
        bytesEqual(c.ipBytes, candidate.ipBytes)
      )
      if (dup) return

      state.local.candidates.push(candidate)
      state.local.candidates.sort((a, b) => scoreCandidate(a) - scoreCandidate(b))
    }

    function scoreCandidate(c) {
      const typeScore = c.type === 0 ? 0 : 10
      const familyScore = c.family === 0 ? 0 : c.family === 2 ? 1 : 2
      return typeScore + familyScore
    }

    async function handleRemoteQWBP(remoteData) {
      if (state.remoteHandled) return
      state.remoteHandled = true
      state.pendingRemote = remoteData
      setFingerprints()

      log('Decoded peer payload. Deriving remote keys...')
      remoteData.creds = await deriveIceCredentials(remoteData.fingerprint)

      const role = compareFingerprints(state.local.fingerprint, remoteData.fingerprint)
      if (role === 0) {
        state.remoteHandled = false
        state.scanLocked = false
        setRole('self-scan')
        updateStatus('You scanned your own QR. Scan the other device.')
        log('Self-scan detected.', 'err')
        await startScanner()
        return
      }

      try {
        if (role > 0) {
          setRole('offerer')
          log('Assigned Role: OFFERER')
          const fakeAnswer = synthesizeSDP(state.local.sdpTemplate, remoteData, 'answer')
          await state.pc.setRemoteDescription({ type: 'answer', sdp: fakeAnswer })
        } else {
          setRole('answerer')
          log('Assigned Role: ANSWERER. Performing signaling rollback...')
          await state.pc.setLocalDescription({ type: 'rollback' })

          const fakeOffer = synthesizeSDP(state.local.sdpTemplate, remoteData, 'offer')
          await state.pc.setRemoteDescription({ type: 'offer', sdp: fakeOffer })

          let answer = await state.pc.createAnswer()
          answer.sdp = patchLocalIceCredentials(answer.sdp, state.local.creds)
          await state.pc.setLocalDescription(answer)
        }

        updateStatus('SDP negotiation complete. Awaiting ICE/DTLS connection...')
        log('SDP negotiation complete. Awaiting ICE connection...')
      } catch (e) {
        state.remoteHandled = false
        state.scanLocked = false
        updateStatus('Negotiation failed. Press Reset Session and try again.')
        log(`Connection Error: ${e.message}`, 'err')
        console.error(e)
      }
    }

    function generateQR(uint8Array) {
      const container = document.getElementById('qr-container')
      container.innerHTML = ''

      const b64 = bytesToBase64(uint8Array)
      state.qrText = b64

      new QRCode(container, {
        text: b64,
        width: 220,
        height: 220,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.L
      })

      qrGatheringText.classList.add('hidden')
    }

    function synthesizeSDP(baseSdp, remote, type) {
      let sdp = normalizeLineEndings(baseSdp)
      sdp = stripCandidateLines(sdp)
      sdp = replaceSdpLine(sdp, /^a=fingerprint:sha-256 .+$/m, `a=fingerprint:sha-256 ${formatFingerprint(remote.fingerprint)}`)
      sdp = replaceSdpLine(sdp, /^a=ice-ufrag:.+$/m, `a=ice-ufrag:${remote.creds.ufrag}`)
      sdp = replaceSdpLine(sdp, /^a=ice-pwd:.+$/m, `a=ice-pwd:${remote.creds.pwd}`)
      sdp = replaceSdpLine(sdp, /^a=setup:.+$/m, type === 'answer' ? 'a=setup:active' : 'a=setup:actpass')

      const candidateLines = remote.candidates.map((c, i) => buildCandidateLine(c, i)).join('')
      return `${sdp}${candidateLines}a=end-of-candidates\r\n`
    }

    function buildCandidateLine(candidate, index) {
      const foundation = index + 1
      const component = 1
      const protocol = candidate.protocol === 0 ? 'udp' : 'tcp'
      const priority = candidate.type === 0 ? 2122260223 : 1686052607
      const typ = candidate.type === 0 ? 'host' : 'srflx'
      let line = `a=candidate:${foundation} ${component} ${protocol} ${priority} ${candidate.ipStr} ${candidate.port} typ ${typ}`
      if (candidate.protocol === 1 && candidate.tcpTypeLabel) {
        line += ` tcptype ${candidate.tcpTypeLabel}`
      }
      return `${line}\r\n`
    }

    function stripCandidateLines(sdp) {
      return sdp
        .replace(/^a=candidate:.*$\r?\n?/gm, '')
        .replace(/^a=end-of-candidates.*$\r?\n?/gm, '')
        .replace(/^a=remote-candidates:.*$\r?\n?/gm, '')
    }

    function patchLocalIceCredentials(sdp, creds) {
      let out = normalizeLineEndings(sdp)
      out = replaceSdpLine(out, /^a=ice-ufrag:.+$/m, `a=ice-ufrag:${creds.ufrag}`)
      out = replaceSdpLine(out, /^a=ice-pwd:.+$/m, `a=ice-pwd:${creds.pwd}`)
      return out
    }

    function replaceSdpLine(sdp, regex, replacement) {
      if (regex.test(sdp)) return sdp.replace(regex, replacement)
      return `${sdp}${replacement}\r\n`
    }

    function normalizeLineEndings(sdp) {
      return sdp.replace(/\r?\n/g, '\r\n')
    }

    function encodeQWBPPayload(fingerprint, candidates) {
      let size = 1 + 1 + 32
      for (const c of candidates) size += c.family === 0 ? 7 : 19

      const buf = new Uint8Array(size)
      buf[0] = 0x51
      buf[1] = 0x00
      buf.set(fingerprint, 2)

      let offset = 34
      for (const c of candidates) {
        buf[offset++] = (c.family & 0x03) | ((c.protocol & 0x01) << 2) | ((c.type & 0x01) << 3)

        if (c.family === 0) {
          buf.set(c.ipBytes, offset)
          offset += 4
        } else {
          buf.set(c.ipBytes, offset)
          offset += 16
        }

        buf[offset++] = (c.port >> 8) & 0xff
        buf[offset++] = c.port & 0xff
      }

      return buf
    }

    function decodeQWBPPayload(buf) {
      if (!(buf instanceof Uint8Array)) return null
      if (buf.length < 41) return null
      if (buf[0] !== 0x51) return null

      const version = buf[1] & 0x07
      if (version !== 0) return null

      const fingerprint = buf.slice(2, 34)
      const candidates = []
      let offset = 34

      while (offset < buf.length) {
        const flags = buf[offset++]
        const family = flags & 0x03
        const protocol = (flags >> 2) & 0x01
        const type = (flags >> 3) & 0x01

        if (family > 2) return null
        if (protocol > 1) return null
        if (type > 1) return null

        const addrLen = family === 0 ? 4 : 16
        if (offset + addrLen + 2 > buf.length) return null

        const ipBytes = buf.slice(offset, offset + addrLen)
        offset += addrLen

        const port = (buf[offset] << 8) | buf[offset + 1]
        offset += 2

        let ipStr = ''
        if (family === 0) {
          ipStr = Array.from(ipBytes).join('.')
        } else if (family === 1) {
          ipStr = ipv6BytesToString(ipBytes)
        } else {
          ipStr = mdnsBytesToString(ipBytes)
        }

        candidates.push({
          family,
          protocol,
          type,
          ipBytes,
          ipStr,
          port
        })
      }

      if (candidates.length === 0 || candidates.length > 4) return null
      return { fingerprint, candidates }
    }

    async function deriveIceCredentials(fpBytes) {
      const keyMaterial = await crypto.subtle.importKey('raw', fpBytes, { name: 'HKDF' }, false, ['deriveBits'])
      const salt = new Uint8Array(0)
      const ufragInfo = new TextEncoder().encode('QWBP-ICE-UFRAG-v1')
      const pwdInfo = new TextEncoder().encode('QWBP-ICE-PWD-v1')

      const ufragBits = await crypto.subtle.deriveBits(
        { name: 'HKDF', hash: 'SHA-256', salt, info: ufragInfo },
        keyMaterial,
        4 * 8
      )

      const pwdBits = await crypto.subtle.deriveBits(
        { name: 'HKDF', hash: 'SHA-256', salt, info: pwdInfo },
        keyMaterial,
        18 * 8
      )

      return {
        ufrag: base64url(ufragBits),
        pwd: base64url(pwdBits)
      }
    }

    function parseCandidate(candidateString) {
      const parts = candidateString.trim().split(/\s+/)
      if (parts.length < 8) return null

      const protocolLabel = parts[2]?.toLowerCase()
      const ipStr = parts[4]
      const port = parseInt(parts[5], 10)
      const typIndex = parts.indexOf('typ')
      const typeLabel = typIndex >= 0 ? parts[typIndex + 1] : null
      const tcpTypeIndex = parts.indexOf('tcptype')
      const tcpTypeLabel = tcpTypeIndex >= 0 ? parts[tcpTypeIndex + 1] : null

      if (!Number.isFinite(port) || !typeLabel) return null
      if (protocolLabel !== 'udp') return null

      let family = 0
      let ipBytes = null

      if (ipStr.endsWith('.local')) {
        family = 2
        ipBytes = mdnsStringToBytes(ipStr)
      } else if (ipStr.includes(':')) {
        family = 1
        ipBytes = ipv6StringToBytes(ipStr)
      } else {
        family = 0
        ipBytes = ipv4StringToBytes(ipStr)
      }

      if (!ipBytes) return null

      let type = null
      if (typeLabel === 'host') type = 0
      if (typeLabel === 'srflx') type = 1
      if (type === null) return null

      return {
        family,
        protocol: 0,
        type,
        ipBytes,
        ipStr,
        port,
        tcpTypeLabel
      }
    }

    function extractSdpValue(sdp, prefix) {
      const line = normalizeLineEndings(sdp).split('\r\n').find(l => l.startsWith(prefix))
      return line ? line.slice(prefix.length) : ''
    }

    function parseFingerprint(fpStr) {
      return new Uint8Array(fpStr.split(':').map(h => parseInt(h, 16)))
    }

    function formatFingerprint(fpBytes) {
      return Array.from(fpBytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(':')
    }

    function compareFingerprints(a, b) {
      for (let i = 0; i < 32; i++) {
        if (a[i] !== b[i]) return a[i] > b[i] ? 1 : -1
      }
      return 0
    }

    function base64url(buf) {
      return bytesToBase64(new Uint8Array(buf))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '')
    }

    function bytesToBase64(bytes) {
      let binary = ''
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i])
      return btoa(binary)
    }

    function base64ToBytes(base64) {
      const binary = atob(base64)
      const out = new Uint8Array(binary.length)
      for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i)
      return out
    }

    function bytesEqual(a, b) {
      if (a.length !== b.length) return false
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false
      }
      return true
    }

    function ipv4StringToBytes(ip) {
      const parts = ip.split('.').map(n => Number(n))
      if (parts.length !== 4) return null
      if (parts.some(n => !Number.isInteger(n) || n < 0 || n > 255)) return null
      return new Uint8Array(parts)
    }

    function ipv6StringToBytes(ip) {
      const zoneIndex = ip.indexOf('%')
      if (zoneIndex !== -1) ip = ip.slice(0, zoneIndex)

      let left = []
      let right = []

      if (ip.includes('::')) {
        const parts = ip.split('::')
        left = parts[0] ? parts[0].split(':') : []
        right = parts[1] ? parts[1].split(':') : []
      } else {
        left = ip.split(':')
      }

      if (left.some(Boolean) === false && right.some(Boolean) === false) return null

      const total = left.length + right.length
      if (total > 8) return null

      const middle = new Array(8 - total).fill('0')
      const full = ip.includes('::') ? [...left, ...middle, ...right] : left
      if (full.length !== 8) return null

      const bytes = new Uint8Array(16)
      for (let i = 0; i < 8; i++) {
        const value = parseInt(full[i] || '0', 16)
        if (!Number.isFinite(value) || value < 0 || value > 0xffff) return null
        bytes[i * 2] = (value >> 8) & 0xff
        bytes[i * 2 + 1] = value & 0xff
      }

      return bytes
    }

    function ipv6BytesToString(bytes) {
      const parts = []
      for (let i = 0; i < 16; i += 2) {
        parts.push(((bytes[i] << 8) | bytes[i + 1]).toString(16))
      }
      return parts.join(':')
    }

    function mdnsStringToBytes(hostname) {
      const label = hostname.replace(/\.local$/i, '')
      const hex = label.replace(/-/g, '')
      if (!/^[a-fA-F0-9]{32}$/.test(hex)) return null

      const bytes = new Uint8Array(16)
      for (let i = 0; i < 16; i++) {
        bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16)
      }
      return bytes
    }

    function mdnsBytesToString(bytes) {
      const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('')
      return `${hex.slice(0, 8)}-${hex.slice(8, 12)}-${hex.slice(12, 16)}-${hex.slice(16, 20)}-${hex.slice(20)}.local`
    }

    function sendMessage() {
      const txt = chatInput.value.trim()
      if (!txt || !state.channel || state.channel.readyState !== 'open') return
      state.channel.send(txt)
      log(`You: ${txt}`, 'chat')
      chatInput.value = ''
    }

    chatBtn.onclick = sendMessage
    chatInput.onkeypress = (e) => {
      if (e.key === 'Enter') sendMessage()
    }
    resetBtn.onclick = resetSession

    init()
  </script>
</body>
