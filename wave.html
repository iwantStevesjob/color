<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
>
<title>PBF Reef Wave</title>

<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #8bc1d4;
    font-family: system-ui, sans-serif;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  #ui {
    position: fixed;
    z-index: 10;
    left: 12px;
    top: 12px;
    width: min(340px, calc(100vw - 24px));
    padding: 12px 14px;
    color: #eefcff;
    background: rgba(3, 18, 27, 0.84);
    border: 1px solid rgba(190, 235, 255, 0.2);
    border-radius: 13px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.3);
    user-select: none;
  }

  #ui h1 {
    margin: 0 0 4px;
    font-size: 16px;
  }

  #ui p {
    margin: 0 0 9px;
    color: #b7d3dc;
    font-size: 11px;
    line-height: 1.35;
  }

  .row {
    display: grid;
    grid-template-columns: 108px 1fr 44px;
    gap: 8px;
    align-items: center;
    margin: 6px 0;
    font-size: 11px;
  }

  input[type="range"] {
    width: 100%;
    accent-color: #20a8ca;
  }

  output {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .buttons {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-top: 9px;
  }

  button {
    border: 1px solid rgba(190, 235, 255, 0.24);
    border-radius: 8px;
    background: rgba(35, 126, 157, 0.25);
    color: #eefcff;
    padding: 7px 10px;
    font-size: 11px;
  }

  #stats {
    position: fixed;
    right: 10px;
    bottom: 8px;
    color: rgba(245, 255, 255, 0.75);
    font: 11px/1.35 monospace;
    text-align: right;
    pointer-events: none;
  }

  @media (max-width: 640px) {
    #ui {
      width: 290px;
      padding: 10px 11px;
    }

    #ui p {
      display: none;
    }

    .row {
      grid-template-columns: 90px 1fr 40px;
      margin: 5px 0;
    }
  }
</style>
</head>

<body>
<div id="ui">
  <h1>Position-Based Reef Wave</h1>

  <p>
    Actual particle fluid dynamics in a vertical slice,
    reconstructed as a 3D volume. No scripted barrel mesh.
  </p>

  <div class="row">
    <label for="amp">Piston stroke</label>
    <input
      id="amp"
      type="range"
      min="0.20"
      max="0.95"
      step="0.01"
      value="0.64"
    >
    <output id="ampOut">0.64</output>
  </div>

  <div class="row">
    <label for="period">Wave period</label>
    <input
      id="period"
      type="range"
      min="2.4"
      max="5.2"
      step="0.05"
      value="3.35"
    >
    <output id="periodOut">3.35</output>
  </div>

  <div class="row">
    <label for="reef">Reef height</label>
    <input
      id="reef"
      type="range"
      min="0.78"
      max="1.18"
      step="0.01"
      value="1.00"
    >
    <output id="reefOut">1.00</output>
  </div>

  <div class="row">
    <label for="iters">Solver iters</label>
    <input
      id="iters"
      type="range"
      min="2"
      max="6"
      step="1"
      value="4"
    >
    <output id="itersOut">4</output>
  </div>

  <div class="buttons">
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    <button id="side">Side view</button>
    <button id="angle">3D view</button>
    <button id="debug">Particles</button>
  </div>
</div>

<div id="stats"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { MarchingCubes } from "three/addons/objects/MarchingCubes.js";

const clamp = THREE.MathUtils.clamp;
const lerp = THREE.MathUtils.lerp;

const smoothstep = (a, b, value) => {
  const t = clamp((value - a) / (b - a), 0, 1);
  return t * t * (3 - 2 * t);
};

const smootherstep = (a, b, value) => {
  const t = clamp((value - a) / (b - a), 0, 1);
  return t * t * t * (t * (t * 6 - 15) + 10);
};

const params = {
  pistonAmplitude: 0.64,
  period: 3.35,
  reefHeight: 1,
  iterations: 4
};

/* =========================================================
   SIMULATION CONSTANTS
========================================================= */

const DOMAIN_X = 34;
const DOMAIN_Y = 14;
const RENDER_WIDTH = 7;
const WATER_LEVEL = 8;

const SPACING = 0.29;
const ROW_SPACING = SPACING * 0.8660254;
const PARTICLE_RADIUS = 0.125;

const H = 0.64;
const H2 = H * H;

const GRAVITY = -9.81;
const FIXED_DT = 1 / 120;
const MAX_SUBSTEPS = 2;

const MAX_SPEED = 18;
const VISCOSITY = 0.018;

const SCORR_K = 0.0018;
const SCORR_N = 4;
const MAX_CORRECTION = 0.09;

/*
  Two-dimensional Poly6 density kernel:

  W(r) = 4 / (π h^8) × (h² - r²)³
*/
const POLY6 = 4 / (Math.PI * Math.pow(H, 8));

/*
  Gradient magnitude for the two-dimensional Spiky kernel:

  |∇W| = 30 / (π h^5) × (h-r)²
*/
const SPIKY = 30 / (Math.PI * Math.pow(H, 5));

function poly6(r2) {
  if (r2 >= H2) {
    return 0;
  }

  const q = H2 - r2;

  return POLY6 * q * q * q;
}

const WQ = poly6(
  Math.pow(0.3 * H, 2)
);

/* =========================================================
   BATHYMETRY
========================================================= */

function bottomY(x) {
  /*
    Deep section, steep reef rise, shallow reef flat,
    then a beach that rises above the mean water level.
  */
  const reefRise =
    smootherstep(
      12.4,
      17,
      x
    );

  const reefTop =
    0.52 +
    4.15 *
    params.reefHeight *
    reefRise;

  const beach =
    smootherstep(
      26,
      33.8,
      x
    );

  return (
    reefTop +
    5.55 * beach
  );
}

function bottomSlope(x) {
  const epsilon = 0.025;

  return (
    bottomY(x + epsilon) -
    bottomY(x - epsilon)
  ) / (2 * epsilon);
}

/* =========================================================
   MOVING PISTON WAVEMAKER
========================================================= */

function pistonPosition(time) {
  return (
    0.78 +
    params.pistonAmplitude *
    Math.sin(
      Math.PI *
      2 *
      time /
      params.period
    )
  );
}

function pistonVelocity(time) {
  return (
    params.pistonAmplitude *
    (
      Math.PI *
      2 /
      params.period
    ) *
    Math.cos(
      Math.PI *
      2 *
      time /
      params.period
    )
  );
}

/* =========================================================
   THREE.JS SCENE
========================================================= */

const renderer =
  new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: "high-performance"
  });

renderer.setPixelRatio(
  Math.min(
    devicePixelRatio,
    1.5
  )
);

renderer.setSize(
  innerWidth,
  innerHeight
);

renderer.outputColorSpace =
  THREE.SRGBColorSpace;

renderer.toneMapping =
  THREE.ACESFilmicToneMapping;

renderer.toneMappingExposure = 1.08;

renderer.shadowMap.enabled = true;
renderer.shadowMap.type =
  THREE.PCFSoftShadowMap;

document.body.appendChild(
  renderer.domElement
);

const scene = new THREE.Scene();

scene.background =
  new THREE.Color(0x8bc1d4);

scene.fog =
  new THREE.Fog(
    0x8bc1d4,
    38,
    85
  );

const camera =
  new THREE.PerspectiveCamera(
    48,
    innerWidth / innerHeight,
    0.1,
    150
  );

camera.position.set(
  20,
  8.2,
  15.5
);

const controls =
  new OrbitControls(
    camera,
    renderer.domElement
  );

controls.target.set(
  19,
  5.1,
  0
);

controls.enableDamping = true;
controls.dampingFactor = 0.065;
controls.minDistance = 5;
controls.maxDistance = 65;
controls.maxPolarAngle =
  Math.PI * 0.49;

scene.add(
  new THREE.HemisphereLight(
    0xd8f2ff,
    0x385046,
    1.75
  )
);

const sun =
  new THREE.DirectionalLight(
    0xfff1d1,
    3.4
  );

sun.position.set(
  -22,
  34,
  16
);

sun.castShadow = true;

sun.shadow.mapSize.set(
  2048,
  2048
);

sun.shadow.camera.left = -38;
sun.shadow.camera.right = 38;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -20;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 90;

scene.add(sun);

/* =========================================================
   REEF RENDERING
========================================================= */

const REEF_X_SEG = 180;
const REEF_Z_SEG = 18;

const reefPositions = [];
const reefColors = [];
const reefIndices = [];

for (
  let zIndex = 0;
  zIndex <= REEF_Z_SEG;
  zIndex++
) {
  const z =
    lerp(
      -RENDER_WIDTH * 0.78,
      RENDER_WIDTH * 0.78,
      zIndex / REEF_Z_SEG
    );

  for (
    let xIndex = 0;
    xIndex <= REEF_X_SEG;
    xIndex++
  ) {
    const x =
      DOMAIN_X *
      xIndex /
      REEF_X_SEG;

    const roughness =
      0.055 *
      Math.sin(
        x * 1.8 +
        z * 1.1
      ) +
      0.028 *
      Math.sin(
        x * 4.2 -
        z * 2.3
      );

    const y =
      bottomY(x) +
      roughness;

    reefPositions.push(
      x,
      y,
      z
    );

    const wet =
      1 -
      smoothstep(
        WATER_LEVEL - 0.25,
        WATER_LEVEL + 0.2,
        y
      );

    const reefMix =
      smoothstep(
        1.2,
        4.8,
        y
      ) *
      wet;

    const color =
      new THREE.Color(0xb29b62);

    color.lerp(
      new THREE.Color(0x48543a),
      reefMix * 0.82
    );

    const shade =
      0.86 +
      0.14 *
      Math.sin(
        x * 0.61 +
        z * 0.8
      );

    reefColors.push(
      color.r * shade,
      color.g * shade,
      color.b * shade
    );
  }
}

for (
  let zIndex = 0;
  zIndex < REEF_Z_SEG;
  zIndex++
) {
  for (
    let xIndex = 0;
    xIndex < REEF_X_SEG;
    xIndex++
  ) {
    const a =
      zIndex *
      (REEF_X_SEG + 1) +
      xIndex;

    const b = a + 1;
    const c = a + REEF_X_SEG + 1;
    const d = c + 1;

    reefIndices.push(
      a, c, b,
      b, c, d
    );
  }
}

const reefGeometry =
  new THREE.BufferGeometry();

reefGeometry.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(
    reefPositions,
    3
  )
);

reefGeometry.setAttribute(
  "color",
  new THREE.Float32BufferAttribute(
    reefColors,
    3
  )
);

reefGeometry.setIndex(
  reefIndices
);

reefGeometry.computeVertexNormals();

const reefMaterial =
  new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 0.96,
    metalness: 0
  });

const reefMesh =
  new THREE.Mesh(
    reefGeometry,
    reefMaterial
  );

reefMesh.receiveShadow = true;

scene.add(reefMesh);

function updateReefGeometry() {
  const positions =
    reefGeometry
      .attributes
      .position
      .array;

  const colors =
    reefGeometry
      .attributes
      .color
      .array;

  let vertex = 0;

  for (
    let zIndex = 0;
    zIndex <= REEF_Z_SEG;
    zIndex++
  ) {
    const z =
      lerp(
        -RENDER_WIDTH * 0.78,
        RENDER_WIDTH * 0.78,
        zIndex / REEF_Z_SEG
      );

    for (
      let xIndex = 0;
      xIndex <= REEF_X_SEG;
      xIndex++,
      vertex++
    ) {
      const x =
        DOMAIN_X *
        xIndex /
        REEF_X_SEG;

      const roughness =
        0.055 *
        Math.sin(
          x * 1.8 +
          z * 1.1
        ) +
        0.028 *
        Math.sin(
          x * 4.2 -
          z * 2.3
        );

      const y =
        bottomY(x) +
        roughness;

      positions[
        vertex * 3 + 1
      ] = y;

      const wet =
        1 -
        smoothstep(
          WATER_LEVEL - 0.25,
          WATER_LEVEL + 0.2,
          y
        );

      const reefMix =
        smoothstep(
          1.2,
          4.8,
          y
        ) *
        wet;

      const color =
        new THREE.Color(0xb29b62);

      color.lerp(
        new THREE.Color(0x48543a),
        reefMix * 0.82
      );

      const shade =
        0.86 +
        0.14 *
        Math.sin(
          x * 0.61 +
          z * 0.8
        );

      colors[vertex * 3] =
        color.r * shade;

      colors[vertex * 3 + 1] =
        color.g * shade;

      colors[vertex * 3 + 2] =
        color.b * shade;
    }
  }

  reefGeometry
    .attributes
    .position
    .needsUpdate = true;

  reefGeometry
    .attributes
    .color
    .needsUpdate = true;

  reefGeometry.computeVertexNormals();

  reefGeometry
    .attributes
    .normal
    .needsUpdate = true;
}

/* =========================================================
   PISTON VISUALIZATION
========================================================= */

const pistonMesh =
  new THREE.Mesh(
    new THREE.BoxGeometry(
      0.18,
      WATER_LEVEL + 1.2,
      RENDER_WIDTH * 1.7
    ),
    new THREE.MeshStandardMaterial({
      color: 0x263b43,
      roughness: 0.8
    })
  );

pistonMesh.position.y =
  (WATER_LEVEL + 1.2) / 2;

pistonMesh.castShadow = true;

scene.add(pistonMesh);

/* =========================================================
   INITIAL FLUID PARTICLES
========================================================= */

function initialSurface(x) {
  const normalized =
    (x - 8.8) /
    2.15;

  /*
    An initial solitary pulse means the first breaker
    reaches the reef quickly. The piston then continues
    generating additional waves.
  */
  return (
    WATER_LEVEL +
    1.12 *
    Math.exp(
      -normalized *
      normalized
    )
  );
}

const initialParticles = [];

let latticeRow = 0;

for (
  let particleY = 0.4;
  particleY < WATER_LEVEL + 1.2;
  particleY += ROW_SPACING,
  latticeRow++
) {
  const shift =
    latticeRow & 1
      ? SPACING * 0.5
      : 0;

  for (
    let particleX = 1.45 + shift;
    particleX < DOMAIN_X - 0.25;
    particleX += SPACING
  ) {
    const floor =
      bottomY(particleX) +
      PARTICLE_RADIUS * 1.1;

    const surface =
      initialSurface(particleX) -
      PARTICLE_RADIUS;

    if (
      particleY > floor &&
      particleY < surface
    ) {
      const elevation =
        Math.max(
          0,
          initialSurface(particleX) -
          WATER_LEVEL
        );

      const depthFade =
        Math.exp(
          -(
            surface -
            particleY
          ) /
          4.5
        );

      const initialVelocityX =
        1.25 *
        (
          elevation /
          1.12
        ) *
        depthFade;

      const initialVelocityY =
        -0.18 *
        (
          (
            particleX -
            8.8
          ) /
          2.15
        ) *
        (
          elevation /
          1.12
        ) *
        depthFade;

      initialParticles.push(
        particleX,
        particleY,
        initialVelocityX,
        initialVelocityY
      );
    }
  }
}

const PARTICLE_COUNT =
  initialParticles.length /
  4;

const x =
  new Float32Array(
    PARTICLE_COUNT
  );

const y =
  new Float32Array(
    PARTICLE_COUNT
  );

const predictedX =
  new Float32Array(
    PARTICLE_COUNT
  );

const predictedY =
  new Float32Array(
    PARTICLE_COUNT
  );

const previousX =
  new Float32Array(
    PARTICLE_COUNT
  );

const previousY =
  new Float32Array(
    PARTICLE_COUNT
  );

const velocityX =
  new Float32Array(
    PARTICLE_COUNT
  );

const velocityY =
  new Float32Array(
    PARTICLE_COUNT
  );

const temporaryVelocityX =
  new Float32Array(
    PARTICLE_COUNT
  );

const temporaryVelocityY =
  new Float32Array(
    PARTICLE_COUNT
  );

const lambda =
  new Float32Array(
    PARTICLE_COUNT
  );

const correctionX =
  new Float32Array(
    PARTICLE_COUNT
  );

const correctionY =
  new Float32Array(
    PARTICLE_COUNT
  );

const neighborCount =
  new Uint16Array(
    PARTICLE_COUNT
  );

for (
  let i = 0;
  i < PARTICLE_COUNT;
  i++
) {
  x[i] =
    predictedX[i] =
    initialParticles[i * 4];

  y[i] =
    predictedY[i] =
    initialParticles[i * 4 + 1];

  velocityX[i] =
    initialParticles[i * 4 + 2];

  velocityY[i] =
    initialParticles[i * 4 + 3];
}

/* =========================================================
   SPATIAL HASH GRID
========================================================= */

const GRID_WIDTH =
  Math.ceil(
    DOMAIN_X /
    H
  ) +
  2;

const GRID_HEIGHT =
  Math.ceil(
    DOMAIN_Y /
    H
  ) +
  2;

const gridHead =
  new Int32Array(
    GRID_WIDTH *
    GRID_HEIGHT
  );

const gridNext =
  new Int32Array(
    PARTICLE_COUNT
  );

function gridX(value) {
  return clamp(
    Math.floor(
      value /
      H
    ),
    0,
    GRID_WIDTH - 1
  );
}

function gridY(value) {
  return clamp(
    Math.floor(
      value /
      H
    ),
    0,
    GRID_HEIGHT - 1
  );
}

function gridIndex(
  gridPositionX,
  gridPositionY
) {
  return (
    gridPositionX +
    gridPositionY *
    GRID_WIDTH
  );
}

function rebuildGrid(
  usePredicted = true
) {
  gridHead.fill(-1);

  const sourceX =
    usePredicted
      ? predictedX
      : x;

  const sourceY =
    usePredicted
      ? predictedY
      : y;

  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    const cell =
      gridIndex(
        gridX(sourceX[i]),
        gridY(sourceY[i])
      );

    gridNext[i] =
      gridHead[cell];

    gridHead[cell] = i;
  }
}

rebuildGrid(true);

/* =========================================================
   REFERENCE DENSITY

   Measure the kernel density in an undisturbed interior
   section of the initial particle lattice. This avoids
   hardcoding a density that does not match the spacing.
========================================================= */

let REST_DENSITY = 1;

{
  let densitySum = 0;
  let densitySamples = 0;

  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    if (
      x[i] < 3 ||
      x[i] > 11 ||
      y[i] > WATER_LEVEL - H ||
      y[i] - bottomY(x[i]) < H
    ) {
      continue;
    }

    let density = poly6(0);

    const centerX =
      gridX(x[i]);

    const centerY =
      gridY(y[i]);

    for (
      let cellOffsetY = -1;
      cellOffsetY <= 1;
      cellOffsetY++
    ) {
      for (
        let cellOffsetX = -1;
        cellOffsetX <= 1;
        cellOffsetX++
      ) {
        const neighborCellX =
          centerX +
          cellOffsetX;

        const neighborCellY =
          centerY +
          cellOffsetY;

        if (
          neighborCellX < 0 ||
          neighborCellX >= GRID_WIDTH ||
          neighborCellY < 0 ||
          neighborCellY >= GRID_HEIGHT
        ) {
          continue;
        }

        for (
          let j =
            gridHead[
              gridIndex(
                neighborCellX,
                neighborCellY
              )
            ];

          j !== -1;

          j = gridNext[j]
        ) {
          if (j === i) {
            continue;
          }

          const deltaX =
            x[i] -
            x[j];

          const deltaY =
            y[i] -
            y[j];

          density +=
            poly6(
              deltaX * deltaX +
              deltaY * deltaY
            );
        }
      }
    }

    densitySum += density;
    densitySamples++;
  }

  if (densitySamples > 0) {
    REST_DENSITY =
      densitySum /
      densitySamples;
  }
}

/* =========================================================
   SURFBOARD RIGID BODY
========================================================= */

const boardState = {
  x: 20,
  y: WATER_LEVEL + 0.28,
  angle: -0.06,
  velocityX: 0.35,
  velocityY: 0,
  angularVelocity: 0
};

const BOARD_LENGTH = 2.55;
const BOARD_HALF_LENGTH =
  BOARD_LENGTH * 0.5;

const BOARD_RADIUS = 0.16;
const BOARD_MASS = 2.1;

const BOARD_INERTIA =
  BOARD_MASS *
  BOARD_LENGTH *
  BOARD_LENGTH /
  12;

const board = new THREE.Group();

const boardGeometry =
  new THREE.CapsuleGeometry(
    0.31,
    1.95,
    2,
    8
  );

boardGeometry.rotateZ(
  Math.PI / 2
);

const boardBody =
  new THREE.Mesh(
    boardGeometry,
    new THREE.MeshStandardMaterial({
      color: 0xf05c34,
      roughness: 0.42,
      flatShading: true
    })
  );

boardBody.scale.set(
  1,
  0.18,
  1.25
);

boardBody.castShadow = true;

board.add(boardBody);

const boardStripe =
  new THREE.Mesh(
    new THREE.BoxGeometry(
      1.75,
      0.055,
      0.09
    ),
    new THREE.MeshStandardMaterial({
      color: 0xffe7a0,
      roughness: 0.5
    })
  );

boardStripe.position.y = 0.105;

board.add(boardStripe);
scene.add(board);

function resetBoard() {
  boardState.x = 20;
  boardState.y =
    WATER_LEVEL +
    0.34;

  boardState.angle = -0.06;
  boardState.velocityX = 0.35;
  boardState.velocityY = 0;
  boardState.angularVelocity = 0;
}

/* =========================================================
   PARTICLE / BOARD COLLISION
========================================================= */

function projectAgainstBoard(i) {
  const cosine =
    Math.cos(
      boardState.angle
    );

  const sine =
    Math.sin(
      boardState.angle
    );

  const relativeX =
    predictedX[i] -
    boardState.x;

  const relativeY =
    predictedY[i] -
    boardState.y;

  /*
    Transform the fluid particle into board-local space.
  */
  const localX =
    relativeX *
    cosine +
    relativeY *
    sine;

  const localY =
    -relativeX *
    sine +
    relativeY *
    cosine;

  const closestX =
    clamp(
      localX,
      -BOARD_HALF_LENGTH,
      BOARD_HALF_LENGTH
    );

  let deltaLocalX =
    localX -
    closestX;

  let deltaLocalY =
    localY;

  const minimumDistance =
    BOARD_RADIUS +
    PARTICLE_RADIUS;

  let distance =
    Math.hypot(
      deltaLocalX,
      deltaLocalY
    );

  if (
    distance <
    minimumDistance
  ) {
    if (distance < 0.000001) {
      deltaLocalX = 0;
      deltaLocalY = 1;
      distance = 1;
    }

    const penetration =
      minimumDistance -
      distance;

    const normalLocalX =
      deltaLocalX /
      distance;

    const normalLocalY =
      deltaLocalY /
      distance;

    const normalX =
      normalLocalX *
      cosine -
      normalLocalY *
      sine;

    const normalY =
      normalLocalX *
      sine +
      normalLocalY *
      cosine;

    predictedX[i] +=
      normalX *
      penetration;

    predictedY[i] +=
      normalY *
      penetration;
  }
}

/* =========================================================
   DOMAIN COLLISIONS
========================================================= */

function projectParticle(
  i,
  time
) {
  let particleX =
    predictedX[i];

  let particleY =
    predictedY[i];

  const leftWall =
    pistonPosition(time) +
    PARTICLE_RADIUS;

  if (particleX < leftWall) {
    particleX = leftWall;
  }

  if (
    particleX >
    DOMAIN_X -
    PARTICLE_RADIUS
  ) {
    particleX =
      DOMAIN_X -
      PARTICLE_RADIUS;
  }

  if (
    particleY >
    DOMAIN_Y -
    PARTICLE_RADIUS
  ) {
    particleY =
      DOMAIN_Y -
      PARTICLE_RADIUS;
  }

  if (
    particleY <
    PARTICLE_RADIUS
  ) {
    particleY =
      PARTICLE_RADIUS;
  }

  /*
    Approximate signed distance to y = bottomY(x).

    Surface normal:
      n = normalize(-bottomSlope, 1)
  */
  const slope =
    bottomSlope(
      particleX
    );

  const inverseNormalLength =
    1 /
    Math.sqrt(
      1 +
      slope * slope
    );

  const normalX =
    -slope *
    inverseNormalLength;

  const normalY =
    inverseNormalLength;

  const signedDistance =
    (
      particleY -
      bottomY(particleX)
    ) *
    inverseNormalLength;

  if (
    signedDistance <
    PARTICLE_RADIUS
  ) {
    const penetration =
      PARTICLE_RADIUS -
      signedDistance;

    particleX +=
      normalX *
      penetration;

    particleY +=
      normalY *
      penetration;
  }

  predictedX[i] = particleX;
  predictedY[i] = particleY;

  projectAgainstBoard(i);
}

/* =========================================================
   PBF DENSITY CONSTRAINT

   C_i = density_i / restDensity - 1

   lambda_i =
     -C_i /
     (
       sum_k |gradient C_i|² +
       epsilon
     )
========================================================= */

function computeLambdas() {
  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    const particleX =
      predictedX[i];

    const particleY =
      predictedY[i];

    const centerCellX =
      gridX(particleX);

    const centerCellY =
      gridY(particleY);

    let density =
      poly6(0);

    let gradientIX = 0;
    let gradientIY = 0;
    let gradientSquaredSum = 0;
    let neighbors = 0;

    for (
      let cellOffsetY = -1;
      cellOffsetY <= 1;
      cellOffsetY++
    ) {
      for (
        let cellOffsetX = -1;
        cellOffsetX <= 1;
        cellOffsetX++
      ) {
        const neighborCellX =
          centerCellX +
          cellOffsetX;

        const neighborCellY =
          centerCellY +
          cellOffsetY;

        if (
          neighborCellX < 0 ||
          neighborCellX >= GRID_WIDTH ||
          neighborCellY < 0 ||
          neighborCellY >= GRID_HEIGHT
        ) {
          continue;
        }

        for (
          let j =
            gridHead[
              gridIndex(
                neighborCellX,
                neighborCellY
              )
            ];

          j !== -1;

          j = gridNext[j]
        ) {
          if (j === i) {
            continue;
          }

          const deltaX =
            particleX -
            predictedX[j];

          const deltaY =
            particleY -
            predictedY[j];

          const distanceSquared =
            deltaX * deltaX +
            deltaY * deltaY;

          if (
            distanceSquared >= H2 ||
            distanceSquared <
            0.000000000001
          ) {
            continue;
          }

          density +=
            poly6(
              distanceSquared
            );

          const distance =
            Math.sqrt(
              distanceSquared
            );

          const gradientCoefficient =
            -SPIKY *
            (H - distance) *
            (H - distance) /
            distance;

          const gradientX =
            gradientCoefficient *
            deltaX /
            REST_DENSITY;

          const gradientY =
            gradientCoefficient *
            deltaY /
            REST_DENSITY;

          gradientIX +=
            gradientX;

          gradientIY +=
            gradientY;

          gradientSquaredSum +=
            gradientX *
            gradientX +
            gradientY *
            gradientY;

          neighbors++;
        }
      }
    }

    gradientSquaredSum +=
      gradientIX *
      gradientIX +
      gradientIY *
      gradientIY;

    let constraint =
      density /
      REST_DENSITY -
      1;

    /*
      Limit free-surface attraction caused by missing
      neighbors while still allowing surface cohesion.
    */
    constraint =
      Math.max(
        constraint,
        -0.055
      );

    lambda[i] =
      -constraint /
      (
        gradientSquaredSum +
        0.00001
      );

    neighborCount[i] =
      neighbors;
  }
}

/* =========================================================
   POSITION CORRECTION

   deltaPosition_i =
     1/restDensity *
     sum_j (
       lambda_i +
       lambda_j +
       artificialPressure
     ) *
     gradient W_ij
========================================================= */

function computeCorrections() {
  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    const particleX =
      predictedX[i];

    const particleY =
      predictedY[i];

    const centerCellX =
      gridX(particleX);

    const centerCellY =
      gridY(particleY);

    let totalCorrectionX = 0;
    let totalCorrectionY = 0;

    for (
      let cellOffsetY = -1;
      cellOffsetY <= 1;
      cellOffsetY++
    ) {
      for (
        let cellOffsetX = -1;
        cellOffsetX <= 1;
        cellOffsetX++
      ) {
        const neighborCellX =
          centerCellX +
          cellOffsetX;

        const neighborCellY =
          centerCellY +
          cellOffsetY;

        if (
          neighborCellX < 0 ||
          neighborCellX >= GRID_WIDTH ||
          neighborCellY < 0 ||
          neighborCellY >= GRID_HEIGHT
        ) {
          continue;
        }

        for (
          let j =
            gridHead[
              gridIndex(
                neighborCellX,
                neighborCellY
              )
            ];

          j !== -1;

          j = gridNext[j]
        ) {
          if (j === i) {
            continue;
          }

          const deltaX =
            particleX -
            predictedX[j];

          const deltaY =
            particleY -
            predictedY[j];

          const distanceSquared =
            deltaX * deltaX +
            deltaY * deltaY;

          if (
            distanceSquared >= H2 ||
            distanceSquared <
            0.000000000001
          ) {
            continue;
          }

          const distance =
            Math.sqrt(
              distanceSquared
            );

          const gradientCoefficient =
            -SPIKY *
            (H - distance) *
            (H - distance) /
            distance;

          const kernelValue =
            poly6(
              distanceSquared
            );

          const artificialPressure =
            -SCORR_K *
            Math.pow(
              kernelValue /
              WQ,
              SCORR_N
            );

          const correctionScale =
            lambda[i] +
            lambda[j] +
            artificialPressure;

          totalCorrectionX +=
            correctionScale *
            gradientCoefficient *
            deltaX;

          totalCorrectionY +=
            correctionScale *
            gradientCoefficient *
            deltaY;
        }
      }
    }

    totalCorrectionX /=
      REST_DENSITY;

    totalCorrectionY /=
      REST_DENSITY;

    const correctionMagnitude =
      Math.hypot(
        totalCorrectionX,
        totalCorrectionY
      );

    if (
      correctionMagnitude >
      MAX_CORRECTION
    ) {
      const scale =
        MAX_CORRECTION /
        correctionMagnitude;

      totalCorrectionX *= scale;
      totalCorrectionY *= scale;
    }

    correctionX[i] =
      totalCorrectionX;

    correctionY[i] =
      totalCorrectionY;
  }
}

/* =========================================================
   XSPH VISCOSITY
========================================================= */

function applyViscosity() {
  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    const particleX =
      predictedX[i];

    const particleY =
      predictedY[i];

    const centerCellX =
      gridX(particleX);

    const centerCellY =
      gridY(particleY);

    let velocityDifferenceX = 0;
    let velocityDifferenceY = 0;

    for (
      let cellOffsetY = -1;
      cellOffsetY <= 1;
      cellOffsetY++
    ) {
      for (
        let cellOffsetX = -1;
        cellOffsetX <= 1;
        cellOffsetX++
      ) {
        const neighborCellX =
          centerCellX +
          cellOffsetX;

        const neighborCellY =
          centerCellY +
          cellOffsetY;

        if (
          neighborCellX < 0 ||
          neighborCellX >= GRID_WIDTH ||
          neighborCellY < 0 ||
          neighborCellY >= GRID_HEIGHT
        ) {
          continue;
        }

        for (
          let j =
            gridHead[
              gridIndex(
                neighborCellX,
                neighborCellY
              )
            ];

          j !== -1;

          j = gridNext[j]
        ) {
          if (j === i) {
            continue;
          }

          const deltaX =
            particleX -
            predictedX[j];

          const deltaY =
            particleY -
            predictedY[j];

          const distanceSquared =
            deltaX * deltaX +
            deltaY * deltaY;

          if (
            distanceSquared >=
            H2
          ) {
            continue;
          }

          const weight =
            poly6(
              distanceSquared
            ) /
            REST_DENSITY;

          velocityDifferenceX +=
            (
              velocityX[j] -
              velocityX[i]
            ) *
            weight;

          velocityDifferenceY +=
            (
              velocityY[j] -
              velocityY[i]
            ) *
            weight;
        }
      }
    }

    temporaryVelocityX[i] =
      velocityX[i] +
      VISCOSITY *
      velocityDifferenceX;

    temporaryVelocityY[i] =
      velocityY[i] +
      VISCOSITY *
      velocityDifferenceY;
  }

  velocityX.set(
    temporaryVelocityX
  );

  velocityY.set(
    temporaryVelocityY
  );
}

/* =========================================================
   FLUID QUERIES FOR BOARD DYNAMICS
========================================================= */

function surfaceHeightAt(sampleX) {
  const firstGridX =
    gridX(
      sampleX -
      0.42
    );

  const lastGridX =
    gridX(
      sampleX +
      0.42
    );

  let highest = -1000000000;

  for (
    let cellX = firstGridX;
    cellX <= lastGridX;
    cellX++
  ) {
    for (
      let cellY = 0;
      cellY < GRID_HEIGHT;
      cellY++
    ) {
      for (
        let j =
          gridHead[
            gridIndex(
              cellX,
              cellY
            )
          ];

        j !== -1;

        j = gridNext[j]
      ) {
        if (
          Math.abs(
            predictedX[j] -
            sampleX
          ) <
          0.42 &&
          neighborCount[j] >= 5 &&
          predictedY[j] > highest
        ) {
          highest =
            predictedY[j];
        }
      }
    }
  }

  return highest > -100000000
    ? highest
    : WATER_LEVEL;
}

function fluidVelocityAt(
  sampleX,
  sampleY,
  radius = 0.9
) {
  const centerCellX =
    gridX(sampleX);

  const centerCellY =
    gridY(sampleY);

  const cellRadius =
    Math.ceil(
      radius /
      H
    );

  let averageX = 0;
  let averageY = 0;
  let weightSum = 0;

  for (
    let cellOffsetY = -cellRadius;
    cellOffsetY <= cellRadius;
    cellOffsetY++
  ) {
    for (
      let cellOffsetX = -cellRadius;
      cellOffsetX <= cellRadius;
      cellOffsetX++
    ) {
      const neighborCellX =
        centerCellX +
        cellOffsetX;

      const neighborCellY =
        centerCellY +
        cellOffsetY;

      if (
        neighborCellX < 0 ||
        neighborCellX >= GRID_WIDTH ||
        neighborCellY < 0 ||
        neighborCellY >= GRID_HEIGHT
      ) {
        continue;
      }

      for (
        let j =
          gridHead[
            gridIndex(
              neighborCellX,
              neighborCellY
            )
          ];

        j !== -1;

        j = gridNext[j]
      ) {
        const deltaX =
          predictedX[j] -
          sampleX;

        const deltaY =
          predictedY[j] -
          sampleY;

        const distanceSquared =
          deltaX * deltaX +
          deltaY * deltaY;

        if (
          distanceSquared >=
          radius * radius
        ) {
          continue;
        }

        const weight =
          1 -
          distanceSquared /
          (
            radius *
            radius
          );

        averageX +=
          velocityX[j] *
          weight;

        averageY +=
          velocityY[j] *
          weight;

        weightSum += weight;
      }
    }
  }

  if (weightSum <= 0.00001) {
    return [0, 0];
  }

  return [
    averageX / weightSum,
    averageY / weightSum
  ];
}

/* =========================================================
   BOARD BUOYANCY, DRAG AND ROTATION
========================================================= */

function updateBoard(deltaTime) {
  const cosine =
    Math.cos(
      boardState.angle
    );

  const sine =
    Math.sin(
      boardState.angle
    );

  let forceX = 0;
  let forceY =
    BOARD_MASS *
    GRAVITY;

  let torque = 0;

  const sampleCount = 9;

  for (
    let sampleIndex = 0;
    sampleIndex < sampleCount;
    sampleIndex++
  ) {
    const localX =
      lerp(
        -BOARD_HALF_LENGTH,
        BOARD_HALF_LENGTH,
        sampleIndex /
        (sampleCount - 1)
      );

    const relativeX =
      cosine *
      localX;

    const relativeY =
      sine *
      localX;

    const sampleX =
      boardState.x +
      relativeX;

    const sampleY =
      boardState.y +
      relativeY;

    const surface =
      surfaceHeightAt(
        sampleX
      );

    const submergedFraction =
      clamp(
        (
          surface -
          sampleY +
          0.08
        ) /
        0.48,
        0,
        1
      );

    if (
      submergedFraction <= 0
    ) {
      continue;
    }

    const fluidVelocity =
      fluidVelocityAt(
        sampleX,
        sampleY,
        0.85
      );

    const sampleVelocityX =
      boardState.velocityX -
      boardState.angularVelocity *
      relativeY;

    const sampleVelocityY =
      boardState.velocityY +
      boardState.angularVelocity *
      relativeX;

    const buoyancy =
      (
        55 /
        sampleCount
      ) *
      submergedFraction;

    const drag =
      4.8 *
      submergedFraction /
      sampleCount;

    const sampleForceX =
      drag *
      (
        fluidVelocity[0] -
        sampleVelocityX
      );

    const sampleForceY =
      buoyancy +
      drag *
      (
        fluidVelocity[1] -
        sampleVelocityY
      );

    forceX += sampleForceX;
    forceY += sampleForceY;

    torque +=
      relativeX *
      sampleForceY -
      relativeY *
      sampleForceX;
  }

  boardState.velocityX +=
    forceX /
    BOARD_MASS *
    deltaTime;

  boardState.velocityY +=
    forceY /
    BOARD_MASS *
    deltaTime;

  boardState.angularVelocity +=
    torque /
    BOARD_INERTIA *
    deltaTime;

  boardState.angularVelocity *=
    Math.exp(
      -1.8 *
      deltaTime
    );

  boardState.velocityX *=
    Math.exp(
      -0.12 *
      deltaTime
    );

  boardState.velocityY *=
    Math.exp(
      -0.08 *
      deltaTime
    );

  const speed =
    Math.hypot(
      boardState.velocityX,
      boardState.velocityY
    );

  if (speed > 12) {
    const scale =
      12 /
      speed;

    boardState.velocityX *= scale;
    boardState.velocityY *= scale;
  }

  boardState.x +=
    boardState.velocityX *
    deltaTime;

  boardState.y +=
    boardState.velocityY *
    deltaTime;

  boardState.angle +=
    boardState.angularVelocity *
    deltaTime;

  /*
    Keep the board above the reef at its center,
    nose and tail.
  */
  const testOffsets = [
    -BOARD_HALF_LENGTH,
    0,
    BOARD_HALF_LENGTH
  ];

  let maximumPush = 0;

  for (
    const localX
    of testOffsets
  ) {
    const testX =
      boardState.x +
      Math.cos(
        boardState.angle
      ) *
      localX;

    const testY =
      boardState.y +
      Math.sin(
        boardState.angle
      ) *
      localX;

    maximumPush =
      Math.max(
        maximumPush,
        bottomY(testX) +
        BOARD_RADIUS -
        testY
      );
  }

  if (maximumPush > 0) {
    boardState.y +=
      maximumPush;

    if (
      boardState.velocityY < 0
    ) {
      boardState.velocityY *=
        -0.18;
    }

    boardState.angularVelocity *=
      0.6;
  }

  if (
    boardState.x < 2 ||
    boardState.x > 32.5 ||
    boardState.y < 0 ||
    boardState.y > 13.5
  ) {
    resetBoard();
  }
}

/* =========================================================
   SIMULATION STEP
========================================================= */

let simulationTime = 0;

function simulationSubstep(
  deltaTime
) {
  const currentTime =
    simulationTime;

  const wallVelocity =
    pistonVelocity(
      currentTime
    );

  /*
    External forces and predicted positions.
  */
  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    previousX[i] = x[i];
    previousY[i] = y[i];

    velocityY[i] +=
      GRAVITY *
      deltaTime;

    /*
      Couple particles close to the piston to the
      piston's horizontal boundary velocity.
    */
    const wallPosition =
      pistonPosition(
        currentTime
      );

    const wallInfluence =
      1 -
      smoothstep(
        wallPosition + 0.3,
        wallPosition + 1.65,
        x[i]
      );

    velocityX[i] =
      lerp(
        velocityX[i],
        wallVelocity,
        wallInfluence *
        0.095
      );

    predictedX[i] =
      x[i] +
      velocityX[i] *
      deltaTime;

    predictedY[i] =
      y[i] +
      velocityY[i] *
      deltaTime;

    projectParticle(
      i,
      currentTime
    );
  }

  rebuildGrid(true);

  /*
    Jacobi density iterations.
  */
  for (
    let iteration = 0;
    iteration < params.iterations;
    iteration++
  ) {
    computeLambdas();
    computeCorrections();

    for (
      let i = 0;
      i < PARTICLE_COUNT;
      i++
    ) {
      predictedX[i] +=
        correctionX[i];

      predictedY[i] +=
        correctionY[i];

      projectParticle(
        i,
        currentTime
      );
    }

    rebuildGrid(true);
  }

  /*
    Derive velocity from corrected positions.
  */
  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    velocityX[i] =
      (
        predictedX[i] -
        previousX[i]
      ) /
      deltaTime;

    velocityY[i] =
      (
        predictedY[i] -
        previousY[i]
      ) /
      deltaTime;

    const speed =
      Math.hypot(
        velocityX[i],
        velocityY[i]
      );

    if (speed > MAX_SPEED) {
      const scale =
        MAX_SPEED /
        speed;

      velocityX[i] *= scale;
      velocityY[i] *= scale;
    }

    /*
      Beach sponge zone absorbs outgoing whitewater
      and reduces reflection from the far boundary.
    */
    const sponge =
      smoothstep(
        28,
        33.4,
        predictedX[i]
      );

    const damping =
      Math.exp(
        -3.8 *
        sponge *
        deltaTime
      );

    velocityX[i] *= damping;
    velocityY[i] *= damping;

    /*
      Simple near-bottom friction.
    */
    const floorDistance =
      predictedY[i] -
      bottomY(
        predictedX[i]
      );

    if (
      floorDistance <
      PARTICLE_RADIUS *
      2.2
    ) {
      velocityX[i] *=
        Math.exp(
          -1.8 *
          deltaTime
        );
    }
  }

  applyViscosity();

  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    x[i] = predictedX[i];
    y[i] = predictedY[i];
  }

  rebuildGrid(false);
  updateBoard(deltaTime);

  simulationTime += deltaTime;
}

/* =========================================================
   MARCHING-CUBES SURFACE RECONSTRUCTION
========================================================= */

const MARCHING_RESOLUTION =
  innerWidth < 700
    ? 44
    : 48;

const waterMaterial =
  new THREE.MeshPhysicalMaterial({
    color: 0x08788c,
    roughness: 0.18,
    metalness: 0,
    clearcoat: 0.45,
    clearcoatRoughness: 0.12,
    transmission: 0.05,
    transparent: true,
    opacity: 0.97,
    ior: 1.333,
    thickness: 1.8,
    side: THREE.DoubleSide
  });

const waterSurface =
  new MarchingCubes(
    MARCHING_RESOLUTION,
    waterMaterial,
    false,
    false,
    170000
  );

waterSurface.isolation = 0.48;

waterSurface.position.set(
  DOMAIN_X / 2,
  DOMAIN_Y / 2,
  0
);

waterSurface.scale.set(
  DOMAIN_X / 2,
  DOMAIN_Y / 2,
  RENDER_WIDTH / 2
);

waterSurface.castShadow = true;
waterSurface.receiveShadow = true;
waterSurface.frustumCulled = false;

scene.add(waterSurface);

const scalarField2D =
  new Float32Array(
    MARCHING_RESOLUTION *
    MARCHING_RESOLUTION
  );

function updateSurfaceMesh() {
  scalarField2D.fill(0);

  /*
    Anisotropic grid-space kernel compensates for
    the rectangular simulation domain.
  */
  const radiusX = 1.55;
  const radiusY = 2.15;
  const strength = 0.145;

  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    const gridPositionX =
      x[i] /
      DOMAIN_X *
      (
        MARCHING_RESOLUTION -
        1
      );

    const gridPositionY =
      y[i] /
      DOMAIN_Y *
      (
        MARCHING_RESOLUTION -
        1
      );

    const firstX =
      Math.max(
        0,
        Math.floor(
          gridPositionX -
          radiusX
        )
      );

    const lastX =
      Math.min(
        MARCHING_RESOLUTION - 1,
        Math.ceil(
          gridPositionX +
          radiusX
        )
      );

    const firstY =
      Math.max(
        0,
        Math.floor(
          gridPositionY -
          radiusY
        )
      );

    const lastY =
      Math.min(
        MARCHING_RESOLUTION - 1,
        Math.ceil(
          gridPositionY +
          radiusY
        )
      );

    for (
      let fieldY = firstY;
      fieldY <= lastY;
      fieldY++
    ) {
      const normalizedY =
        (
          fieldY -
          gridPositionY
        ) /
        radiusY;

      for (
        let fieldX = firstX;
        fieldX <= lastX;
        fieldX++
      ) {
        const normalizedX =
          (
            fieldX -
            gridPositionX
          ) /
          radiusX;

        const radiusSquared =
          normalizedX *
          normalizedX +
          normalizedY *
          normalizedY;

        if (radiusSquared >= 1) {
          continue;
        }

        const kernel =
          1 -
          radiusSquared;

        scalarField2D[
          fieldX +
          fieldY *
          MARCHING_RESOLUTION
        ] +=
          strength *
          kernel *
          kernel *
          kernel;
      }
    }
  }

  const field =
    waterSurface.field;

  const resolution =
    MARCHING_RESOLUTION;

  const resolutionSquared =
    resolution *
    resolution;

  /*
    The simulated section is assumed locally invariant
    along the crest. The ends remain open, avoiding a
    flat cutaway cap across the barrel opening.
  */
  for (
    let fieldZ = 0;
    fieldZ < resolution;
    fieldZ++
  ) {
    const layerOffset =
      fieldZ *
      resolutionSquared;

    for (
      let fieldY = 0;
      fieldY < resolution;
      fieldY++
    ) {
      const row =
        fieldY *
        resolution;

      for (
        let fieldX = 0;
        fieldX < resolution;
        fieldX++
      ) {
        field[
          layerOffset +
          row +
          fieldX
        ] =
          scalarField2D[
            row +
            fieldX
          ];
      }
    }
  }

  waterSurface.update();
}

/* =========================================================
   FOAM AND SPRAY RENDERING
========================================================= */

function createFoamTexture() {
  const canvas =
    document.createElement(
      "canvas"
    );

  canvas.width = 64;
  canvas.height = 64;

  const context =
    canvas.getContext("2d");

  const gradient =
    context.createRadialGradient(
      32,
      32,
      2,
      32,
      32,
      31
    );

  gradient.addColorStop(
    0,
    "rgba(255,255,255,1)"
  );

  gradient.addColorStop(
    0.35,
    "rgba(236,250,255,0.9)"
  );

  gradient.addColorStop(
    1,
    "rgba(210,240,250,0)"
  );

  context.fillStyle = gradient;

  context.fillRect(
    0,
    0,
    64,
    64
  );

  const texture =
    new THREE.CanvasTexture(
      canvas
    );

  texture.colorSpace =
    THREE.SRGBColorSpace;

  return texture;
}

const foamPositions =
  new Float32Array(
    PARTICLE_COUNT *
    3
  );

const foamColors =
  new Float32Array(
    PARTICLE_COUNT *
    3
  );

const foamGeometry =
  new THREE.BufferGeometry();

foamGeometry.setAttribute(
  "position",
  new THREE.BufferAttribute(
    foamPositions,
    3
  )
);

foamGeometry.setAttribute(
  "color",
  new THREE.BufferAttribute(
    foamColors,
    3
  )
);

foamGeometry.setDrawRange(
  0,
  0
);

const foamMaterial =
  new THREE.PointsMaterial({
    map: createFoamTexture(),
    size: 0.38,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.9,
    depthWrite: false,
    vertexColors: true
  });

const foamPoints =
  new THREE.Points(
    foamGeometry,
    foamMaterial
  );

foamPoints.frustumCulled = false;
foamPoints.renderOrder = 3;

scene.add(foamPoints);

/* =========================================================
   DEBUG PARTICLE VIEW
========================================================= */

const debugPositions =
  new Float32Array(
    PARTICLE_COUNT *
    3
  );

const debugGeometry =
  new THREE.BufferGeometry();

debugGeometry.setAttribute(
  "position",
  new THREE.BufferAttribute(
    debugPositions,
    3
  )
);

const debugPoints =
  new THREE.Points(
    debugGeometry,
    new THREE.PointsMaterial({
      color: 0x35ddff,
      size: 0.11,
      sizeAttenuation: true
    })
  );

debugPoints.visible = false;

scene.add(debugPoints);

function updateParticleRendering() {
  let foamCount = 0;

  for (
    let i = 0;
    i < PARTICLE_COUNT;
    i++
  ) {
    debugPositions[i * 3] =
      x[i];

    debugPositions[i * 3 + 1] =
      y[i];

    debugPositions[i * 3 + 2] =
      0;

    const speed =
      Math.hypot(
        velocityX[i],
        velocityY[i]
      );

    /*
      Low neighbor count identifies free-surface
      particles. High velocity identifies breaking
      and airborne particles.
    */
    const freeSurface =
      neighborCount[i] < 10;

    const energetic =
      speed > 2 ||
      Math.abs(
        velocityY[i]
      ) > 1.5;

    const reefBreakingRegion =
      x[i] > 14 &&
      x[i] < 28 &&
      y[i] >
      WATER_LEVEL - 1.2;

    if (
      freeSurface &&
      energetic &&
      reefBreakingRegion
    ) {
      const outputIndex =
        foamCount *
        3;

      foamPositions[
        outputIndex
      ] = x[i];

      foamPositions[
        outputIndex + 1
      ] = y[i];

      foamPositions[
        outputIndex + 2
      ] =
        (
          Math.random() -
          0.5
        ) *
        RENDER_WIDTH *
        0.84;

      const whiteness =
        clamp(
          (
            speed -
            1.5
          ) /
          5,
          0,
          1
        );

      foamColors[
        outputIndex
      ] =
        0.78 +
        0.22 *
        whiteness;

      foamColors[
        outputIndex + 1
      ] =
        0.9 +
        0.1 *
        whiteness;

      foamColors[
        outputIndex + 2
      ] = 1;

      foamCount++;
    }
  }

  debugGeometry
    .attributes
    .position
    .needsUpdate = true;

  foamGeometry
    .attributes
    .position
    .needsUpdate = true;

  foamGeometry
    .attributes
    .color
    .needsUpdate = true;

  foamGeometry.setDrawRange(
    0,
    foamCount
  );
}

/* =========================================================
   USER INTERFACE
========================================================= */

function bindRange(
  id,
  property,
  decimalPlaces
) {
  const input =
    document.getElementById(id);

  const output =
    document.getElementById(
      id + "Out"
    );

  const update = () => {
    params[property] =
      Number(
        input.value
      );

    output.value =
      Number(
        input.value
      ).toFixed(
        decimalPlaces
      );
  };

  input.addEventListener(
    "input",
    update
  );

  update();
}

bindRange(
  "amp",
  "pistonAmplitude",
  2
);

bindRange(
  "period",
  "period",
  2
);

bindRange(
  "reef",
  "reefHeight",
  2
);

bindRange(
  "iters",
  "iterations",
  0
);

document
  .getElementById("reef")
  .addEventListener(
    "input",
    updateReefGeometry
  );

let paused = false;

document
  .getElementById("pause")
  .onclick = () => {
    paused = !paused;

    document
      .getElementById("pause")
      .textContent =
        paused
          ? "Resume"
          : "Pause";
  };

document
  .getElementById("reset")
  .onclick = () => {
    location.reload();
  };

document
  .getElementById("side")
  .onclick = () => {
    camera.position.set(
      20,
      8.2,
      15.5
    );

    controls.target.set(
      19,
      5.1,
      0
    );
  };

document
  .getElementById("angle")
  .onclick = () => {
    camera.position.set(
      24,
      10.5,
      18.5
    );

    controls.target.set(
      19,
      4.8,
      0
    );
  };

document
  .getElementById("debug")
  .onclick = () => {
    debugPoints.visible =
      !debugPoints.visible;

    waterSurface.visible =
      !debugPoints.visible;

    document
      .getElementById("debug")
      .textContent =
        debugPoints.visible
          ? "Surface"
          : "Particles";
  };

/* =========================================================
   RESIZE
========================================================= */

addEventListener(
  "resize",
  () => {
    camera.aspect =
      innerWidth /
      innerHeight;

    camera.updateProjectionMatrix();

    renderer.setPixelRatio(
      Math.min(
        devicePixelRatio,
        1.5
      )
    );

    renderer.setSize(
      innerWidth,
      innerHeight
    );
  }
);

/* =========================================================
   ANIMATION LOOP
========================================================= */

const clock =
  new THREE.Clock();

let accumulator = 0;
let frameCounter = 0;
let displayedFPS = 0;
let fpsStart =
  performance.now();

const stats =
  document.getElementById(
    "stats"
  );

updateSurfaceMesh();
updateParticleRendering();

function animate() {
  requestAnimationFrame(
    animate
  );

  const realDeltaTime =
    Math.min(
      clock.getDelta(),
      0.04
    );

  if (!paused) {
    accumulator +=
      realDeltaTime;

    let completedSteps = 0;

    while (
      accumulator >= FIXED_DT &&
      completedSteps <
      MAX_SUBSTEPS
    ) {
      simulationSubstep(
        FIXED_DT
      );

      accumulator -=
        FIXED_DT;

      completedSteps++;
    }

    /*
      Prevent an overloaded phone from building an
      indefinitely large simulation-time backlog.
    */
    accumulator =
      Math.min(
        accumulator,
        FIXED_DT *
        MAX_SUBSTEPS
      );
  }

  pistonMesh.position.x =
    pistonPosition(
      simulationTime
    ) -
    0.09;

  board.position.set(
    boardState.x,
    boardState.y,
    0
  );

  board.rotation.z =
    boardState.angle;

  updateSurfaceMesh();
  updateParticleRendering();

  controls.update();

  renderer.render(
    scene,
    camera
  );

  frameCounter++;

  const now =
    performance.now();

  if (
    now -
    fpsStart >
    500
  ) {
    displayedFPS =
      Math.round(
        frameCounter *
        1000 /
        (
          now -
          fpsStart
        )
      );

    frameCounter = 0;
    fpsStart = now;
  }

  stats.textContent =
    `${displayedFPS} fps\n` +
    `${PARTICLE_COUNT.toLocaleString()} fluid particles\n` +
    `${renderer.info.render.triangles.toLocaleString()} triangles`;
}

animate();
</script>
