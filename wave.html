<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
>
<title>Reef Barrel Wave Simulator</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #071722;
    font-family: Inter, system-ui, sans-serif;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  #panel {
    position: fixed;
    z-index: 10;
    top: 12px;
    left: 12px;
    width: min(330px, calc(100vw - 24px));
    padding: 13px 14px;
    border: 1px solid rgba(190, 235, 255, 0.22);
    border-radius: 14px;
    color: #eefaff;
    background: rgba(3, 20, 30, 0.82);
    box-shadow: 0 16px 45px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    user-select: none;
  }

  #panel h1 {
    margin: 0 0 5px;
    font-size: 17px;
    font-weight: 600;
  }

  #panel p {
    margin: 0 0 10px;
    color: #accbd6;
    font-size: 11px;
    line-height: 1.4;
  }

  .row {
    display: grid;
    grid-template-columns: 104px 1fr 44px;
    gap: 8px;
    align-items: center;
    margin: 7px 0;
    font-size: 11px;
  }

  .row label {
    color: #c6dde5;
  }

  .row output {
    text-align: right;
    color: #effcff;
    font-variant-numeric: tabular-nums;
  }

  input[type="range"] {
    width: 100%;
    accent-color: #22a6c7;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }

  button {
    padding: 7px 10px;
    border: 1px solid rgba(190, 235, 255, 0.25);
    border-radius: 8px;
    color: #effbff;
    background: rgba(42, 128, 157, 0.23);
    cursor: pointer;
    font-size: 11px;
  }

  button:hover {
    background: rgba(42, 128, 157, 0.4);
  }

  #status {
    position: fixed;
    z-index: 11;
    right: 10px;
    bottom: 8px;
    color: rgba(235, 250, 255, 0.72);
    font: 11px/1.4 monospace;
    text-align: right;
    pointer-events: none;
  }

  #hint {
    position: fixed;
    z-index: 11;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    padding: 5px 9px;
    border-radius: 7px;
    color: rgba(235, 250, 255, 0.72);
    background: rgba(3, 18, 28, 0.45);
    font-size: 10px;
    pointer-events: none;
  }

  @media (max-width: 650px) {
    #panel {
      width: 284px;
      padding: 10px 11px;
    }

    #panel p {
      display: none;
    }

    .row {
      grid-template-columns: 86px 1fr 40px;
      gap: 6px;
      margin: 5px 0;
    }

    #hint {
      display: none;
    }
  }
</style>
</head>

<body>
<div id="panel">
  <h1>Reef Barrel Wave Simulator</h1>

  <p>
    Continuous reef swell, thick plunging lip, hollow barrel,
    impact foam and a floating low-poly surfboard.
  </p>

  <div class="row">
    <label for="height">Wave height</label>
    <input id="height" type="range" min="2.4" max="6.2" step="0.1" value="4.3">
    <output id="heightOut">4.3</output>
  </div>

  <div class="row">
    <label for="period">Period</label>
    <input id="period" type="range" min="5.0" max="11.0" step="0.1" value="7.2">
    <output id="periodOut">7.2</output>
  </div>

  <div class="row">
    <label for="reef">Reef height</label>
    <input id="reef" type="range" min="0.65" max="1.25" step="0.01" value="1.00">
    <output id="reefOut">1.00</output>
  </div>

  <div class="row">
    <label for="curl">Lip curl</label>
    <input id="curl" type="range" min="0.25" max="1.30" step="0.01" value="0.94">
    <output id="curlOut">0.94</output>
  </div>

  <div class="row">
    <label for="foam">Whitewater</label>
    <input id="foam" type="range" min="0" max="1.8" step="0.05" value="1.00">
    <output id="foamOut">1.00</output>
  </div>

  <div class="buttons">
    <button id="pause">Pause</button>
    <button id="barrelView">Barrel view</button>
    <button id="overview">Overview</button>
    <button id="resetBoard">Reset board</button>
  </div>
</div>

<div id="status"></div>
<div id="hint">Drag to orbit · Pinch or wheel to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const clamp = THREE.MathUtils.clamp;
const lerp = THREE.MathUtils.lerp;

function smoothstep(edge0, edge1, value) {
  const t = clamp((value - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

function gaussian(value, center, width) {
  const d = (value - center) / width;
  return Math.exp(-d * d);
}

function wrapPi(value) {
  return Math.atan2(Math.sin(value), Math.cos(value));
}

const params = {
  waveHeight: 4.3,
  period: 7.2,
  reefHeight: 1,
  curl: 0.94,
  foam: 1
};

let paused = false;
let simulationTime = 0;
let waveTravel = 0;

const WAVELENGTH = 38;
const CREST_START_Z = 18;

/* ---------------------------------------------------------
   Renderer and camera
--------------------------------------------------------- */

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: "high-performance"
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.65));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x88bbce);

const camera = new THREE.PerspectiveCamera(
  48,
  window.innerWidth / window.innerHeight,
  0.1,
  220
);

camera.position.set(28, 9, -27);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, -5);
controls.enableDamping = true;
controls.dampingFactor = 0.065;
controls.minDistance = 7;
controls.maxDistance = 100;
controls.maxPolarAngle = Math.PI * 0.495;

/* ---------------------------------------------------------
   Lighting
--------------------------------------------------------- */

scene.add(
  new THREE.HemisphereLight(
    0xc8ebff,
    0x263e35,
    1.55
  )
);

const sun = new THREE.DirectionalLight(0xfff1d0, 3.5);
sun.position.set(-32, 42, -12);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -45;
sun.shadow.camera.right = 45;
sun.shadow.camera.top = 45;
sun.shadow.camera.bottom = -45;
sun.shadow.camera.near = 2;
sun.shadow.camera.far = 110;
scene.add(sun);

/* ---------------------------------------------------------
   Sky
--------------------------------------------------------- */

const skyMaterial = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  depthWrite: false,

  uniforms: {
    sunDirection: {
      value: sun.position.clone().normalize()
    }
  },

  vertexShader: `
    varying vec3 vDirection;

    void main() {
      vDirection = normalize(position);

      gl_Position =
        projectionMatrix *
        modelViewMatrix *
        vec4(position, 1.0);
    }
  `,

  fragmentShader: `
    varying vec3 vDirection;
    uniform vec3 sunDirection;

    void main() {
      float horizon =
        clamp(vDirection.y * 0.5 + 0.5, 0.0, 1.0);

      vec3 lowColor = vec3(0.56, 0.75, 0.82);
      vec3 highColor = vec3(0.055, 0.19, 0.34);

      vec3 color =
        mix(
          lowColor,
          highColor,
          pow(horizon, 0.65)
        );

      float sunGlow =
        pow(
          max(dot(vDirection, sunDirection), 0.0),
          480.0
        );

      float hazeGlow =
        pow(
          max(dot(vDirection, sunDirection), 0.0),
          8.0
        );

      color += vec3(1.0, 0.72, 0.40) * sunGlow * 7.0;
      color += vec3(0.22, 0.17, 0.11) * hazeGlow * 0.16;

      gl_FragColor = vec4(color, 1.0);
    }
  `
});

const sky = new THREE.Mesh(
  new THREE.SphereGeometry(130, 36, 18),
  skyMaterial
);

scene.add(sky);

/* ---------------------------------------------------------
   Reef bathymetry
--------------------------------------------------------- */

function reefChannel(x) {
  return Math.exp(
    -Math.pow((x + 16) / 6.2, 2)
  );
}

function reefProfile(z) {
  return Math.exp(
    -Math.pow((z + 4) / 10.5, 4)
  );
}

function bedHeight(x, z) {
  const channel = reefChannel(x);

  const lateralVariation =
    0.94 +
    0.045 * Math.sin(x * 0.16) +
    0.025 * Math.sin(x * 0.43 + 1.4);

  const reef =
    9.75 *
    params.reefHeight *
    reefProfile(z) *
    lateralVariation *
    (1 - channel * 0.63);

  const shore =
    smoothstep(18, 39, -z);

  const beach =
    14.5 *
    Math.pow(shore, 1.48);

  const outerShelf =
    0.55 *
    gaussian(z, 17, 9) *
    (0.5 + 0.5 * Math.sin(x * 0.12 + 1.1));

  return -12 + reef + beach + outerShelf;
}

/* ---------------------------------------------------------
   Seabed mesh
--------------------------------------------------------- */

const BED_SEGMENTS_X = 112;
const BED_SEGMENTS_Z = 112;

const bedGeometry = new THREE.PlaneGeometry(
  84,
  84,
  BED_SEGMENTS_X,
  BED_SEGMENTS_Z
);

bedGeometry.rotateX(-Math.PI / 2);

const bedPositionAttribute = bedGeometry.attributes.position;
const bedColors = new Float32Array(
  bedPositionAttribute.count * 3
);

bedGeometry.setAttribute(
  "color",
  new THREE.BufferAttribute(bedColors, 3)
);

function updateBedGeometry() {
  for (let i = 0; i < bedPositionAttribute.count; i++) {
    const x = bedPositionAttribute.getX(i);
    const z = bedPositionAttribute.getZ(i);
    const y = bedHeight(x, z);

    bedPositionAttribute.setY(i, y);

    const reefAmount =
      smoothstep(-8, -1.2, y) *
      (1 - smoothstep(-0.1, 0.4, y));

    const dryAmount =
      smoothstep(-0.1, 0.8, y);

    const noise =
      0.5 +
      0.5 *
      Math.sin(x * 0.52 + Math.sin(z * 0.33));

    const deepSand = new THREE.Color(0x544b30);
    const reefColor = new THREE.Color(0x38442c);
    const wetSand = new THREE.Color(0x907d4d);
    const drySand = new THREE.Color(0xc4ad70);

    const color = deepSand.clone();
    color.lerp(reefColor, reefAmount * 0.82);
    color.lerp(wetSand, smoothstep(-2.5, -0.05, y));
    color.lerp(drySand, dryAmount);
    color.multiplyScalar(0.84 + noise * 0.16);

    bedColors[i * 3] = color.r;
    bedColors[i * 3 + 1] = color.g;
    bedColors[i * 3 + 2] = color.b;
  }

  bedPositionAttribute.needsUpdate = true;
  bedGeometry.attributes.color.needsUpdate = true;
  bedGeometry.computeVertexNormals();
}

updateBedGeometry();

const bedMaterial = new THREE.MeshStandardMaterial({
  vertexColors: true,
  roughness: 0.98,
  metalness: 0,
  flatShading: false
});

const bedMesh = new THREE.Mesh(
  bedGeometry,
  bedMaterial
);

bedMesh.receiveShadow = true;
scene.add(bedMesh);

/* ---------------------------------------------------------
   Barrel state
--------------------------------------------------------- */

const barrelState = {
  crestZ: CREST_START_Z,
  active: 0,
  pitch: 0,
  collapse: 1
};

function updateBarrelState() {
  barrelState.crestZ =
    CREST_START_Z -
    waveTravel;

  const entry =
    1 -
    smoothstep(
      6,
      11,
      barrelState.crestZ
    );

  const exit =
    smoothstep(
      -21,
      -14,
      barrelState.crestZ
    );

  barrelState.active =
    entry * exit;

  barrelState.pitch =
    clamp(
      1 -
      smoothstep(
        -8,
        6,
        barrelState.crestZ
      ),
      0,
      1
    );

  barrelState.collapse = exit;
}

/* ---------------------------------------------------------
   Ocean surface model
--------------------------------------------------------- */

const waterSample = {
  x: 0,
  y: 0,
  z: 0,
  foam: 0,
  thickness: 1,
  depth: 1
};

function sampleOcean(x, z, time, out = waterSample) {
  const bottom = bedHeight(x, z);
  const depth = Math.max(0.02, -bottom);

  const channel = reefChannel(x);
  const reefAmount = reefProfile(z);

  const localBreakerStrength =
    (1 - channel * 0.78) *
    reefAmount;

  const phaseBend =
    1.55 *
    localBreakerStrength;

  const localCrestZ =
    barrelState.crestZ +
    phaseBend;

  const k =
    Math.PI * 2 /
    WAVELENGTH;

  let phase =
    k *
    (z - localCrestZ);

  phase +=
    0.04 *
    Math.sin(x * 0.11);

  const wrappedPhase =
    wrapPi(phase);

  const crestShape =
    gaussian(
      wrappedPhase,
      0,
      0.62
    );

  const shoaling =
    clamp(
      Math.pow(
        9 /
        Math.max(depth, 0.55),
        0.18
      ),
      0.88,
      1.55
    );

  const postBreak =
    1 -
    smoothstep(
      12,
      29,
      -z
    ) *
    0.68;

  const amplitude =
    params.waveHeight *
    0.5 *
    shoaling *
    postBreak;

  let y =
    amplitude *
    (
      Math.cos(phase) +
      0.16 * Math.cos(2 * phase) -
      0.045 * Math.cos(3 * phase)
    );

  y +=
    0.055 *
    Math.sin(
      x * 0.8 +
      z * 0.5 +
      time * 1.7
    );

  y +=
    0.035 *
    Math.sin(
      -x * 0.43 +
      z * 1.05 +
      time * 2.5
    );

  const gerstnerQ =
    0.32 +
    localBreakerStrength * 0.23;

  let worldZ =
    z -
    gerstnerQ *
    amplitude *
    Math.sin(phase);

  const lateralEdge =
    1 -
    smoothstep(
      21,
      32,
      Math.abs(x)
    );

  const barrelMask =
    barrelState.active *
    lateralEdge *
    (1 - channel * 0.84);

  const localPitch =
    clamp(
      barrelState.pitch -
      channel * 0.42 +
      x * 0.004,
      0,
      1
    );

  const cavityCenter =
    localCrestZ -
    params.waveHeight *
    (
      0.52 +
      localPitch * 0.34
    );

  const cavityWidth =
    params.waveHeight *
    (
      0.55 +
      localPitch * 0.25
    );

  const cavity =
    barrelMask *
    gaussian(
      z,
      cavityCenter,
      cavityWidth
    ) *
    crestShape;

  /*
    Depress the underlying heightfield beneath the barrel.
    This keeps the hollow cavity open instead of filling it
    with the ordinary ocean surface.
  */
  y -=
    cavity *
    params.waveHeight *
    (
      0.36 +
      localPitch * 0.24
    );

  const impactZ =
    localCrestZ -
    params.waveHeight *
    (
      0.75 +
      localPitch * 0.58
    );

  const impactFoam =
    barrelMask *
    localPitch *
    gaussian(
      z,
      impactZ,
      1.35
    );

  const shoreFoam =
    smoothstep(
      0.1,
      0.75,
      1 / Math.max(depth, 0.08)
    ) *
    smoothstep(
      -31,
      -19,
      z
    ) *
    0.5;

  const foam =
    clamp(
      impactFoam +
      shoreFoam +
      localBreakerStrength *
      crestShape *
      barrelState.active *
      localPitch *
      0.28,
      0,
      1
    );

  const wet =
    smoothstep(
      0.04,
      0.65,
      depth
    );

  y =
    lerp(
      bottom + 0.025,
      y,
      wet
    );

  out.x =
    x +
    0.04 *
    Math.sin(
      phase +
      x * 0.08
    );

  out.y = y;
  out.z = worldZ;
  out.foam = foam;
  out.thickness = depth;
  out.depth = depth;

  return out;
}

/* ---------------------------------------------------------
   Shared water shader
--------------------------------------------------------- */

const waterMaterial = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: false,
  depthWrite: true,

  uniforms: {
    time: {
      value: 0
    },

    sunDirection: {
      value: sun.position.clone().normalize()
    },

    shallowColor: {
      value: new THREE.Color(0x16949a)
    },

    middleColor: {
      value: new THREE.Color(0x076274)
    },

    deepColor: {
      value: new THREE.Color(0x032c42)
    }
  },

  vertexShader: `
    attribute float aFoam;
    attribute float aThickness;

    varying vec3 vWorldPosition;
    varying vec3 vWorldNormal;
    varying float vFoam;
    varying float vThickness;

    void main() {
      vec4 worldPosition =
        modelMatrix *
        vec4(position, 1.0);

      vWorldPosition =
        worldPosition.xyz;

      vWorldNormal =
        normalize(
          mat3(modelMatrix) *
          normal
        );

      vFoam = aFoam;
      vThickness = aThickness;

      gl_Position =
        projectionMatrix *
        viewMatrix *
        worldPosition;
    }
  `,

  fragmentShader: `
    uniform float time;
    uniform vec3 sunDirection;
    uniform vec3 shallowColor;
    uniform vec3 middleColor;
    uniform vec3 deepColor;

    varying vec3 vWorldPosition;
    varying vec3 vWorldNormal;
    varying float vFoam;
    varying float vThickness;

    vec3 skyColor(vec3 direction) {
      float height =
        clamp(
          direction.y * 0.5 + 0.5,
          0.0,
          1.0
        );

      vec3 horizon =
        vec3(0.58, 0.78, 0.86);

      vec3 zenith =
        vec3(0.045, 0.18, 0.32);

      return mix(
        horizon,
        zenith,
        pow(height, 0.7)
      );
    }

    void main() {
      vec3 normal =
        normalize(vWorldNormal);

      if (!gl_FrontFacing) {
        normal = -normal;
      }

      vec3 viewDirection =
        normalize(
          cameraPosition -
          vWorldPosition
        );

      vec3 reflectionDirection =
        reflect(
          -viewDirection,
          normal
        );

      float fresnel =
        0.025 +
        0.975 *
        pow(
          1.0 -
          max(
            dot(normal, viewDirection),
            0.0
          ),
          5.0
        );

      float thickness =
        max(vThickness, 0.05);

      float depthAmount =
        smoothstep(
          0.65,
          8.5,
          thickness
        );

      vec3 transmittedColor =
        mix(
          shallowColor,
          middleColor,
          smoothstep(
            0.2,
            3.2,
            thickness
          )
        );

      transmittedColor =
        mix(
          transmittedColor,
          deepColor,
          depthAmount
        );

      float thinTransmission =
        exp(
          -thickness * 0.3
        );

      float backLight =
        pow(
          max(
            dot(
              -viewDirection,
              sunDirection
            ),
            0.0
          ),
          3.0
        ) *
        thinTransmission;

      transmittedColor +=
        vec3(0.08, 0.52, 0.48) *
        backLight *
        1.25;

      if (!gl_FrontFacing) {
        transmittedColor *= 0.62;
      }

      vec3 reflectedColor =
        skyColor(
          reflectionDirection
        );

      float sunSpecular =
        pow(
          max(
            dot(
              reflect(
                -sunDirection,
                normal
              ),
              -viewDirection
            ),
            0.0
          ),
          190.0
        );

      vec3 color =
        mix(
          transmittedColor,
          reflectedColor,
          fresnel * 0.82
        );

      color +=
        vec3(1.0, 0.86, 0.62) *
        sunSpecular *
        2.2;

      float foamNoise =
        0.76 +
        0.24 *
        sin(
          vWorldPosition.x * 3.4 +
          vWorldPosition.z * 2.8 +
          time * 5.0
        );

      float foam =
        smoothstep(
          0.23,
          0.78,
          vFoam * foamNoise
        );

      color =
        mix(
          color,
          vec3(0.88, 0.97, 1.0),
          foam
        );

      gl_FragColor =
        vec4(color, 1.0);
    }
  `
});

/* ---------------------------------------------------------
   Main ocean mesh
--------------------------------------------------------- */

const OCEAN_X_SEGMENTS = 82;
const OCEAN_Z_SEGMENTS = 112;

const oceanGeometry = new THREE.PlaneGeometry(
  82,
  82,
  OCEAN_X_SEGMENTS,
  OCEAN_Z_SEGMENTS
);

oceanGeometry.rotateX(-Math.PI / 2);

const oceanPositions =
  oceanGeometry.attributes.position;

const oceanBaseX =
  new Float32Array(oceanPositions.count);

const oceanBaseZ =
  new Float32Array(oceanPositions.count);

const oceanFoam =
  new Float32Array(oceanPositions.count);

const oceanThickness =
  new Float32Array(oceanPositions.count);

for (let i = 0; i < oceanPositions.count; i++) {
  oceanBaseX[i] = oceanPositions.getX(i);
  oceanBaseZ[i] = oceanPositions.getZ(i);
}

oceanGeometry.setAttribute(
  "aFoam",
  new THREE.BufferAttribute(
    oceanFoam,
    1
  )
);

oceanGeometry.setAttribute(
  "aThickness",
  new THREE.BufferAttribute(
    oceanThickness,
    1
  )
);

oceanPositions.setUsage(
  THREE.DynamicDrawUsage
);

oceanGeometry.attributes.aFoam.setUsage(
  THREE.DynamicDrawUsage
);

oceanGeometry.attributes.aThickness.setUsage(
  THREE.DynamicDrawUsage
);

const oceanMesh = new THREE.Mesh(
  oceanGeometry,
  waterMaterial
);

oceanMesh.frustumCulled = false;
oceanMesh.receiveShadow = true;
oceanMesh.renderOrder = 1;

scene.add(oceanMesh);

function updateOcean() {
  for (let i = 0; i < oceanPositions.count; i++) {
    sampleOcean(
      oceanBaseX[i],
      oceanBaseZ[i],
      simulationTime,
      waterSample
    );

    oceanPositions.setXYZ(
      i,
      waterSample.x,
      waterSample.y,
      waterSample.z
    );

    oceanFoam[i] =
      waterSample.foam;

    oceanThickness[i] =
      waterSample.thickness;
  }

  oceanPositions.needsUpdate = true;
  oceanGeometry.attributes.aFoam.needsUpdate = true;
  oceanGeometry.attributes.aThickness.needsUpdate = true;

  oceanGeometry.computeVertexNormals();
  oceanGeometry.attributes.normal.needsUpdate = true;
}

for (let xIndex = 0; xIndex < BARREL_X_COUNT - 1; xIndex++) {
  for (let ringIndex = 0; ringIndex < BARREL_RING_COUNT; ringIndex++) {
    const nextRing =
      (ringIndex + 1) %
      BARREL_RING_COUNT;

    const a =
      xIndex *

      xIndex *

      nextRing;

    const d =
      (xIndex + 1) *

    barrelIndices.push(

/* ---------------------------------------------------------
   Closed Catmull-Rom cross-section
--------------------------------------------------------- */

function catmullRomClosed(points, t, output) {
  const count = points.length;

  const scaled =
    ((t % 1) + 1) %
    1 *
    count;

  const index1 =
    Math.floor(scaled) %
    count;

  const localT =
    scaled -
    Math.floor(scaled);

  const index0 =
    (index1 - 1 + count) %
    count;

  const index2 =
    (index1 + 1) %
    count;

  const index3 =
    (index1 + 2) %
    count;

  const p0 = points[index0];
  const p1 = points[index1];
  const p2 = points[index2];
  const p3 = points[index3];

  const t2 = localT * localT;
  const t3 = t2 * localT;

  output.z =
    0.5 *
    (
      2 * p1[0] +
      (-p0[0] + p2[0]) *
      localT +
      (
        2 * p0[0] -
        5 * p1[0] +
        4 * p2[0] -
        p3[0]
      ) *
      t2 +
      (
        -p0[0] +
        3 * p1[0] -
        3 * p2[0] +
        p3[0]
      ) *
      t3
    );

  output.y =
    0.5 *
    (
      2 * p1[1] +
      (-p0[1] + p2[1]) *
      localT +
      (
        2 * p0[1] -
        5 * p1[1] +
        4 * p2[1] -
        p3[1]
      ) *
      t2 +
      (
        -p0[1] +
        3 * p1[1] -
        3 * p2[1] +
        p3[1]
      ) *
      t3
    );

  return output;
}

function createBarrelControlPoints(stage) {
  const s =
    clamp(stage, 0, 1.15);

  return [
    [-1.58, -0.10],
    [-1.34,  0.05],
    [-1.06,  0.30],
    [-0.70,  0.61],
    [-0.31,  0.86],
    [ 0.00,  1.00],

    [
      -0.22 - 0.32 * s,
       0.99 - 0.06 * s
    ],

    [
      -0.48 - 0.95 * s,
       0.91 - 0.47 * s
    ],

    [
      -0.44 - 0.78 * s,
       0.76 - 0.41 * s
    ],

    [
      -0.08 - 0.25 * s,
       0.68 - 0.10 * s
    ],

    [ 0.28,  0.46],
    [ 0.52,  0.20],
    [ 0.65, -0.02],
    [ 0.42, -0.17],
    [ 0.02, -0.23],
    [-0.52, -0.24],
    [-1.05, -0.20],
    [-1.42, -0.15]
  ];
}

const crossSectionSample = {
  z: 0,
  y: 0
};

function localBarrelParameters(x) {
  const channel = reefChannel(x);

  const edgeFade =
    1 -
    smoothstep(
      21,
      31,
      Math.abs(x)
    );

  const reefStrength =
    1 -
    channel * 0.8;

  const localPitch =
    clamp(
      barrelState.pitch *
      params.curl *
      reefStrength +
      x * 0.004,
      0,
      1.12
    );

  const height =
    params.waveHeight *
    (
      0.94 +
      reefStrength * 0.16
    ) *
    edgeFade *
    barrelState.active;

  const zCenter =
    barrelState.crestZ +
    1.45 *
    reefStrength +
    0.18 *
    Math.sin(
      x * 0.1
    );

  return {
    channel,
    edgeFade,
    reefStrength,
    localPitch,
    height,
    zCenter
  };
}

function updateBarrelMesh() {
  barrelMesh.visible =
    barrelState.active >
    0.015;

  if (!barrelMesh.visible) {
    return;
  }

  for (
    let xIndex = 0;
    xIndex < BARREL_X_COUNT;
    xIndex++
  ) {
    const xT =
      xIndex /
      (BARREL_X_COUNT - 1);

    const x =
      lerp(
        -31,
        31,
        xT
      );

    const local =
      localBarrelParameters(x);

    const controls =
      createBarrelControlPoints(
        local.localPitch
      );

    const height =
      Math.max(
        local.height,
        0.001
      );

    const xLean =
      0.12 *
      Math.sin(
        x * 0.13 +
        simulationTime * 0.35
      ) *
      barrelState.active;

    for (
      let ringIndex = 0;
      ringIndex < BARREL_RING_COUNT;
      ringIndex++
    ) {
      const ringT =
        ringIndex /
        BARREL_RING_COUNT;

      catmullRomClosed(
        controls,
        ringT,
        crossSectionSample
      );

      const vertex =
        xIndex *
        BARREL_RING_COUNT +
        ringIndex;

      const positionIndex =
        vertex * 3;

      const zScale =
        height *
        (
          0.82 +
          local.localPitch * 0.08
        );

      const worldX =
        x +
        xLean *
        crossSectionSample.y;

      const worldY =
        crossSectionSample.y *
        height;

      const worldZ =
        local.zCenter +
        crossSectionSample.z *
        zScale;

      barrelPositions[positionIndex] =
        worldX;

      barrelPositions[positionIndex + 1] =
        worldY;

      barrelPositions[positionIndex + 2] =
        worldZ;

      const crestFoam =
        gaussian(
          ringT,
          0.39,
          0.095
        );

      const secondaryFoam =
        gaussian(
          ringT,
          0.31,
          0.075
        ) *
        0.4;

      barrelFoam[vertex] =
        clamp(
          (
            crestFoam +
            secondaryFoam
          ) *
          local.localPitch *
          barrelState.active *
          params.foam,
          0,
          1
        );

      const normalizedHeight =
        clamp(
          crossSectionSample.y,
          -0.2,
          1
        );

      barrelThickness[vertex] =
        0.55 +
        height *
        (
          0.25 +
          normalizedHeight * 0.48
        );
    }
  }

  barrelGeometry.attributes.position.needsUpdate = true;
  barrelGeometry.attributes.aFoam.needsUpdate = true;
  barrelGeometry.attributes.aThickness.needsUpdate = true;

  barrelGeometry.computeVertexNormals();
  barrelGeometry.attributes.normal.needsUpdate = true;
}

   Foam particle texture
--------------------------------------------------------- */

function createFoamTexture() {
  const canvas =
    document.createElement("canvas");

  canvas.width = 64;
  canvas.height = 64;

  const context =
    canvas.getContext("2d");

  const gradient =
    context.createRadialGradient(
      32,
      32,
      2,
      32,
      32,
      31
    );

  gradient.addColorStop(
    0,
    "rgba(255,255,255,1)"
  );

  gradient.addColorStop(
    0.28,
    "rgba(238,250,255,0.95)"
  );

  gradient.addColorStop(
    0.7,
    "rgba(210,241,250,0.3)"
  );

  gradient.addColorStop(
    1,
    "rgba(200,235,245,0)"
  );

  context.fillStyle = gradient;
  context.fillRect(0, 0, 64, 64);

  const texture =
    new THREE.CanvasTexture(canvas);

  texture.colorSpace =
    THREE.SRGBColorSpace;

  return texture;
}

const MAX_PARTICLES = 3600;

const particlePositions =

  );

const particleMaxLife =
  new Float32Array(
    MAX_PARTICLES
  );

const particleType =

  );

let particleCursor = 0;

for (let i = 0; i < MAX_PARTICLES; i++) {

function spawnParticle(
  x,
  y,
  z,
  velocityX,
  velocityY,
  velocityZ,
  life,
  type
) {
  const index =
    particleCursor %
    MAX_PARTICLES;

  particleCursor++;

  const positionIndex =
    index * 3;

  particlePositions[positionIndex] = x;
  particlePositions[positionIndex + 1] = y;
  particlePositions[positionIndex + 2] = z;

  particleVelocities[index].set(
    velocityX,
    velocityY,
    velocityZ
  );

  particleLife[index] = life;
  particleMaxLife[index] = life;
  particleType[index] = type;

  particleColors[positionIndex] = 0.92;
  particleColors[positionIndex + 1] = 0.98;
  particleColors[positionIndex + 2] = 1;
}

function spawnWhitewater(deltaTime) {
  if (
    barrelState.active < 0.05 ||
    barrelState.pitch < 0.12 ||
    params.foam <= 0
  ) {
    return;
  }

  const attempts =
    Math.floor(
      32 *
      params.foam *
      deltaTime *
      60
    );

  for (let i = 0; i < attempts; i++) {
    const x =
      THREE.MathUtils.randFloat(
        -27,
        27
      );

    const local =
      localBarrelParameters(x);

    if (
      local.height < 0.2 ||
      Math.random() >
      local.reefStrength *
      local.edgeFade
    ) {
      continue;
    }

    const stage =
      local.localPitch;

    const lipZNormalized =
      -0.48 -
      0.95 * stage;

    const lipYNormalized =
      0.91 -
      0.47 * stage;

    const lipZ =
      local.zCenter +
      lipZNormalized *
      local.height *
      0.88;

    const lipY =
      lipYNormalized *
      local.height;

    const airborne =
      Math.random() < 0.62;

    if (airborne) {
      spawnParticle(
        x +
        THREE.MathUtils.randFloatSpread(0.5),

        lipY +
        THREE.MathUtils.randFloatSpread(0.24),

        lipZ +
        THREE.MathUtils.randFloatSpread(0.35),

        THREE.MathUtils.randFloatSpread(1.4),

        THREE.MathUtils.randFloat(
          0.8,
          3.4
        ) *
        stage,

        THREE.MathUtils.randFloat(
          -3.8,
          -0.8
        ) *
        stage,

        THREE.MathUtils.randFloat(
          0.7,
          1.65
        ),

        0
      );
    } else {
      sampleOcean(
        x,
        lipZ - 0.4,
        simulationTime,
        waterSample
      );

      spawnParticle(
        x +
        THREE.MathUtils.randFloatSpread(0.7),

        waterSample.y +
        THREE.MathUtils.randFloat(
          0.05,
          0.35
        ),

        lipZ +
        THREE.MathUtils.randFloatSpread(0.65),

        THREE.MathUtils.randFloatSpread(0.9),

        THREE.MathUtils.randFloat(
          0.15,
          0.8
        ),

        THREE.MathUtils.randFloat(
          -2.4,
          -0.4
        ),

        THREE.MathUtils.randFloat(
          1.5,
          3.8
        ),

        1
      );
    }
  }
}

function updateParticles(deltaTime) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (particleLife[i] <= 0) {
      continue;
    }

    particleLife[i] -= deltaTime;

    const positionIndex =
      i * 3;

    if (particleLife[i] <= 0) {
      particlePositions[positionIndex + 1] = -100;
      continue;
    }

    const velocity =
      particleVelocities[i];

    if (particleType[i] === 0) {
      velocity.y -=
        5.5 *
        deltaTime;

      velocity.multiplyScalar(
        Math.exp(
          -0.5 *
          deltaTime
        )
      );
    } else {
      velocity.y -=
        0.35 *
        deltaTime;

      velocity.multiplyScalar(
        Math.exp(
          -1.25 *
          deltaTime
        )
      );
    }

    particlePositions[positionIndex] +=
      velocity.x *
      deltaTime;

    particlePositions[positionIndex + 1] +=
      velocity.y *
      deltaTime;

    particlePositions[positionIndex + 2] +=
      velocity.z *
      deltaTime;

    const fade =
      clamp(
        particleLife[i] /
        particleMaxLife[i],
        0,
        1
      );

    particleColors[positionIndex] =
      lerp(
        0.45,
        0.94,
        fade
      );

    particleColors[positionIndex + 1] =
      lerp(
        0.68,
        0.99,
        fade
      );

    particleColors[positionIndex + 2] =
      lerp(
        0.76,
        1,
        fade
      );
  }

  particleGeometry.attributes.position.needsUpdate = true;
  particleGeometry.attributes.color.needsUpdate = true;
}

const boardState = {
  x: 23,
  zOffset: 1.7,
  lateralVelocity: 0
};

const boardNormal =
  new THREE.Vector3();

const boardForward =
  new THREE.Vector3();

const boardRight =
  new THREE.Vector3();

const boardMatrix =
  new THREE.Matrix4();

const boardQuaternion =
  new THREE.Quaternion();

const boardTarget =
  new THREE.Vector3();

const sampleCenter = {};
const sampleLeft = {};
const sampleRight = {};
const sampleFront = {};
const sampleBack = {};

function resetBoard() {
  boardState.x = 23;
  boardState.zOffset = 1.7;
  boardState.lateralVelocity = 0;
}

function updateBoard(deltaTime) {
  const channel =
    reefChannel(boardState.x);

  const localCrestZ =
    barrelState.crestZ +
    1.55 *
    (1 - channel * 0.78);

  const parameterZ =
    localCrestZ +
    boardState.zOffset;

  sampleOcean(
    boardState.x,
    parameterZ,
    simulationTime,
    sampleCenter
  );

  const epsilon = 0.18;

  sampleOcean(
    boardState.x - epsilon,
    parameterZ,
    simulationTime,
    sampleLeft
  );

  sampleOcean(
    boardState.x + epsilon,
    parameterZ,
    simulationTime,
    sampleRight
  );

  sampleOcean(
    boardState.x,
    parameterZ - epsilon,
    simulationTime,
    sampleFront
  );

  sampleOcean(
    boardState.x,
    parameterZ + epsilon,
    simulationTime,
    sampleBack
  );

  boardRight.set(
    sampleRight.x -
    sampleLeft.x,

    sampleRight.y -
    sampleLeft.y,

    sampleRight.z -
    sampleLeft.z
  ).normalize();

  boardForward.set(
    sampleFront.x -
    sampleBack.x,

    sampleFront.y -
    sampleBack.y,

    sampleFront.z -
    sampleBack.z
  ).normalize();

  boardNormal
    .crossVectors(
      boardForward,
      boardRight
    )
    .normalize();

  if (boardNormal.y < 0) {
    boardNormal.negate();
  }

  boardRight
    .crossVectors(
      boardNormal,
      boardForward
    )
    .normalize();

  boardForward
    .crossVectors(
      boardRight,
      boardNormal
    )
    .normalize();

  boardMatrix.makeBasis(
    boardRight,
    boardNormal,
    boardForward
  );

  boardQuaternion.setFromRotationMatrix(
    boardMatrix
  );

  boardTarget.set(
    sampleCenter.x,
    sampleCenter.y + 0.27,
    sampleCenter.z
  );

  board.position.lerp(
    boardTarget,
    1 -
    Math.exp(
      -9 *
      deltaTime
    )
  );

  board.quaternion.slerp(
    boardQuaternion,
    1 -
    Math.exp(
      -6 *
      deltaTime
    )
  );

  boardState.lateralVelocity +=
    (
      Math.sin(
        simulationTime * 0.72
      ) *
      0.12 -
      boardState.lateralVelocity *
      0.75
    ) *
    deltaTime;

  boardState.x +=
    boardState.lateralVelocity *
    deltaTime;

  boardState.x =
    clamp(
      boardState.x,
      20.5,
      25.5
    );
}

function bindRange(
  elementId,
  parameterName,
  decimals
) {
  const input =
    document.getElementById(
      elementId
    );

  const output =
    document.getElementById(
      elementId + "Out"
    );

  function update() {
    params[parameterName] =
      Number(input.value);

    output.value =
      Number(input.value)
        .toFixed(decimals);
  }

  input.addEventListener(
    "input",
    update
  );

  update();
}

    () => {
      camera.position.set(
        24,
        6.5,
        -21
      );

      controls.target.set(
        0,
        3.2,
        -5
      );
    }
  );

document
  .getElementById("overview")
  .addEventListener(
    "click",
    () => {
      camera.position.set(
        31,
        15,
        -30
      );

      controls.target.set(
        0,
        1.8,
        -3
      );
    }
  );

document
  .getElementById("resetBoard")
  .addEventListener(
    "click",
    resetBoard
  );

/* ---------------------------------------------------------
   Resize
--------------------------------------------------------- */

window.addEventListener(
  "resize",
  () => {
    camera.aspect =
      window.innerWidth /
      window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setPixelRatio(
      Math.min(
        window.devicePixelRatio,
        1.65
      )
    );

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );
  }
);

/* ---------------------------------------------------------
   Animation
--------------------------------------------------------- */

const clock =
  new THREE.Clock();

const statusElement =
  document.getElementById("status");

let frameCounter = 0;
let fpsTimer = performance.now();
let displayedFps = 0;

updateBarrelState();
updateOcean();
updateBarrelMesh();
resetBoard();

function animate() {
  requestAnimationFrame(animate);

  const rawDeltaTime =
    Math.min(
      clock.getDelta(),
      0.034
    );

  const deltaTime =
    paused
      ? 0
      : rawDeltaTime;

  if (!paused) {
    simulationTime +=
      deltaTime;

    waveTravel +=
      (
        WAVELENGTH /
        params.period
      ) *
      deltaTime;

    if (waveTravel >= WAVELENGTH) {
      waveTravel %=
        WAVELENGTH;

      resetBoard();
    }
  }

  updateBarrelState();
  updateOcean();
  updateBarrelMesh();

  if (!paused) {
    spawnWhitewater(
      deltaTime
    );

    updateParticles(
      deltaTime
    );

    updateBoard(
      deltaTime
    );
  }

  waterMaterial.uniforms.time.value =
    simulationTime;

  controls.update();

  renderer.render(
    scene,
    camera
  );

  frameCounter++;

  const now =
    performance.now();

  if (now - fpsTimer > 500) {
    displayedFps =
      Math.round(
        frameCounter *
        1000 /
        (now - fpsTimer)
      );

    frameCounter = 0;
    fpsTimer = now;
  }

  statusElement.textContent =
    `${displayedFps} fps\n` +
    `${renderer.info.render.triangles.toLocaleString()} triangles`;
}

animate();
</script>
