<body>
<div id="hud">

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const ui = {
  height: document.getElementById("height"),
  period: document.getElementById("period"),
  depth: document.getElementById("depth"),
  barrel: document.getElementById("barrel"),
  wind: document.getElementById("wind")
};

// -----------------------------------------------------------------------------
// Physics helpers
// -----------------------------------------------------------------------------

const G = 9.81;
const RHO = 1025;
const TAU = Math.PI * 2;

const clamp = THREE.MathUtils.clamp;
const lerp = THREE.MathUtils.lerp;

const smoothstep = (a, b, x) => {
  const t = clamp((x - a) / (b - a), 0, 1);
  return t * t * (3 - 2 * t);
};

function solveDispersion(omega, depth) {
  /*
    Finite-depth gravity-wave dispersion relation:

        omega² = g k tanh(kh)

    Solved with Newton iteration.
  */

  let k = Math.max(
    omega * omega / G,
    omega / Math.sqrt(G * depth)
  );

  for (let i = 0; i < 16; i++) {
    const kh = k * depth;
    const th = Math.tanh(kh);
    const sech2 =
      1 / (Math.cosh(kh) * Math.cosh(kh));

    const f =
      G * k * th -
      omega * omega;

    const df =
      G * (th + k * depth * sech2);

    k = Math.max(
      1e-4,
      k - f / df
    );
  }

  return k;
}

function getPhysics() {
  const H0 = +ui.height.value;
  const T = +ui.period.value;
  const h = +ui.depth.value;

  const omega = TAU / T;
  const k = solveDispersion(omega, h);

  const L = TAU / k;
  const c = omega / k;

  const kh = k * h;

  const n =
    0.5 *
    (
      1 +
      (2 * kh) / Math.sinh(2 * kh)
    );

  const cg = n * c;

  /*
    Deep-water group velocity is used as the
    shoaling reference.
  */

  const k0 = omega * omega / G;
  const c0 = omega / k0;
  const cg0 = c0 * 0.5;

  const Ks = Math.sqrt(cg0 / cg);
  const Hlinear = H0 * Ks;

  /*
    Depth-limited breaker index:

        Hb ≈ gamma h
        gamma ≈ 0.78
  */

  const Hb = 0.78 * h;
  const H = Math.min(Hlinear, Hb);

  const ratio = H / h;

  const depthBreak =
    smoothstep(0.5, 0.78, ratio);

  const steepBreak =
    smoothstep(0.075, 0.13, H / L);

  const B = clamp(
    (
      0.22 +
      0.78 *
      Math.max(depthBreak, steepBreak)
    ) *
    (+ui.barrel.value),
    0,
    1
  );

  /*
    Linear wave energy density:

        E = rho g H² / 8

    Wave energy flux:

        P = E Cg
  */

  const E =
    RHO *
    G *
    H *
    H /
    8;

  const P = E * cg;

  return {
    H0,
    T,
    h,
    omega,
    k,
    L,
    c,
    cg,
    Ks,
    Hlinear,
    H,
    Hb,
    ratio,
    B,
    E,
    P
  };
}

// -----------------------------------------------------------------------------
// Renderer, scene and camera
// -----------------------------------------------------------------------------

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: "high-performance"
});

renderer.setPixelRatio(
  Math.min(devicePixelRatio, 2)
);

renderer.setSize(
  innerWidth,
  innerHeight
);

renderer.outputColorSpace =
  THREE.SRGBColorSpace;

renderer.toneMapping =
  THREE.ACESFilmicToneMapping;

renderer.toneMappingExposure = 1.05;

renderer.shadowMap.enabled = true;
renderer.shadowMap.type =
  THREE.PCFSoftShadowMap;

document.body.appendChild(
  renderer.domElement
);

const scene = new THREE.Scene();

scene.background =
  new THREE.Color(0x78cce0);

scene.fog =
  new THREE.FogExp2(
    0x74c7da,
    0.018
  );

const camera =
  new THREE.PerspectiveCamera(
    48,
    innerWidth / innerHeight,
    0.1,
    180
  );

camera.position.set(
  13,
  7.6,
  18
);

const controls =
  new OrbitControls(
    camera,
    renderer.domElement
  );

controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(-0.5, 2.0, 0);
controls.minDistance = 7;
controls.maxDistance = 45;
controls.maxPolarAngle =
  Math.PI * 0.52;

controls.update();

scene.add(
  new THREE.HemisphereLight(
    0xcaf4ff,
    0x17414c,
    2.2
  )
);

const sun =
  new THREE.DirectionalLight(
    0xfff4d8,
    4.2
  );

sun.position.set(
  -8,
  16,
  10
);

sun.castShadow = true;

sun.shadow.mapSize.set(
  2048,
  2048
);

sun.shadow.camera.left = -25;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -12;

scene.add(sun);

const fill =
  new THREE.DirectionalLight(
    0x7adfff,
    1.1
  );

fill.position.set(
  12,
  5,
  -10
);

scene.add(fill);

// -----------------------------------------------------------------------------
// Sky dome
// -----------------------------------------------------------------------------

const sky =
  new THREE.Mesh(
    new THREE.SphereGeometry(
      100,
      32,
      16
    ),
    new THREE.ShaderMaterial({
      side: THREE.BackSide,

      uniforms: {
        top: {
          value:
            new THREE.Color(0x0d5f86)
        },

        bottom: {
          value:
            new THREE.Color(0xa8e8ef)
        }
      },

      vertexShader: `
        varying vec3 vP;

        void main() {
          vP = position;

          gl_Position =
            projectionMatrix *
            modelViewMatrix *
            vec4(position, 1.0);
        }
      `,

      fragmentShader: `
        uniform vec3 top;
        uniform vec3 bottom;

        varying vec3 vP;

        void main() {
          float h =
            clamp(
              normalize(vP).y * 0.5 + 0.5,
              0.0,
              1.0
            );

          gl_FragColor =
            vec4(
              mix(
                bottom,
                top,
                pow(h, 0.72)
              ),
              1.0
            );
        }
      `
    })
  );

scene.add(sky);

// -----------------------------------------------------------------------------
// Seabed
// -----------------------------------------------------------------------------

const seabed =
  new THREE.Mesh(
    new THREE.PlaneGeometry(
      90,
      70
    ),
    new THREE.MeshStandardMaterial({
      color: 0x7d8b79,
      roughness: 1,
      metalness: 0
    })
  );

seabed.rotation.x =
  -Math.PI / 2;

seabed.position.y = -5.2;
seabed.receiveShadow = true;

scene.add(seabed);

// -----------------------------------------------------------------------------
// Background ocean surface
// -----------------------------------------------------------------------------

const oceanGeo =
  new THREE.PlaneGeometry(
    90,
    62,
    120,
    80
  );

oceanGeo.rotateX(
  -Math.PI / 2
);

const oceanPos =
  oceanGeo.attributes.position;

const oceanBase =
  new Float32Array(
    oceanPos.array.length
  );

oceanBase.set(
  oceanPos.array
);

const oceanMat =
  new THREE.MeshPhysicalMaterial({
    color: 0x118aa0,
    roughness: 0.18,
    metalness: 0,
    clearcoat: 1,
    clearcoatRoughness: 0.08,
    transparent: true,
    opacity: 0.92,
    side: THREE.DoubleSide
  });

const ocean =
  new THREE.Mesh(
    oceanGeo,
    oceanMat
  );

ocean.position.y = -0.14;
ocean.receiveShadow = true;

scene.add(ocean);

const oceanWaves = [
  {
    A: 0.15,
    kx: 0.26,
    kz: 0.08,
    w: 1.15,
    p: 0
  },
  {
    A: 0.09,
    kx: -0.12,
    kz: 0.31,
    w: 1.55,
    p: 1.7
  },
  {
    A: 0.05,
    kx: 0.43,
    kz: -0.22,
    w: 2.05,
    p: 3.4
  }
];

function updateOcean(t) {
  const a = oceanPos.array;

  for (
    let i = 0;
    i < oceanPos.count;
    i++
  ) {
    const x =
      oceanBase[i * 3];

    const z =
      oceanBase[i * 3 + 2];

    let y = 0;

    for (const q of oceanWaves) {
      y +=
        q.A *
        Math.sin(
          q.kx * x +
          q.kz * z -
          q.w * t +
          q.p
        );
    }

    a[i * 3] = x;
    a[i * 3 + 1] = y;
    a[i * 3 + 2] = z;
  }

  oceanPos.needsUpdate = true;

  if ((frame & 3) === 0) {
    oceanGeo.computeVertexNormals();
  }
}

// -----------------------------------------------------------------------------
// Closed volumetric breaker mesh
// -----------------------------------------------------------------------------

const WAVE_SPAN = 22;
const Z_SLICES = 52;

let outlineCount = 0;
let crestIndex = 0;
let lipIndex = 0;
let impactIndex = 0;
let shoulderIndex = 0;

let latestSections = [];

function bezierPoint(
  p0,
  p1,
  p2,
  p3,
  t
) {
  const it = 1 - t;

  return {
    x:
      it * it * it * p0.x +
      3 * it * it * t * p1.x +
      3 * it * t * t * p2.x +
      t * t * t * p3.x,

    y:
      it * it * it * p0.y +
      3 * it * it * t * p1.y +
      3 * it * t * t * p2.y +
      t * t * t * p3.y
  };
}

function addBezier(
  out,
  p0,
  p1,
  p2,
  p3,
  steps,
  tag,
  skipFirst = true
) {
  for (
    let i = skipFirst ? 1 : 0;
    i <= steps;
    i++
  ) {
    const s = i / steps;

    const p =
      bezierPoint(
        p0,
        p1,
        p2,
        p3,
        s
      );

    out.push({
      x: p.x,
      y: p.y,
      tag,
      s
    });
  }
}

function makeOutline(
  phys,
  z,
  t
) {
  const phase =
    z * 0.27 -
    t * 0.55;

  const edge =
    0.78 +
    0.22 *
    Math.pow(
      Math.cos(
        (z / WAVE_SPAN) *
        Math.PI
      ),
      2
    );

  const H =
    phys.H *
    edge *
    (
      1 +
      0.045 *
      Math.sin(phase)
    );

  const B =
    clamp(
      phys.B *
      (
        0.9 +
        0.1 *
        Math.sin(
          phase + 0.7
        )
      ),
      0,
      1
    );

  const crestY =
    0.68 *
    H *
    (
      1 +
      0.24 * B
    ) +
    0.38;

  const rearX = -13.2;
  const shoulderX = -5.1;

  const crestX =
    -1.15 +
    0.12 *
    Math.sin(phase);

  const lipReach =
    lerp(
      1,
      4.15,
      B
    );

  const lipX =
    crestX +
    lipReach;

  const impactX =
    lerp(
      3.1,
      6,
      B
    );

  const bottom =
    -Math.min(
      4.3,
      0.58 * phys.h
    );

  const out = [];

  /*
    Back shoulder.

    This starts near mean sea level and
    adds substantial water volume behind
    the crest instead of creating a thin
    folded sheet.
  */

  addBezier(
    out,

    {
      x: rearX,
      y: 0.02
    },

    {
      x: -10.6,
      y: 0.02 + 0.03 * H
    },

    {
      x: -7.6,
      y: 0.05 + 0.12 * H
    },

    {
      x: shoulderX,
      y: 0.18 * crestY
    },

    28,
    "rear",
    false
  );

  shoulderIndex =
    out.length + 12;

  /*
    Steepening wave face.
  */

  addBezier(
    out,

    {
      x: shoulderX,
      y: 0.18 * crestY
    },

    {
      x: -3.7,
      y: 0.27 * crestY
    },

    {
      x: -2.7,
      y: 0.78 * crestY
    },

    {
      x: crestX,
      y: crestY
    },

    24,
    "rise",
    true
  );

  crestIndex =
    out.length - 1;

  /*
    Outer surface of the crest and lip.
  */

  addBezier(
    out,

    {
      x: crestX,
      y: crestY
    },

    {
      x:
        crestX +
        0.95 +
        0.25 * B,

      y:
        crestY *
        (
          1.08 +
          0.04 * B
        )
    },

    {
      x:
        lipX -
        0.18,

      y:
        crestY *
        (
          0.94 -
          0.06 * B
        )
    },

    {
      x: lipX,

      y:
        crestY *
        lerp(
          0.8,
          0.57,
          B
        )
    },

    20,
    "outerLip",
    true
  );

  lipIndex =
    out.length - 1;

  /*
    Underside of the plunging lip.

    This branch travels backwards beneath
    the outer lip and creates the hollow
    air barrel.
  */

  addBezier(
    out,

    {
      x: lipX,

      y:
        crestY *
        lerp(
          0.8,
          0.57,
          B
        )
    },

    {
      x:
        lipX +
        0.12 * B,

      y:
        crestY *
        0.42
    },

    {
      x:
        crestX +
        2.1,

      y:
        crestY *
        0.28
    },

    {
      x:
        crestX +
        1.05,

      y:
        crestY *
        0.19
    },

    20,
    "innerLip",
    true
  );

  /*
    Lower face and trough leading to the
    impact zone.
  */

  addBezier(
    out,

    {
      x:
        crestX +
        1.05,

      y:
        crestY *
        0.19
    },

    {
      x:
        crestX +
        2,

      y:
        crestY *
        0.11
    },

    {
      x:
        impactX -
        1.2,

      y:
        0.03 *
        crestY
    },

    {
      x: impactX,
      y: 0.01
    },

    26,
    "lowerFace",
    true
  );

  impactIndex =
    out.length - 1;

  /*
    Close the cross-section below the
    surface. These points make it a solid,
    enclosed body of water.
  */

  out.push({
    x: impactX + 0.55,
    y: bottom,
    tag: "bottom",
    s: 0
  });

  out.push({
    x: rearX,
    y: bottom,
    tag: "bottom",
    s: 1
  });

  /*
    Add small finite-depth orbital motion
    over the breaker envelope.

    The actual overturning envelope is
    kinematic because exact overturning
    requires a free-surface Navier–Stokes
    or SPH solver.
  */

  const ka =
    0.16 *
    phys.H *
    phys.k;

  for (const p of out) {
    const top =
      p.tag === "bottom"
        ? 0
        : 1;

    const q =
      phys.k * p.x -
      phys.omega *
      t *
      0.2 +
      z * 0.08;

    const second =
      0.5 * ka;

    p.x +=
      top *
      (
        0.08 *
        phys.H *
        Math.cos(q) +

        0.018 *
        phys.H *
        second *
        Math.cos(2 * q)
      );

    p.y +=
      top *
      (
        0.055 *
        phys.H *
        Math.sin(q) +

        0.014 *
        phys.H *
        second *
        Math.sin(2 * q)
      );
  }

  return out;
}

const phys0 =
  getPhysics();

const template =
  makeOutline(
    phys0,
    0,
    0
  );

outlineCount =
  template.length;

const wavePositions =
  new Float32Array(
    Z_SLICES *
    outlineCount *
    3
  );

const waveColors =
  new Float32Array(
    Z_SLICES *
    outlineCount *
    3
  );

const waveIndices = [];

/*
  Connect every closed cross-section to
  the neighboring cross-section.
*/

for (
  let j = 0;
  j < Z_SLICES - 1;
  j++
) {
  for (
    let i = 0;
    i < outlineCount;
    i++
  ) {
    const ni =
      (i + 1) %
      outlineCount;

    const a =
      j *
      outlineCount +
      i;

    const b =
      j *
      outlineCount +
      ni;

    const c =
      (j + 1) *
      outlineCount +
      i;

    const d =
      (j + 1) *
      outlineCount +
      ni;

    waveIndices.push(
      a,
      c,
      b,

      b,
      c,
      d
    );
  }
}

/*
  Triangulate both end caps so the wave
  is a completely closed water volume.
*/

const contour =
  template.map(
    p =>
      new THREE.Vector2(
        p.x,
        p.y
      )
  );

const capFaces =
  THREE.ShapeUtils.triangulateShape(
    contour,
    []
  );

for (const f of capFaces) {
  waveIndices.push(
    f[2],
    f[1],
    f[0]
  );

  const o =
    (Z_SLICES - 1) *
    outlineCount;

  waveIndices.push(
    o + f[0],
    o + f[1],
    o + f[2]
  );
}

const tagColor = {
  rear:
    new THREE.Color(
      0x1299ad
    ),

  rise:
    new THREE.Color(
      0x08788f
    ),

  outerLip:
    new THREE.Color(
      0x0b6e84
    ),

  innerLip:
    new THREE.Color(
      0x034252
    ),

  lowerFace:
    new THREE.Color(
      0x075f72
    ),

  bottom:
    new THREE.Color(
      0x064554
    )
};

for (
  let j = 0;
  j < Z_SLICES;
  j++
) {
  for (
    let i = 0;
    i < outlineCount;
    i++
  ) {
    const c =
      tagColor[
        template[i].tag
      ] ||
      tagColor.rise;

    const o =
      (
        j *
        outlineCount +
        i
      ) *
      3;

    waveColors[o] = c.r;
    waveColors[o + 1] = c.g;
    waveColors[o + 2] = c.b;
  }
}

const waveGeo =
  new THREE.BufferGeometry();

waveGeo.setAttribute(
  "position",
  new THREE.BufferAttribute(
    wavePositions,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

waveGeo.setAttribute(
  "color",
  new THREE.BufferAttribute(
    waveColors,
    3
  )
);

waveGeo.setIndex(
  waveIndices
);

const waveMat =
  new THREE.MeshPhysicalMaterial({
    vertexColors: true,
    roughness: 0.16,
    metalness: 0,
    clearcoat: 1,
    clearcoatRoughness: 0.06,
    side: THREE.DoubleSide,
    transparent: false
  });

const waveMesh =
  new THREE.Mesh(
    waveGeo,
    waveMat
  );

waveMesh.castShadow = true;
waveMesh.receiveShadow = true;

scene.add(waveMesh);

function updateWave(
  t,
  phys
) {
  const arr =
    waveGeo
      .attributes
      .position
      .array;

  latestSections.length =
    Z_SLICES;

  for (
    let j = 0;
    j < Z_SLICES;
    j++
  ) {
    const z =
      lerp(
        -WAVE_SPAN / 2,
        WAVE_SPAN / 2,
        j /
        (Z_SLICES - 1)
      );

    const sec =
      makeOutline(
        phys,
        z,
        t
      );

    latestSections[j] =
      sec;

    for (
      let i = 0;
      i < outlineCount;
      i++
    ) {
      const p = sec[i];

      const o =
        (
          j *
          outlineCount +
          i
        ) *
        3;

      arr[o] = p.x;
      arr[o + 1] = p.y;

      arr[o + 2] =
        z +
        (
          p.tag === "bottom"
            ? 0
            : 0.06 *
              Math.sin(
                0.45 * p.x +
                z * 0.22 -
                t
              )
        );
    }
  }

  waveGeo
    .attributes
    .position
    .needsUpdate = true;

  if ((frame & 1) === 0) {
    waveGeo.computeVertexNormals();
  }
}

// -----------------------------------------------------------------------------
// Crest foam ribbon
// -----------------------------------------------------------------------------

const foamPos =
  new Float32Array(
    Z_SLICES *
    2 *
    3
  );

const foamIdx = [];

for (
  let j = 0;
  j < Z_SLICES - 1;
  j++
) {
  const a = j * 2;
  const b = a + 1;
  const c = a + 2;
  const d = a + 3;

  foamIdx.push(
    a,
    c,
    b,

    b,
    c,
    d
  );
}

const foamGeo =
  new THREE.BufferGeometry();

foamGeo.setAttribute(
  "position",
  new THREE.BufferAttribute(
    foamPos,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

foamGeo.setIndex(
  foamIdx
);

const foamMat =
  new THREE.MeshStandardMaterial({
    color: 0xf4ffff,
    roughness: 0.82,
    transparent: true,
    opacity: 0.88,
    side: THREE.DoubleSide,
    depthWrite: false
  });

const foamRibbon =
  new THREE.Mesh(
    foamGeo,
    foamMat
  );

foamRibbon.renderOrder = 3;

scene.add(foamRibbon);

function updateFoamRibbon() {
  const src =
    waveGeo
      .attributes
      .position
      .array;

  const dst =
    foamGeo
      .attributes
      .position
      .array;

  const idxA =
    Math.max(
      0,
      crestIndex - 2
    );

  const idxB =
    Math.min(
      outlineCount - 1,
      crestIndex + 6
    );

  for (
    let j = 0;
    j < Z_SLICES;
    j++
  ) {
    for (
      let r = 0;
      r < 2;
      r++
    ) {
      const si =
        (
          j *
          outlineCount +
          (
            r
              ? idxB
              : idxA
          )
        ) *
        3;

      const di =
        (
          j * 2 +
          r
        ) *
        3;

      dst[di] =
        src[si];

      dst[di + 1] =
        src[si + 1] +
        0.07;

      dst[di + 2] =
        src[si + 2];
    }
  }

  foamGeo
    .attributes
    .position
    .needsUpdate = true;

  if ((frame & 3) === 0) {
    foamGeo.computeVertexNormals();
  }
}

// -----------------------------------------------------------------------------
// Spray and whitewater particles
// -----------------------------------------------------------------------------

const PARTICLES = 1000;

const pPos =
  new Float32Array(
    PARTICLES * 3
  );

const pVel =
  new Float32Array(
    PARTICLES * 3
  );

const pLife =
  new Float32Array(
    PARTICLES
  );

for (
  let i = 0;
  i < PARTICLES;
  i++
) {
  pPos[i * 3 + 1] = -999;
}

const pGeo =
  new THREE.BufferGeometry();

pGeo.setAttribute(
  "position",
  new THREE.BufferAttribute(
    pPos,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

pGeo.setAttribute(
  "aLife",
  new THREE.BufferAttribute(
    pLife,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

const pMat =
  new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending:
      THREE.AdditiveBlending,

    vertexShader: `
      attribute float aLife;

      varying float vLife;

      void main() {
        vLife = aLife;

        vec4 mv =
          modelViewMatrix *
          vec4(position, 1.0);

        gl_PointSize =
          (
            3.0 +
            13.0 *
            aLife
          ) *
          (
            260.0 /
            max(
              1.0,
              -mv.z
            )
          );

        gl_Position =
          projectionMatrix *
          mv;
      }
    `,

    fragmentShader: `
      varying float vLife;

      void main() {
        vec2 q =
          gl_PointCoord -
          0.5;

        float d =
          dot(q, q);

        if (d > 0.25) {
          discard;
        }

        float a =
          smoothstep(
            0.25,
            0.02,
            d
          ) *
          smoothstep(
            0.0,
            0.18,
            vLife
          );

        gl_FragColor =
          vec4(
            mix(
              vec3(
                0.55,
                0.95,
                1.0
              ),
              vec3(1.0),
              vLife
            ),
            a * 0.95
          );
      }
    `
  });

const spray =
  new THREE.Points(
    pGeo,
    pMat
  );

spray.frustumCulled = false;

scene.add(spray);

let particleCursor = 0;

function waveVertex(
  slice,
  index
) {
  const a =
    waveGeo
      .attributes
      .position
      .array;

  const o =
    (
      slice *
      outlineCount +
      index
    ) *
    3;

  return new THREE.Vector3(
    a[o],
    a[o + 1],
    a[o + 2]
  );
}

function spawnParticle(
  origin,
  kind,
  phys
) {
  const i =
    particleCursor++ %
    PARTICLES;

  const o = i * 3;

  pPos[o] =
    origin.x +
    (
      Math.random() -
      0.5
    ) *
    0.18;

  pPos[o + 1] =
    origin.y +
    (
      Math.random() -
      0.5
    ) *
    0.12;

  pPos[o + 2] =
    origin.z +
    (
      Math.random() -
      0.5
    ) *
    0.45;

  const wind =
    +ui.wind.value;

  if (kind === "lip") {
    pVel[o] =
      1.2 +
      Math.random() *
      2.4;

    pVel[o + 1] =
      1.3 +
      Math.random() *
      2.8;

    pVel[o + 2] =
      (
        Math.random() -
        0.5
      ) *
      1.7 +
      wind *
      1.7;
  } else {
    pVel[o] =
      0.4 +
      Math.random() *
      1.7;

    pVel[o + 1] =
      0.7 +
      Math.random() *
      1.9;

    pVel[o + 2] =
      (
        Math.random() -
        0.5
      ) *
      2.5;
  }

  pLife[i] =
    0.65 +
    Math.random() *
    0.35;
}

function updateParticles(
  dt,
  phys
) {
  const emit =
    Math.floor(
      5 +
      18 * phys.B
    );

  for (
    let n = 0;
    n < emit;
    n++
  ) {
    const s =
      Math.floor(
        Math.random() *
        Z_SLICES
      );

    spawnParticle(
      waveVertex(
        s,
        lipIndex
      ),
      "lip",
      phys
    );

    if ((n & 1) === 0) {
      spawnParticle(
        waveVertex(
          s,
          impactIndex
        ),
        "impact",
        phys
      );
    }
  }

  for (
    let i = 0;
    i < PARTICLES;
    i++
  ) {
    if (pLife[i] <= 0) {
      continue;
    }

    const o = i * 3;

    pLife[i] -=
      dt *
      (
        0.34 +
        0.45 *
        (
          1 -
          pLife[i]
        )
      );

    pVel[o + 1] -=
      G *
      0.26 *
      dt;

    pVel[o] *=
      Math.pow(
        0.992,
        dt * 60
      );

    pVel[o + 2] *=
      Math.pow(
        0.992,
        dt * 60
      );

    pPos[o] +=
      pVel[o] *
      dt;

    pPos[o + 1] +=
      pVel[o + 1] *
      dt;

    pPos[o + 2] +=
      pVel[o + 2] *
      dt;

    if (pLife[i] <= 0) {
      pPos[o + 1] = -999;
    }
  }

  pGeo
    .attributes
    .position
    .needsUpdate = true;

  pGeo
    .attributes
    .aLife
    .needsUpdate = true;
}

// -----------------------------------------------------------------------------
// Low-poly surfboard
// -----------------------------------------------------------------------------

function createBoard() {
  const group =
    new THREE.Group();

  const seg = 16;
  const L = 3;
  const W = 0.72;
  const T = 0.13;

  const verts = [];
  const idx = [];

  for (
    let ring = 0;
    ring < 2;
    ring++
  ) {
    const y =
      ring
        ? T / 2
        : -T / 2;

    for (
      let i = 0;
      i < seg;
      i++
    ) {
      const a =
        TAU *
        i /
        seg;

      const z =
        Math.cos(a) *
        L /
        2;

      const taper =
        Math.pow(
          Math.max(
            0,
            1 -
            Math.pow(
              Math.abs(z) /
              (L / 2),
              1.65
            )
          ),
          0.34
        );

      const x =
        Math.sin(a) *
        W /
        2 *
        taper;

      const rocker =
        0.14 *
        Math.pow(
          Math.abs(z) /
          (L / 2),
          2.5
        );

      verts.push(
        x,
        y + rocker,
        z
      );
    }
  }

  const topCenter =
    verts.length / 3;

  verts.push(
    0,
    T / 2 + 0.02,
    0
  );

  const botCenter =
    verts.length / 3;

  verts.push(
    0,
    -T / 2,
    0
  );

  for (
    let i = 0;
    i < seg;
    i++
  ) {
    const n =
      (i + 1) % seg;

    idx.push(
      topCenter,
      seg + i,
      seg + n
    );

    idx.push(
      botCenter,
      n,
      i
    );

    idx.push(
      i,
      n,
      seg + i,

      n,
      seg + n,
      seg + i
    );
  }

  const g =
    new THREE.BufferGeometry();

  g.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(
      verts,
      3
    )
  );

  g.setIndex(idx);
  g.computeVertexNormals();

  const deck =
    new THREE.Mesh(
      g,
      new THREE.MeshStandardMaterial({
        color: 0xf0cf55,
        roughness: 0.58,
        metalness: 0,
        flatShading: true
      })
    );

  deck.castShadow = true;

  group.add(deck);

  const stripe =
    new THREE.Mesh(
      new THREE.BoxGeometry(
        0.08,
        0.025,
        1.25
      ),
      new THREE.MeshStandardMaterial({
        color: 0x174e62,
        roughness: 0.7
      })
    );

  stripe.position.y = 0.1;
  stripe.position.z = -0.15;

  group.add(stripe);

  const fin =
    new THREE.Mesh(
      new THREE.ConeGeometry(
        0.14,
        0.48,
        3
      ),
      new THREE.MeshStandardMaterial({
        color: 0x174e62,
        roughness: 0.65,
        flatShading: true
      })
    );

  fin.rotation.z = Math.PI;

  fin.position.set(
    0,
    -0.28,
    0.7
  );

  group.add(fin);

  return group;
}

const board =
  createBoard();

scene.add(board);

let boardZ = -6.5;

// -----------------------------------------------------------------------------
// Surfboard wake
// -----------------------------------------------------------------------------

const TRAIL = 42;

const trailArray =
  new Float32Array(
    TRAIL * 3
  );

const trailGeo =
  new THREE.BufferGeometry();

trailGeo.setAttribute(
  "position",
  new THREE.BufferAttribute(
    trailArray,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

const trail =
  new THREE.Line(
    trailGeo,
    new THREE.LineBasicMaterial({
      color: 0xe9ffff,
      transparent: true,
      opacity: 0.78,
      depthWrite: false
    })
  );

scene.add(trail);

let trailPoints =
  Array.from(
    {
      length: TRAIL
    },
    () =>
      new THREE.Vector3(
        0,
        -999,
        0
      )
  );

function updateBoard(
  dt,
  phys
) {
  /*
    Board speed is tied to wave-energy flux.

    Larger H and greater group velocity
    push it faster along the shoulder.
  */

  const normalizedPower =
    clamp(
      phys.P /
      420000,
      0,
      1
    );

  const speed =
    0.7 +
    3.1 *
    Math.sqrt(
      normalizedPower
    );

  boardZ +=
    speed *
    dt;

  if (
    boardZ >
    WAVE_SPAN / 2 -
    1.2
  ) {
    boardZ =
      -WAVE_SPAN / 2 +
      1.2;

    for (
      const p of trailPoints
    ) {
      p.set(
        0,
        -999,
        0
      );
    }
  }

  const f =
    (
      boardZ +
      WAVE_SPAN / 2
    ) /
    WAVE_SPAN;

  const j =
    clamp(
      Math.round(
        f *
        (
          Z_SLICES -
          1
        )
      ),
      1,
      Z_SLICES - 2
    );

  const p =
    waveVertex(
      j,
      shoulderIndex
    );

  const pL =
    waveVertex(
      j,
      Math.max(
        0,
        shoulderIndex - 1
      )
    );

  const pR =
    waveVertex(
      j,
      Math.min(
        outlineCount - 1,
        shoulderIndex + 1
      )
    );

  const pZ0 =
    waveVertex(
      j - 1,
      shoulderIndex
    );

  const pZ1 =
    waveVertex(
      j + 1,
      shoulderIndex
    );

  board.position.set(
    p.x,
    p.y + 0.24,
    p.z
  );

  const slopeX =
    Math.atan2(
      pR.y - pL.y,
      pR.x - pL.x
    );

  const slopeZ =
    Math.atan2(
      pZ1.y - pZ0.y,
      pZ1.z - pZ0.z
    );

  board.rotation.order = "YXZ";

  board.rotation.y =
    0.08 *
    Math.sin(
      simTime * 0.7
    ) +
    0.04;

  board.rotation.x =
    -slopeZ *
    0.85 +
    0.03 *
    Math.sin(
      simTime * 2.1
    );

  board.rotation.z =
    -slopeX *
    0.62;

  trailPoints.unshift(
    new THREE.Vector3(
      p.x + 0.08,
      p.y + 0.1,
      p.z - 1.2
    )
  );

  trailPoints.pop();

  for (
    let i = 0;
    i < TRAIL;
    i++
  ) {
    const q =
      trailPoints[i];

    trailArray[i * 3] =
      q.x;

    trailArray[i * 3 + 1] =
      q.y +
      0.02 *
      Math.sin(
        simTime * 5 -
        i * 0.25
      );

    trailArray[i * 3 + 2] =
      q.z;
  }

  trailGeo
    .attributes
    .position
    .needsUpdate = true;
}

// -----------------------------------------------------------------------------
// UI
// -----------------------------------------------------------------------------

function updateReadout(
  phys
) {
  document
    .getElementById(
      "heightOut"
    )
    .textContent =
      (+ui.height.value)
        .toFixed(1) +
      " m";

  document
    .getElementById(
      "periodOut"
    )
    .textContent =
      (+ui.period.value)
        .toFixed(1) +
      " s";

  document
    .getElementById(
      "depthOut"
    )
    .textContent =
      (+ui.depth.value)
        .toFixed(1) +
      " m";

  document
    .getElementById(
      "barrelOut"
    )
    .textContent =
      Math.round(
        +ui.barrel.value *
        100
      ) +
      "%";

  document
    .getElementById(
      "windOut"
    )
    .textContent =
      (+ui.wind.value)
        .toFixed(2);

  document
    .getElementById(
      "sH"
    )
    .textContent =
      phys.H.toFixed(2) +
      " m";

  document
    .getElementById(
      "sL"
    )
    .textContent =
      phys.L.toFixed(1) +
      " m";

  document
    .getElementById(
      "sR"
    )
    .textContent =
      phys.ratio.toFixed(2);

  document
    .getElementById(
      "sP"
    )
    .textContent =
      (
        phys.P /
        1000
      ).toFixed(0) +
      " kW/m";
}

for (
  const el of
  Object.values(ui)
) {
  el.addEventListener(
    "input",
    () =>
      updateReadout(
        getPhysics()
      )
  );
}

let paused = false;
let cinematic = false;

document
  .getElementById("pause")
  .onclick = () => {
    paused = !paused;

    document
      .getElementById(
        "pause"
      )
      .textContent =
        paused
          ? "Resume"
          : "Pause";
  };

document
  .getElementById("reset")
  .onclick = () => {
    boardZ = -6.5;

    for (
      const p of trailPoints
    ) {
      p.set(
        0,
        -999,
        0
      );
    }
  };

document
  .getElementById("camera")
  .onclick = () => {
    cinematic = !cinematic;
    controls.enabled = !cinematic;

    document
      .getElementById(
        "camera"
      )
      .textContent =
        cinematic
          ? "Free camera"
          : "Cinematic camera";
  };

// -----------------------------------------------------------------------------
// Animation
// -----------------------------------------------------------------------------

let last =
  performance.now();

let simTime = 0;
let frame = 0;

function animate(now) {
  requestAnimationFrame(
    animate
  );

  const rawDt =
    Math.min(
      0.033,
      (now - last) /
      1000
    );

  last = now;

  const dt =
    paused
      ? 0
      : rawDt;

  simTime += dt;
  frame++;

  const phys =
    getPhysics();

  updateReadout(phys);
  updateOcean(simTime);
  updateWave(simTime, phys);
  updateFoamRibbon();
  updateParticles(dt, phys);
  updateBoard(dt, phys);

  if (cinematic) {
    const a =
      simTime *
      0.09;

    camera.position.set(
      12.5 +
      2.2 *
      Math.sin(a),

      7 +
      Math.sin(
        a * 0.7
      ),

      17 *
      Math.cos(
        a * 0.22
      )
    );

    camera.lookAt(
      -0.4,
      2,
      boardZ * 0.18
    );
  } else {
    controls.update();
  }

  renderer.render(
    scene,
    camera
  );
}

updateReadout(
  getPhysics()
);

updateWave(
  0,
  getPhysics()
);

updateFoamRibbon();

requestAnimationFrame(
  animate
);

addEventListener(
  "resize",
  () => {
    camera.aspect =
      innerWidth /
      innerHeight;

    camera
      .updateProjectionMatrix();

    renderer.setSize(
      innerWidth,
      innerHeight
    );

    renderer.setPixelRatio(
      Math.min(
        devicePixelRatio,
        2
      )
    );
  }
);
