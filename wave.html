<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta
  name="viewport"
  content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
>
<title>Breaking Wave — Thürey et al. browser adaptation</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #061b26;
    color: #eefbff;
    font-family:
      Inter,
      system-ui,
      -apple-system,
      Segoe UI,
      Roboto,
      sans-serif;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  #ui {
    position: fixed;
    z-index: 10;
    top: 12px;
    left: 12px;
    width: min(370px, calc(100vw - 24px));
    padding: 14px;
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: 16px;
    background: rgba(3, 24, 34, 0.82);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(13px);
  }

  h1 {
    margin: 0 0 4px;
    font-size: 16px;
    letter-spacing: 0.08em;
  }

  .desc {
    margin: 0 0 10px;
    color: #b7d5df;
    font-size: 11px;
    line-height: 1.4;
  }

  .row {
    display: grid;
    grid-template-columns: 98px 1fr 48px;
    align-items: center;
    gap: 8px;
    margin: 7px 0;
    font-size: 12px;
  }

  .row output {
    text-align: right;
    color: #7ee7ff;
    font-variant-numeric: tabular-nums;
  }

  input {
    width: 100%;
    accent-color: #4fd8ff;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 10px;
    margin-top: 8px;
    padding-top: 9px;
    border-top: 1px solid rgba(255, 255, 255, 0.11);
    color: #a9cad5;
    font-size: 10px;
  }

  .stats b {
    color: #fff;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }

  button {
    padding: 8px 10px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 11px;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    font-size: 11px;
    font-weight: 650;
  }

  button:active {
    transform: translateY(1px);
  }

  #tag {
    position: fixed;
    z-index: 4;
    right: 12px;
    bottom: 12px;
    padding: 7px 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    background: rgba(3, 24, 34, 0.72);
    color: #b8dce7;
    font-size: 10px;
  }

  @media (max-width: 600px) {
    #ui {
      top: 8px;
      left: 8px;
      width: calc(100vw - 16px);
      padding: 11px;
    }

    .row {
      grid-template-columns: 88px 1fr 44px;
      margin: 5px 0;
    }

    .desc {
      font-size: 10px;
    }

    .stats {
      display: none;
    }

    #tag {
      display: none;
    }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
</head>

<body>
<div id="ui">
  <h1>BREAKING-WAVE PATCH SIMULATION</h1>

  <p class="desc">
    Shallow-water height field + detected steep front + connected
    ballistic fluid sheet, thickness, impact foam and spray.
  </p>

  <div class="row">
    <label for="amp">Wave height</label>
    <input
      id="amp"
      type="range"
      min="0.7"
      max="2.5"
      step="0.05"
      value="1.75"
    >
    <output id="ampO"></output>
  </div>

  <div class="row">
    <label for="period">Wave period</label>
    <input
      id="period"
      type="range"
      min="5"
      max="11"
      step="0.1"
      value="7.6"
    >
    <output id="periodO"></output>
  </div>

  <div class="row">
    <label for="reef">Reef depth</label>
    <input
      id="reef"
      type="range"
      min="1.2"
      max="2.8"
      step="0.05"
      value="1.65"
    >
    <output id="reefO"></output>
  </div>

  <div class="row">
    <label for="thick">Lip thickness</label>
    <input
      id="thick"
      type="range"
      min="0.10"
      max="0.60"
      step="0.01"
      value="0.30"
    >
    <output id="thickO"></output>
  </div>

  <div class="row">
    <label for="break">Break strength</label>
    <input
      id="break"
      type="range"
      min="0.55"
      max="1.6"
      step="0.01"
      value="1.08"
    >
    <output id="breakO"></output>
  </div>

  <div class="stats">
    <span>Front slope <b id="slopeS">—</b></span>
    <span>Patch rows <b id="rowsS">—</b></span>
    <span>Wave speed <b id="speedS">—</b></span>
    <span>Spray particles <b id="sprayS">—</b></span>
  </div>

  <div class="buttons">
    <button id="pause">Pause</button>
    <button id="reset">Reset simulation</button>
    <button id="cameraBtn">Cinematic camera</button>
  </div>
</div>

<div id="tag">
  Drag to orbit · pinch/scroll to zoom
</div>

<script type="module">
import * as THREE from "three";
import {
  OrbitControls
} from "three/addons/controls/OrbitControls.js";

const G = 9.81;

const clamp = THREE.MathUtils.clamp;
const lerp = THREE.MathUtils.lerp;

const smoothstep = (a, b, x) => {
  const t = clamp(
    (x - a) / (b - a),
    0,
    1
  );

  return t * t * (3 - 2 * t);
};

const ui = {
  amp: document.querySelector("#amp"),
  period: document.querySelector("#period"),
  reef: document.querySelector("#reef"),
  thick: document.querySelector("#thick"),
  break: document.querySelector("#break")
};

const out = {
  amp: document.querySelector("#ampO"),
  period: document.querySelector("#periodO"),
  reef: document.querySelector("#reefO"),
  thick: document.querySelector("#thickO"),
  break: document.querySelector("#breakO")
};

function refreshUI() {
  out.amp.textContent =
    (+ui.amp.value).toFixed(2) +
    "m";

  out.period.textContent =
    (+ui.period.value).toFixed(1) +
    "s";

  out.reef.textContent =
    (+ui.reef.value).toFixed(2) +
    "m";

  out.thick.textContent =
    (+ui.thick.value).toFixed(2) +
    "m";

  out.break.textContent =
    (+ui.break.value).toFixed(2);
}

Object
  .values(ui)
  .forEach(element => {
    element.addEventListener(
      "input",
      refreshUI
    );
  });

refreshUI();

// -----------------------------------------------------------------------------
// Three.js scene
// -----------------------------------------------------------------------------

const renderer =
  new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: "high-performance"
  });

renderer.setPixelRatio(
  Math.min(
    devicePixelRatio,
    1.75
  )
);

renderer.setSize(
  innerWidth,
  innerHeight
);

renderer.outputColorSpace =
  THREE.SRGBColorSpace;

renderer.toneMapping =
  THREE.ACESFilmicToneMapping;

renderer.toneMappingExposure =
  1.08;

renderer.shadowMap.enabled = true;

renderer.shadowMap.type =
  THREE.PCFSoftShadowMap;

document.body.appendChild(
  renderer.domElement
);

const scene =
  new THREE.Scene();

scene.background =
  new THREE.Color(0x79cce0);

scene.fog =
  new THREE.FogExp2(
    0x78c7d8,
    0.015
  );

const camera =
  new THREE.PerspectiveCamera(
    46,
    innerWidth / innerHeight,
    0.1,
    160
  );

camera.position.set(
  11,
  5.3,
  14
);

const controls =
  new OrbitControls(
    camera,
    renderer.domElement
  );

controls.enableDamping = true;
controls.dampingFactor = 0.06;

controls.target.set(
  2,
  1.3,
  0
);

controls.minDistance = 5.5;
controls.maxDistance = 42;

controls.maxPolarAngle =
  Math.PI * 0.53;

controls.update();

scene.add(
  new THREE.HemisphereLight(
    0xd9f7ff,
    0x173845,
    2.5
  )
);

const sun =
  new THREE.DirectionalLight(
    0xfff4d8,
    4.3
  );

sun.position.set(
  -8,
  15,
  10
);

sun.castShadow = true;

sun.shadow.mapSize.set(
  2048,
  2048
);

sun.shadow.camera.left = -30;
sun.shadow.camera.right = 30;
sun.shadow.camera.top = 22;
sun.shadow.camera.bottom = -15;

scene.add(sun);

const rim =
  new THREE.DirectionalLight(
    0x6bd8ff,
    1.25
  );

rim.position.set(
  11,
  7,
  -12
);

scene.add(rim);

const sky =
  new THREE.Mesh(
    new THREE.SphereGeometry(
      100,
      32,
      16
    ),

    new THREE.ShaderMaterial({
      side: THREE.BackSide,

      uniforms: {
        top: {
          value:
            new THREE.Color(
              0x0b5b80
            )
        },

        bottom: {
          value:
            new THREE.Color(
              0xb8edf1
            )
        }
      },

      vertexShader: `
        varying vec3 p;

        void main() {
          p = position;

          gl_Position =
            projectionMatrix *
            modelViewMatrix *
            vec4(position, 1.0);
        }
      `,

      fragmentShader: `
        uniform vec3 top;
        uniform vec3 bottom;

        varying vec3 p;

        void main() {
          float h =
            clamp(
              normalize(p).y * 0.5 + 0.5,
              0.0,
              1.0
            );

          gl_FragColor =
            vec4(
              mix(
                bottom,
                top,
                pow(h, 0.75)
              ),
              1.0
            );
        }
      `
    })
  );

scene.add(sky);

// -----------------------------------------------------------------------------
// Shallow-water grid
// -----------------------------------------------------------------------------

/*
  The paper uses a staggered, semi-Lagrangian
  shallow-water solve.

  This keeps that overall architecture:

  1. Advect depth and horizontal velocity.
  2. Accelerate velocity from free-surface pressure.
  3. Apply the continuity compression term.

  h_t = -u · grad(h) - h div(u)
*/

const NX = 128;
const NZ = 56;

const LX = 44;
const LZ = 22;

const DX =
  LX / (NX - 1);

const DZ =
  LZ / (NZ - 1);

const N =
  NX * NZ;

const X0 =
  -LX / 2;

const Z0 =
  -LZ / 2;

const id = (i, j) =>
  j * NX + i;

const bed =
  new Float32Array(N);

const h =
  new Float32Array(N);

const u =
  new Float32Array(N);

const v =
  new Float32Array(N);

const ha =
  new Float32Array(N);

const ua =
  new Float32Array(N);

const va =
  new Float32Array(N);

const hn =
  new Float32Array(N);

const un =
  new Float32Array(N);

const vn =
  new Float32Array(N);

let simTime = 0;
let frame = 0;
let paused = false;
let cinematic = false;

function worldX(i) {
  return X0 + i * DX;
}

function worldZ(j) {
  return Z0 + j * DZ;
}

function reefDepthAt(x, z) {
  const deep = 5.4;
  const shallow =
    +ui.reef.value;

  /*
    The center of the reef rises first.

    This makes the break begin near the
    middle and spread toward the shoulders.
  */

  const shelfShift =
    0.055 * z * z;

  const q =
    smoothstep(
      -3.5 + shelfShift,
      7.0 + shelfShift,
      x
    );

  const channel =
    0.45 *
    Math.exp(
      -(
        (z - 8.5) *
        (z - 8.5)
      ) /
      5.5
    );

  return lerp(
    deep,
    shallow + channel,
    q
  );
}

function rebuildBed() {
  for (
    let j = 0;
    j < NZ;
    j++
  ) {
    for (
      let i = 0;
      i < NX;
      i++
    ) {
      const k =
        id(i, j);

      bed[k] =
        -reefDepthAt(
          worldX(i),
          worldZ(j)
        );
    }
  }
}

function seedWave() {
  rebuildBed();

  const A =
    +ui.amp.value;

  for (
    let j = 0;
    j < NZ;
    j++
  ) {
    const z =
      worldZ(j);

    const bend =
      0.028 *
      z *
      z;

    for (
      let i = 0;
      i < NX;
      i++
    ) {
      const x =
        worldX(i);

      const depth =
        -bed[id(i, j)];

      const q =
        (
          x +
          10.8 -
          bend
        ) /
        2.25;

      const pulse =
        A /
        (
          Math.cosh(q) *
          Math.cosh(q)
        );

      const span =
        0.93 +
        0.07 *
        Math.cos(z * 0.38);

      const eta =
        pulse * span;

      const k =
        id(i, j);

      h[k] =
        Math.max(
          0.08,
          depth + eta
        );

      u[k] =
        Math.sqrt(G / 5.4) *
        eta /
        (
          1 +
          eta / 5.4
        ) *
        1.32;

      v[k] =
        -0.025 *
        z *
        eta;
    }
  }
}

function bilinear(
  array,
  x,
  z
) {
  const gx =
    clamp(
      (x - X0) / DX,
      0,
      NX - 1.001
    );

  const gz =
    clamp(
      (z - Z0) / DZ,
      0,
      NZ - 1.001
    );

  const i =
    Math.floor(gx);

  const j =
    Math.floor(gz);

  const fx =
    gx - i;

  const fz =
    gz - j;

  const a =
    array[id(i, j)];

  const b =
    array[id(i + 1, j)];

  const c =
    array[id(i, j + 1)];

  const d =
    array[id(i + 1, j + 1)];

  return (
    a +
    (b - a) * fx
  ) *
  (1 - fz) +
  (
    c +
    (d - c) * fx
  ) *
  fz;
}

function surfaceAt(x, z) {
  return (
    bilinear(h, x, z) +
    bilinear(bed, x, z)
  );
}

function flowAt(
  x,
  z,
  target =
    new THREE.Vector2()
) {
  target.set(
    bilinear(u, x, z),
    bilinear(v, x, z)
  );

  return target;
}

function swStep(dt) {
  /*
    Semi-Lagrangian advection.
  */

  for (
    let j = 1;
    j < NZ - 1;
    j++
  ) {
    for (
      let i = 1;
      i < NX - 1;
      i++
    ) {
      const k =
        id(i, j);

      const x =
        worldX(i) -
        u[k] * dt;

      const z =
        worldZ(j) -
        v[k] * dt;

      ha[k] =
        bilinear(h, x, z);

      ua[k] =
        bilinear(u, x, z);

      va[k] =
        bilinear(v, x, z);
    }
  }

  /*
    Boundary values for the temporary fields.
  */

  for (
    let j = 0;
    j < NZ;
    j++
  ) {
    for (
      const i of [
        0,
        NX - 1
      ]
    ) {
      const k =
        id(i, j);

      ha[k] = h[k];
      ua[k] = u[k];
      va[k] = v[k];
    }
  }

  for (
    let i = 0;
    i < NX;
    i++
  ) {
    for (
      const j of [
        0,
        NZ - 1
      ]
    ) {
      const k =
        id(i, j);

      ha[k] = h[k];
      ua[k] = u[k];
      va[k] = v[k];
    }
  }

  /*
    Pressure acceleration from the
    free-surface gradient.

    Then apply continuity compression.
  */

  for (
    let j = 1;
    j < NZ - 1;
    j++
  ) {
    for (
      let i = 1;
      i < NX - 1;
      i++
    ) {
      const k =
        id(i, j);

      const ex =
        (
          (
            ha[id(i + 1, j)] +
            bed[id(i + 1, j)]
          ) -
          (
            ha[id(i - 1, j)] +
            bed[id(i - 1, j)]
          )
        ) /
        (2 * DX);

      const ez =
        (
          (
            ha[id(i, j + 1)] +
            bed[id(i, j + 1)]
          ) -
          (
            ha[id(i, j - 1)] +
            bed[id(i, j - 1)]
          )
        ) /
        (2 * DZ);

      const ux =
        ua[k] -
        G * dt * ex;

      const vz =
        va[k] -
        G * dt * ez;

      const div =
        (
          ua[id(i + 1, j)] -
          ua[id(i - 1, j)]
        ) /
        (2 * DX) +
        (
          va[id(i, j + 1)] -
          va[id(i, j - 1)]
        ) /
        (2 * DZ);

      hn[k] =
        Math.max(
          0.06,

          ha[k] *
          Math.exp(
            clamp(
              -dt * div,
              -0.055,
              0.055
            )
          )
        );

      un[k] = ux;
      vn[k] = vz;
    }
  }

  /*
    Gentle numerical diffusion and
    damping near the shore.
  */

  const nu = 0.018;

  for (
    let j = 1;
    j < NZ - 1;
    j++
  ) {
    for (
      let i = 1;
      i < NX - 1;
      i++
    ) {
      const k =
        id(i, j);

      hn[k] +=
        nu *
        (
          ha[id(i - 1, j)] +
          ha[id(i + 1, j)] +
          ha[id(i, j - 1)] +
          ha[id(i, j + 1)] -
          4 * ha[k]
        );

      un[k] +=
        nu *
        (
          ua[id(i - 1, j)] +
          ua[id(i + 1, j)] +
          ua[id(i, j - 1)] +
          ua[id(i, j + 1)] -
          4 * ua[k]
        );

      vn[k] +=
        nu *
        (
          va[id(i - 1, j)] +
          va[id(i + 1, j)] +
          va[id(i, j - 1)] +
          va[id(i, j + 1)] -
          4 * va[k]
        );

      const shore =
        smoothstep(
          12,
          20,
          worldX(i)
        );

      un[k] *=
        1 -
        0.16 *
        shore *
        dt;

      vn[k] *=
        1 -
        0.16 *
        shore *
        dt;
    }
  }

  /*
    Periodic incoming swell at the
    offshore boundary.
  */

  const A =
    +ui.amp.value;

  const T =
    +ui.period.value;

  const omega =
    Math.PI *
    2 /
    T;

  const phase =
    omega *
    simTime;

  const etaIn =
    A *
    0.62 *
    Math.sin(phase) +
    A *
    0.18 *
    Math.sin(
      2 * phase +
      0.5
    );

  const velIn =
    etaIn /
    5.4 *
    Math.sqrt(G * 5.4);

  for (
    let j = 1;
    j < NZ - 1;
    j++
  ) {
    const span =
      0.95 +
      0.05 *
      Math.cos(
        worldZ(j) *
        0.32
      );

    for (
      let i = 0;
      i < 3;
      i++
    ) {
      const weight =
        (3 - i) / 3;

      const k =
        id(i, j);

      const depth =
        -bed[k];

      hn[k] =
        Math.max(
          0.08,

          depth +
          etaIn *
          span *
          weight
        );

      un[k] =
        velIn *
        span *
        weight;

      vn[k] = 0;
    }
  }

  /*
    Outflow boundary.
  */

  for (
    let j = 0;
    j < NZ;
    j++
  ) {
    const k =
      id(
        NX - 1,
        j
      );

    hn[k] =
      -bed[k];

    un[k] =
      u[k] *
      0.8;

    vn[k] =
      v[k] *
      0.8;
  }

  /*
    Side boundaries.
  */

  for (
    let i = 0;
    i < NX;
    i++
  ) {
    for (
      const j of [
        0,
        NZ - 1
      ]
    ) {
      const sourceJ =
        j === 0
          ? 1
          : NZ - 2;

      const k =
        id(i, j);

      hn[k] =
        hn[id(i, sourceJ)];

      un[k] =
        un[id(i, sourceJ)];

      vn[k] = 0;
    }
  }

  h.set(hn);
  u.set(un);
  v.set(vn);
}

// -----------------------------------------------------------------------------
// Height-field water and seabed meshes
// -----------------------------------------------------------------------------

function gridGeometry(
  ySource
) {
  const positions =
    new Float32Array(
      N * 3
    );

  const colors =
    new Float32Array(
      N * 3
    );

  const indices = [];

  for (
    let j = 0;
    j < NZ;
    j++
  ) {
    for (
      let i = 0;
      i < NX;
      i++
    ) {
      const k =
        id(i, j);

      const offset =
        k * 3;

      positions[offset] =
        worldX(i);

      positions[offset + 1] =
        ySource(k);

      positions[offset + 2] =
        worldZ(j);
    }
  }

  for (
    let j = 0;
    j < NZ - 1;
    j++
  ) {
    for (
      let i = 0;
      i < NX - 1;
      i++
    ) {
      const a =
        id(i, j);

      const b =
        id(i + 1, j);

      const c =
        id(i, j + 1);

      const d =
        id(i + 1, j + 1);

      indices.push(
        a,
        c,
        b,

        b,
        c,
        d
      );
    }
  }

  const geometry =
    new THREE.BufferGeometry();

  geometry.setAttribute(
    "position",

    new THREE.BufferAttribute(
      positions,
      3
    )
  );

  geometry.setAttribute(
    "color",

    new THREE.BufferAttribute(
      colors,
      3
    )
  );

  geometry.setIndex(
    indices
  );

  geometry.computeVertexNormals();

  return geometry;
}

const waterGeo =
  gridGeometry(
    k =>
      h[k] +
      bed[k]
  );

const waterMat =
  new THREE.MeshPhysicalMaterial({
    vertexColors: true,
    roughness: 0.18,
    metalness: 0,
    clearcoat: 1,
    clearcoatRoughness: 0.07,

    opacity: 0.93
  });

const water =

    waterMat
  );

water.receiveShadow = true;

scene.add(water);

const bedGeo =
  gridGeometry(
    k =>
      bed[k] -
      0.04
  );

const bedMat =
  new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 1
  });

const bedMesh =
  new THREE.Mesh(
    bedGeo,
    bedMat
  );

bedMesh.receiveShadow = true;

scene.add(bedMesh);

const cDeep =
  new THREE.Color(
    0x075f78
  );

const cFace =
  new THREE.Color(
    0x0b9eb0
  );

const cCrest =
  new THREE.Color(
    0x58d6dd
  );

const cSand =
  new THREE.Color(
    0x8b8a70
  );

const cReef =
  new THREE.Color(
    0x465f55
  );

const gridColor =
  new THREE.Color();

function updateGridMeshes() {
  const positions =
    waterGeo
      .attributes
      .position
      .array;

  const colors =
    waterGeo
      .attributes
      .color
      .array;

  for (
    let j = 0;
    j < NZ;
    j++
  ) {
    for (
      let i = 0;
      i < NX;
      i++
    ) {
      const k =
        id(i, j);

      const offset =
        k * 3;

      const eta =
        h[k] +
        bed[k];

      positions[offset + 1] =
        eta;

      const gx =
        i > 0 &&
        i < NX - 1
          ? (
              (
                h[id(i + 1, j)] +
                bed[id(i + 1, j)]
              ) -
              (
                h[id(i - 1, j)] +
                bed[id(i - 1, j)]
              )
            ) /
            (2 * DX)
          : 0;

      const q =
        clamp(
          Math.abs(gx) *
          0.7 +
          Math.max(0, eta) *
          0.18,

          0,
          1
        );

      if (q > 0.55) {
        gridColor
          .copy(cCrest)
          .lerp(
            cFace,

            clamp(
              (1 - q) * 2,
              0,
              1
            )
          );
      } else {
        gridColor
          .copy(cDeep)
          .lerp(
            cFace,

            clamp(
              q * 1.8,
              0,
              1
            )
          );
      }

      colors[offset] =
        gridColor.r;

      colors[offset + 1] =
        gridColor.g;

      colors[offset + 2] =
        gridColor.b;
    }
  }

  waterGeo
    .attributes
    .position
    .needsUpdate = true;

  waterGeo
    .attributes
    .color
    .needsUpdate = true;

  if ((frame & 3) === 0) {
    waterGeo.computeVertexNormals();
  }

  const bedPositions =
    bedGeo
      .attributes
      .position
      .array;

  const bedColors =
    bedGeo
      .attributes
      .color
      .array;

  for (
    let k = 0;
    k < N;
    k++
  ) {
    const offset =
      k * 3;

    bedPositions[offset + 1] =
      bed[k] -
      0.04;

    const q =
      smoothstep(
        -4.5,
        -1.1,
        bed[k]
      );

    gridColor
      .copy(cReef)
      .lerp(
        cSand,
        q
      );

    bedColors[offset] =
      gridColor.r;

    bedColors[offset + 1] =
      gridColor.g;

    bedColors[offset + 2] =
      gridColor.b;
  }

  bedGeo
    .attributes
    .position
    .needsUpdate = true;

  bedGeo
    .attributes
    .color
    .needsUpdate = true;
}

// -----------------------------------------------------------------------------
// Wave-front detection
// Paper criterion:
//
// |grad H| > threshold
// grad H · u < 0
// -----------------------------------------------------------------------------

const LINE_N = 48;

const line =
  Array.from(
    {
      length: LINE_N
    },

    () => ({
      valid: false,

      x: 0,
      z: 0,
      y: 0,

      cx: 0,
      cy: 0,

      gx: 0,
      gz: 0,

      slope: 0,

      ux: 0,
      uz: 0,

      speed: 0
    })
  );

let avgFrontX = 2;
let avgSlope = 0;
let maxSlope = 0;

let breakAge = 0;
let hadFront = false;

function detectFront(dt) {
  const pH = 0.25;

  const threshold =
    pH *
    G *
    dt /
    DX /
    (+ui.break.value);

  let count = 0;
  let sumX = 0;
  let sumSlope = 0;

  maxSlope = 0;

  for (
    let n = 0;
    n < LINE_N;
    n++
  ) {
    const z =
      lerp(
        Z0 + 1,
        Z0 + LZ - 1,

        n /
        (LINE_N - 1)
      );

    const j =
      clamp(
        Math.round(
          (z - Z0) /
          DZ
        ),

        1,
        NZ - 2
      );

    let best = -1;
    let bestScore = 0;

    let bgx = 0;
    let bgz = 0;

    for (
      let i = 8;
      i < NX - 9;
      i++
    ) {
      const k =
        id(i, j);

      const eta =
        h[k] +
        bed[k];

      const gx =
        (
          (
            h[id(i + 1, j)] +
            bed[id(i + 1, j)]
          ) -
          (
            h[id(i - 1, j)] +
            bed[id(i - 1, j)]
          )
        ) /
        (2 * DX);

      const gz =
        (
          (
            h[id(i, j + 1)] +
            bed[id(i, j + 1)]
          ) -
          (
            h[id(i, j - 1)] +
            bed[id(i, j - 1)]
          )
        ) /
        (2 * DZ);

      const magnitude =
        Math.hypot(
          gx,
          gz
        );

      const dot =
        gx * u[k] +
        gz * v[k];

      if (
        magnitude >
          threshold &&
        dot < 0 &&
        eta > 0.12
      ) {
        const shelf =
          smoothstep(
            -5,
            13,
            worldX(i)
          );

        const score =
          magnitude *
          (
            -dot +
            0.12
          ) *
          shelf;

        if (
          score >
          bestScore
        ) {
          bestScore =
            score;

          best = i;

          bgx = gx;
          bgz = gz;
        }
      }
    }

    const point =
      line[n];

    point.valid =
      best >= 0;

    if (best >= 0) {
      /*
        Search backward from the steep
        front to place generated particles
        at the actual crest.
      */

      let crestI =
        best;

      let maxEta =
        -1e9;

      for (
        let i =
          Math.max(
            2,
            best - 14
          );

        i <= best + 1;
        i++
      ) {
        const elevation =
          h[id(i, j)] +
          bed[id(i, j)];

        if (
          elevation >
          maxEta
        ) {
          maxEta =
            elevation;

          crestI = i;
        }
      }

      const k =
        id(best, j);

      const depth =
        h[k];

      const gradientLength =
        Math.max(
          1e-6,

          Math.hypot(
            bgx,
            bgz
          )
        );

      const nx =
        -bgx /
        gradientLength;

      const nz =
        -bgz /
        gradientLength;

      /*
        Shallow-water wave speed:
        c = sqrt(g h)
      */

      const c =
        Math.sqrt(
          G *
          Math.max(
            0.08,
            depth
          )
        );

      point.x =
        worldX(best);

      point.z = z;

      point.y =
        h[k] +
        bed[k];

      point.cx =
        worldX(crestI);

      point.cy =
        maxEta;

      point.gx =
        bgx;

      point.gz =
        bgz;

      point.slope =
        gradientLength;

      /*
        Approximate wave-line velocity:
        local flow plus propagation in
        the downhill-gradient direction.
      */

      point.ux =
        u[k] +
        nx *
        c *
        0.58;

      point.uz =
        v[k] +
        nz *
        c *
        0.58;

      point.speed =
        Math.hypot(
          point.ux,
          point.uz
        );

      count++;

      sumX +=
        point.x;

      sumSlope +=
        gradientLength;

      maxSlope =
        Math.max(
          maxSlope,
          gradientLength
        );
    }
  }

  hadFront =
    count >
    LINE_N *
    0.32;

  if (hadFront) {
    avgFrontX =
      lerp(
        avgFrontX,
        sumX / count,
        0.18
      );

    avgSlope =
      sumSlope /
      count;

    breakAge +=
      dt;
  } else {
    avgSlope *=
      0.95;

    breakAge = 0;
  }
}

// -----------------------------------------------------------------------------
// Connected particle sheet
// -----------------------------------------------------------------------------

const MAX_ROWS = 52;

const rows = [];

let spawnClock = 0;

function spawnRow() {
  if (!hadFront) {
    return;
  }

  /*
    Breaking starts at the center of the
    line and spreads out toward both sides.
  */

  const spread =
    1.1 +
    Math.min(
      LZ * 0.48,
      breakAge * 2.35
    );

  const row = {
    age: 0,
    p: []
  };

  for (
    let n = 0;
    n < LINE_N;
    n++
  ) {
    const source =
      line[n];

    const active =
      source.valid &&
      Math.abs(
        source.z
      ) <
      spread;

    if (!active) {
      row.p.push({
        alive: false,

        pos:
          new THREE.Vector3(),

        vel:
          new THREE.Vector3()
      });

      continue;
    }

    /*
      Paper Equation 9:

      u_s =
      (1 + p_v g (H - H_i)) u_l

      The coefficient is exposed through
      the break-strength control.
    */

    const elevation =
      Math.max(
        0,
        source.cy
      );

    const factor =
      1 +
      (
        0.033 *
        (+ui.break.value)
      ) *
      G *
      elevation;

    /*
      The shallow-water solver has only
      horizontal velocity.

      This small vertical term estimates
      upward motion at the crest before
      gravity takes over.
    */

    const verticalVelocity =
      Math.max(
        0.12,

        0.28 *
        Math.sqrt(
          G *
          Math.max(
            0.05,
            elevation
          )
        )
      );

    row.p.push({
      alive: true,

      pos:
        new THREE.Vector3(
          source.cx,
          source.cy - 0.03,
          source.z
        ),

      vel:
        new THREE.Vector3(
          source.ux *
          factor,

          verticalVelocity,

          source.uz *
          factor
        )
    });
  }

  rows.push(row);

  if (
    rows.length >
    MAX_ROWS
  ) {
    rows.shift();
  }
}

// -----------------------------------------------------------------------------
// Dynamic thick sheet
// -----------------------------------------------------------------------------

const MAXV =
  MAX_ROWS *
  LINE_N *
  2;

const patchPos =
  new Float32Array(
    MAXV * 3
  );

const patchCol =
  new Float32Array(
    MAXV * 3
  );

const maxIndexCount =
  (
    MAX_ROWS - 1
  ) *
  (
    LINE_N - 1
  ) *
  12 +
  (
    MAX_ROWS +
    LINE_N
  ) *
  24;

const patchIdx =
  new Uint32Array(
    maxIndexCount
  );

const patchGeo =
  new THREE.BufferGeometry();

patchGeo.setAttribute(
  "position",

  new THREE.BufferAttribute(
    patchPos,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

patchGeo.setAttribute(
  "color",

  new THREE.BufferAttribute(
    patchCol,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

patchGeo.setIndex(
  new THREE.BufferAttribute(
    patchIdx,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

const patchMat =
  new THREE.MeshPhysicalMaterial({
    vertexColors: true,
    roughness: 0.13,
    metalness: 0,
    clearcoat: 1,
    clearcoatRoughness: 0.05,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.95
  });

const patchMesh =
  new THREE.Mesh(
    patchGeo,
    patchMat
  );

patchMesh.castShadow = true;
patchMesh.renderOrder = 2;

scene.add(patchMesh);

const tempA =
  new THREE.Vector3();

const tempB =
  new THREE.Vector3();

const normal =
  new THREE.Vector3();

const lipBlue =
  new THREE.Color(
    0x087f96
  );

const lipBright =
  new THREE.Color(
    0x42ccd5
  );

const underBlue =
  new THREE.Color(
    0x043f52
  );

function sheetNormal(
  rowIndex,
  lineIndex
) {
  const row =
    rows[rowIndex];

  const point =
    row.p[lineIndex].pos;

  const n0 =
    Math.max(
      0,
      lineIndex - 1
    );

  const n1 =
    Math.min(
      LINE_N - 1,
      lineIndex + 1
    );

  const r0 =
    Math.max(
      0,
      rowIndex - 1
    );

  const r1 =
    Math.min(
      rows.length - 1,
      rowIndex + 1
    );

  const spanForward =
    row.p[n1].alive
      ? row.p[n1].pos
      : point;

  const spanBack =
    row.p[n0].alive
      ? row.p[n0].pos
      : point;

  tempA.subVectors(
    spanForward,
    spanBack
  );

  const ageForward =
    rows[r1]
      .p[lineIndex]
      .alive
      ? rows[r1]
          .p[lineIndex]
          .pos
      : point;

  const ageBack =
    rows[r0]
      .p[lineIndex]
      .alive
      ? rows[r0]
          .p[lineIndex]
          .pos
      : point;

  tempB.subVectors(
    ageForward,
    ageBack
  );

  normal
    .crossVectors(
      tempA,
      tempB
    )
    .normalize();

  if (
    normal.lengthSq() <
    0.1
  ) {
    normal.set(
      0,
      1,
      0
    );
  }

  /*
    Keep the offset on the water side of
    the sheet instead of creating a large
    closed balloon.
  */

  if (
    normal.y <
    -0.25
  ) {
    normal.negate();
  }

  return normal;
}

function addTri(
  a,
  b,
  c,
  pointer
) {
  patchIdx[pointer++] = a;
  patchIdx[pointer++] = b;
  patchIdx[pointer++] = c;

  return pointer;
}

function addQuad(
  a,
  b,
  c,
  d,
  pointer,
  flip = false
) {
  if (!flip) {
    pointer =
      addTri(
        a,
        c,
        b,
        pointer
      );

    pointer =
      addTri(
        b,
        c,
        d,
        pointer
      );
  } else {
    pointer =
      addTri(
        a,
        b,
        c,
        pointer
      );

    pointer =
      addTri(
        b,
        d,
        c,
        pointer
      );
  }

  return pointer;
}

function updatePatchGeometry() {
  const rowCount =
    rows.length;

  const lowerPlane =
    MAX_ROWS *
    LINE_N;

  const thickness =
    +ui.thick.value;

  /*
    Create upper and lower copies of the
    connected particle sheet.

    The lower copy is offset along the
    surface normal to give the lip mass.
  */

  for (
    let r = 0;
    r < MAX_ROWS;
    r++
  ) {
    for (
      let n = 0;
      n < LINE_N;
      n++
    ) {
      const base =
        r *
        LINE_N +
        n;

      const upper =
        base;

      const lower =
        lowerPlane +
        base;

      const upperOffset =
        upper * 3;

      const lowerOffset =
        lower * 3;

      if (
        r < rowCount &&
        rows[r].p[n].alive
      ) {
        const point =
          rows[r].p[n].pos;

        const surfaceNormal =
          sheetNormal(r, n);

        patchPos[upperOffset] =
          point.x;

        patchPos[upperOffset + 1] =
          point.y;

        patchPos[upperOffset + 2] =
          point.z;

        patchPos[lowerOffset] =
          point.x -
          surfaceNormal.x *
          thickness;

        patchPos[lowerOffset + 1] =
          point.y -
          surfaceNormal.y *
          thickness;

        patchPos[lowerOffset + 2] =
          point.z -
          surfaceNormal.z *
          thickness;

        const age =
          clamp(
            rows[r].age /
            2.4,

            0,
            1
          );

        gridColor
          .copy(lipBright)
          .lerp(
            lipBlue,
            age
          );

        patchCol[upperOffset] =
          gridColor.r;

        patchCol[upperOffset + 1] =
          gridColor.g;

        patchCol[upperOffset + 2] =
          gridColor.b;

        patchCol[lowerOffset] =
          underBlue.r;

        patchCol[lowerOffset + 1] =
          underBlue.g;

        patchCol[lowerOffset + 2] =
          underBlue.b;
      } else {
        patchPos[upperOffset + 1] =
          -999;

        patchPos[lowerOffset + 1] =
          -999;
      }
    }
  }

  let pointer = 0;

  /*
    Connect adjacent particle rows into
    the upper and lower sheet surfaces.
  */

  for (
    let r = 0;
    r < rowCount - 1;
    r++
  ) {
    for (
      let n = 0;
      n < LINE_N - 1;
      n++
    ) {
      const p00 =
        rows[r].p[n];

      const p01 =
        rows[r].p[n + 1];

      const p10 =
        rows[r + 1].p[n];

      const p11 =
        rows[r + 1].p[n + 1];

      if (
        p00.alive &&
        p01.alive &&
        p10.alive &&
        p11.alive
      ) {
        const a =
          r *
          LINE_N +
          n;

        const b =
          a + 1;

        const c =
          (
            r + 1
          ) *
          LINE_N +
          n;

        const d =
          c + 1;

        pointer =
          addQuad(
            a,
            b,
            c,
            d,
            pointer,
            false
          );

        pointer =
          addQuad(
            lowerPlane + a,
            lowerPlane + b,
            lowerPlane + c,
            lowerPlane + d,
            pointer,
            true
          );
      }
    }
  }

  /*
    Close both spanwise edges.
  */

  for (
    let r = 0;
    r < rowCount - 1;
    r++
  ) {
    for (
      const n of [
        0,
        LINE_N - 1
      ]
    ) {
      if (
        rows[r].p[n].alive &&
        rows[r + 1].p[n].alive
      ) {
        const a =
          r *
          LINE_N +
          n;

        const b =
          (
            r + 1
          ) *
          LINE_N +
          n;

        pointer =
          addQuad(
            a,
            lowerPlane + a,
            b,
            lowerPlane + b,
            pointer,
            n === 0
          );
      }
    }
  }

  /*
    Close the oldest and newest row ends.
  */

  const endRows =
    rowCount
      ? [
          0,
          rowCount - 1
        ]
      : [];

  for (
    const r of endRows
  ) {
    for (
      let n = 0;
      n < LINE_N - 1;
      n++
    ) {
      if (
        rows[r].p[n].alive &&
        rows[r].p[n + 1].alive
      ) {
        const a =
          r *
          LINE_N +
          n;

        const b =
          a + 1;

        pointer =
          addQuad(
            a,
            b,
            lowerPlane + a,
            lowerPlane + b,
            pointer,
            r === 0
          );
      }
    }
  }

  patchIdx.fill(
    0,
    pointer
  );

  patchGeo
    .attributes
    .position
    .needsUpdate = true;

  patchGeo
    .attributes
    .color
    .needsUpdate = true;

  patchGeo.index.needsUpdate =
    true;

  patchGeo.setDrawRange(
    0,
    pointer
  );

  if ((frame & 1) === 0) {
    patchGeo.computeVertexNormals();
  }
}

// -----------------------------------------------------------------------------
// Foam and spray
// -----------------------------------------------------------------------------

const PARTICLES = 1500;

const sprayPos =
  new Float32Array(
    PARTICLES * 3
  );

const sprayVel =
  new Float32Array(
    PARTICLES * 3
  );

const sprayLife =
  new Float32Array(
    PARTICLES
  );

const spraySize =
  new Float32Array(
    PARTICLES
  );

for (
  let i = 0;
  i < PARTICLES;
  i++
) {
  sprayPos[i * 3 + 1] =
    -999;
}

const sprayGeo =
  new THREE.BufferGeometry();

sprayGeo.setAttribute(
  "position",

  new THREE.BufferAttribute(
    sprayPos,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

sprayGeo.setAttribute(
  "life",

  new THREE.BufferAttribute(
    sprayLife,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

sprayGeo.setAttribute(
  "size",

  new THREE.BufferAttribute(
    spraySize,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

const sprayMat =
  new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,

    blending:
      THREE.NormalBlending,

    vertexShader: `
      attribute float life;
      attribute float size;

      varying float vLife;

      void main() {
        vLife = life;

        vec4 mv =
          modelViewMatrix *
          vec4(position, 1.0);

        gl_PointSize =
          size *
          (
            220.0 /
            max(
              1.0,
              -mv.z
            )
          );

        gl_Position =
          projectionMatrix *
          mv;
      }
    `,

    fragmentShader: `
      varying float vLife;

      void main() {
        vec2 q =
          gl_PointCoord -
          0.5;

        float d =
          dot(q, q);

        if (d > 0.25) {
          discard;
        }

        float alpha =
          smoothstep(
            0.25,
            0.02,
            d
          ) *
          smoothstep(
            0.0,
            0.15,
            vLife
          );

        vec3 color =
          mix(
            vec3(
              0.65,
              0.94,
              0.98
            ),

            vec3(1.0),

            vLife
          );

        gl_FragColor =
          vec4(
            color,
            alpha * 0.94
          );
      }
    `
  });

const spray =
  new THREE.Points(
    sprayGeo,
    sprayMat
  );

spray.frustumCulled = false;
spray.renderOrder = 4;

scene.add(spray);

let sprayCursor = 0;
let activeSpray = 0;

function emit(
  position,
  impact = false,
  count = 1
) {
  for (
    let n = 0;
    n < count;
    n++
  ) {
    const i =
      sprayCursor++ %
      PARTICLES;

    const offset =
      i * 3;

    sprayPos[offset] =
      position.x +
      (
        Math.random() -
        0.5
      ) *
      0.22;

    sprayPos[offset + 1] =
      position.y +
      (
        Math.random() -
        0.5
      ) *
      0.12;

    sprayPos[offset + 2] =
      position.z +
      (
        Math.random() -
        0.5
      ) *
      0.3;

    sprayVel[offset] =
      (
        impact
          ? 0.5
          : 1.0
      ) +
      Math.random() *
      (
        impact
          ? 1.7
          : 2.7
      );

    sprayVel[offset + 1] =
      (
        impact
          ? 0.7
          : 1.1
      ) +
      Math.random() *
      (
        impact
          ? 2.2
          : 2.9
      );

    sprayVel[offset + 2] =
      (
        Math.random() -
        0.5
      ) *
      (
        impact
          ? 3.5
          : 2.0
      );

    sprayLife[i] =
      0.65 +
      Math.random() *
      0.35;

    spraySize[i] =
      impact
        ? 10 +
          Math.random() *
          15
        : 5 +
          Math.random() *
          10;
  }
}

function updateSpray(dt) {
  activeSpray = 0;

  for (
    let i = 0;
    i < PARTICLES;
    i++
  ) {
    if (
      sprayLife[i] <= 0
    ) {
      continue;
    }

    activeSpray++;

    const offset =
      i * 3;

    sprayLife[i] -=
      dt *
      (
        0.34 +
        0.38 *
        (
          1 -
          sprayLife[i]
        )
      );

    sprayVel[offset + 1] -=
      G *
      0.34 *
      dt;

    sprayVel[offset] *=
      Math.pow(
        0.988,
        dt * 60
      );

    sprayVel[offset + 2] *=
      Math.pow(
        0.988,
        dt * 60
      );

    sprayPos[offset] +=
      sprayVel[offset] *
      dt;

    sprayPos[offset + 1] +=
      sprayVel[offset + 1] *
      dt;

    sprayPos[offset + 2] +=
      sprayVel[offset + 2] *
      dt;

    if (
      sprayLife[i] <= 0
    ) {
      sprayPos[offset + 1] =
        -999;
    }
  }

  sprayGeo
    .attributes
    .position
    .needsUpdate = true;

  sprayGeo
    .attributes
    .life
    .needsUpdate = true;

  sprayGeo
    .attributes
    .size
    .needsUpdate = true;
}

function updateRows(dt) {
  spawnClock +=
    dt;

  if (
    spawnClock >
    0.055
  ) {
    spawnClock = 0;
    spawnRow();
  }

  for (
    const row of rows
  ) {
    row.age +=
      dt;

    for (
      const particle of row.p
    ) {
      if (!particle.alive) {
        continue;
      }

      /*
        Once detached, sheet particles
        are advanced from initial velocity
        and gravity.
      */

      particle.vel.y -=
        G * dt;

      particle.vel.multiplyScalar(
        Math.pow(
          0.997,
          dt * 60
        )
      );

      particle.pos.addScaledVector(
        particle.vel,
        dt
      );

      /*
        Air drag tears small droplets
        away from the leading sheet.
      */

      if (
        Math.random() <
          0.018 &&
        row.age >
          0.28
      ) {
        emit(
          particle.pos,
          false,
          1
        );
      }

      const surface =
        surfaceAt(
          particle.pos.x,
          particle.pos.z
        );

      /*
        Reabsorb the particle when it
        strikes the height-field water.
      */

      if (
        row.age >
          0.17 &&
        particle.pos.y <=
          surface + 0.025
      ) {
        particle.pos.y =
          surface + 0.02;

        particle.alive =
          false;

        emit(
          particle.pos,
          true,
          3
        );
      }

      if (
        particle.pos.x >
          X0 + LX + 4 ||
        particle.pos.y <
          -8
      ) {
        particle.alive =
          false;
      }
    }
  }

  while (
    rows.length &&
    (
      !rows[0].p.some(
        particle =>
          particle.alive
      ) ||
      rows[0].age >
        4.2
    )
  ) {
    rows.shift();
  }

  /*
    Additional spray from the oldest,
    leading edge of the sheet.
  */

  if (rows.length) {
    const oldest =
      rows[0];

    for (
      let k = 0;
      k < 3;
      k++
    ) {
      const n =
        Math.floor(
          Math.random() *
          LINE_N
        );

      const particle =
        oldest.p[n];

      if (
        particle &&
        particle.alive &&
        Math.random() <
          0.48
      ) {
        emit(
          particle.pos,
          false,
          1
        );
      }
    }
  }
}

// -----------------------------------------------------------------------------
// Low-poly surfboard
// -----------------------------------------------------------------------------

function makeBoard() {
  const group =
    new THREE.Group();

  const segments = 18;

  const length = 2.7;
  const width = 0.62;
  const thickness = 0.1;

  const vertices = [];
  const indices = [];

  for (
    let ring = 0;
    ring < 2;
    ring++
  ) {
    const y =
      ring
        ? thickness / 2
        : -thickness / 2;

    for (
      let i = 0;
      i < segments;
      i++
    ) {
      const angle =
        Math.PI *
        2 *
        i /
        segments;

      const z =
        Math.cos(angle) *
        length /
        2;

      const taper =
        Math.pow(
          Math.max(
            0,

            1 -
            Math.pow(
              Math.abs(z) /
              (length / 2),

              1.7
            )
          ),

          0.34
        );

      const x =
        Math.sin(angle) *
        width /
        2 *
        taper;

      const rocker =
        0.12 *
        Math.pow(
          Math.abs(z) /
          (length / 2),

          2.6
        );

      vertices.push(
        x,
        y + rocker,
        z
      );
    }
  }

  const topCenter =
    vertices.length / 3;

  vertices.push(
    0,
    thickness / 2 +
      0.015,
    0
  );

  const bottomCenter =
    vertices.length / 3;

  vertices.push(
    0,
    -thickness / 2,
    0
  );

  for (
    let i = 0;
    i < segments;
    i++
  ) {
    const next =
      (i + 1) %
      segments;

    indices.push(
      topCenter,
      segments + i,
      segments + next,

      bottomCenter,
      next,
      i,

      i,
      next,
      segments + i,

      next,
      segments + next,
      segments + i
    );
  }

  const geometry =
    new THREE.BufferGeometry();

  geometry.setAttribute(
    "position",

    new THREE.Float32BufferAttribute(
      vertices,
      3
    )
  );

  geometry.setIndex(
    indices
  );

  geometry.computeVertexNormals();

  const deck =
    new THREE.Mesh(
      geometry,

      new THREE.MeshStandardMaterial({
        color: 0xf1cd50,
        roughness: 0.55,
        flatShading: true
      })
    );

  deck.castShadow = true;

  group.add(deck);

  const stripe =
    new THREE.Mesh(
      new THREE.BoxGeometry(
        0.075,
        0.02,
        1.15
      ),

      new THREE.MeshStandardMaterial({
        color: 0x14495b,
        roughness: 0.7
      })
    );

  stripe.position.y =
    0.075;

  group.add(stripe);

  const fin =
    new THREE.Mesh(
      new THREE.ConeGeometry(
        0.12,
        0.4,
        3
      ),

      new THREE.MeshStandardMaterial({
        color: 0x14495b,
        flatShading: true
      })
    );

  fin.rotation.z =
    Math.PI;

  fin.position.set(
    0,
    -0.24,
    0.65
  );

  group.add(fin);

  return group;
}

const board =
  makeBoard();

scene.add(board);

const boardState = {
  x: -1,
  z: 6.3,
  y: 1,

  vx: 0,
  vz: -0.45,
  vy: 0
};

const flowTmp =
  new THREE.Vector2();

function resetBoard() {
  boardState.x =
    avgFrontX -
    2.1;

  boardState.z =
    6.1;

  boardState.vx = 0;
  boardState.vz = -0.55;
  boardState.vy = 0;

  boardState.y =
    surfaceAt(
      boardState.x,
      boardState.z
    ) +
    0.25;
}

function updateBoard(dt) {
  const flow =
    flowAt(
      boardState.x,
      boardState.z,
      flowTmp
    );

  const power =
    clamp(
      Math.hypot(
        flow.x,
        flow.y
      ) /
      3,

      0,
      1
    );

  /*
    The board is driven toward the local
    shallow-water velocity.

    It also receives a down-the-line push
    along the wave shoulder.
  */

  boardState.vx +=
    (
      flow.x -
      boardState.vx
    ) *
    (
      1 -
      Math.exp(
        -dt * 2.4
      )
    );

  boardState.vz +=
    (
      flow.y -
      1.05 *
      power -
      boardState.vz
    ) *
    (
      1 -
      Math.exp(
        -dt * 1.6
      )
    );

  boardState.x +=
    boardState.vx *
    dt;

  boardState.z +=
    boardState.vz *
    dt;

  const surface =
    surfaceAt(
      boardState.x,
      boardState.z
    );

  const spring =
    (
      surface +
      0.2 -
      boardState.y
    ) *
    20 -
    boardState.vy *
    6;

  boardState.vy +=
    spring *
    dt;

  boardState.y +=
    boardState.vy *
    dt;

  if (
    boardState.z <
      Z0 + 1 ||
    boardState.x >
      X0 + LX - 2 ||
    boardState.x <
      X0 + 2
  ) {
    resetBoard();
  }

  board.position.set(
    boardState.x,
    boardState.y,
    boardState.z
  );

  const epsilon =
    0.24;

  const slopeX =
    (
      surfaceAt(
        boardState.x +
          epsilon,

        boardState.z
      ) -
      surfaceAt(
        boardState.x -
          epsilon,

        boardState.z
      )
    ) /
    (2 * epsilon);

  const slopeZ =
    (
      surfaceAt(
        boardState.x,

        boardState.z +
          epsilon
      ) -
      surfaceAt(
        boardState.x,

        boardState.z -
          epsilon
      )
    ) /
    (2 * epsilon);

  board.rotation.order =
    "YXZ";

  board.rotation.y =
    Math.atan2(
      boardState.vx,

      Math.max(
        0.001,
        -boardState.vz
      )
    );

  board.rotation.x =
    -Math.atan(
      slopeZ
    ) +
    0.03 *
    Math.sin(
      simTime *
      4
    );

  board.rotation.z =
    Math.atan(
      slopeX
    ) *
    0.72;
}

// -----------------------------------------------------------------------------
// Reset, warm start and animation
// -----------------------------------------------------------------------------

function resetSimulation() {
  simTime = 0;

  rows.length = 0;

  spawnClock = 0;
  breakAge = 0;
  hadFront = false;

  sprayLife.fill(0);

  for (
    let i = 0;
    i < PARTICLES;
    i++
  ) {
    sprayPos[i * 3 + 1] =
      -999;
  }

  seedWave();

  /*
    Warm the shallow-water field so the
    initial swell is already reaching the
    reef when the page appears.
  */

  for (
    let i = 0;
    i < 145;
    i++
  ) {
    simTime +=
      0.012;

    swStep(
      0.012
    );

    detectFront(
      0.012
    );
  }

  resetBoard();
  updateGridMeshes();
  updatePatchGeometry();
}

resetSimulation();

document
  .querySelector("#pause")
  .onclick = () => {
    paused =
      !paused;

    document
      .querySelector("#pause")
      .textContent =
        paused
          ? "Resume"
          : "Pause";
  };

document
  .querySelector("#reset")
  .onclick =
    resetSimulation;

document
  .querySelector("#cameraBtn")
  .onclick = () => {
    cinematic =
      !cinematic;

    controls.enabled =
      !cinematic;

    document
      .querySelector("#cameraBtn")
      .textContent =
        cinematic
          ? "Free camera"
          : "Cinematic camera";
  };

let last =
  performance.now();

function animate(now) {
  requestAnimationFrame(
    animate
  );

  let dt =
    Math.min(
      0.033,

      (
        now -
        last
      ) /
      1000
    );

  last = now;

  if (paused) {
    dt = 0;
  }

  if (dt > 0) {
    /*
      Fixed substeps keep the shallow-water
      solve and the ballistic particle sheet
      stable.
    */

    const substeps = 2;

    const subDt =
      dt /
      substeps;

    for (
      let step = 0;
      step < substeps;
      step++
    ) {
      simTime +=
        subDt;

      swStep(
        subDt
      );

      detectFront(
        subDt
      );

      updateRows(
        subDt
      );

      updateSpray(
        subDt
      );

      updateBoard(
        subDt
      );
    }
  }

  frame++;

  updateGridMeshes();
  updatePatchGeometry();

  document
    .querySelector("#slopeS")
    .textContent =
      avgSlope.toFixed(2);

  document
    .querySelector("#rowsS")
    .textContent =
      String(
        rows.length
      );

  const validLinePoint =
    line.find(
      point =>
        point.valid
    );

  document
    .querySelector("#speedS")
    .textContent =
      (
        validLinePoint
          ? validLinePoint.speed
          : 0
      ).toFixed(1) +
      "m/s";

  document
    .querySelector("#sprayS")
    .textContent =
      String(
        activeSpray
      );

  if (cinematic) {
    const angle =
      simTime *
      0.12;

    camera.position.set(
      avgFrontX +
        8.5,

      4.2 +
        Math.sin(
          angle *
          0.6
        ) *
        0.45,

      11.5 +
        Math.sin(angle) *
        2.2
    );

    camera.lookAt(
      avgFrontX -
        0.2,

      1.55,

      0
    );
  } else {
    controls.update();
  }

  renderer.render(
    scene,
    camera
  );
}

requestAnimationFrame(
  animate
);

addEventListener(
  "resize",
  () => {
    camera.aspect =
      innerWidth /
      innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
      innerWidth,
      innerHeight
    );

    renderer.setPixelRatio(
      Math.min(
        devicePixelRatio,
        1.75
      )
    );
  }
);
</script>
</body>
