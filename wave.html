<!doctype html>
<html lang="en">

/>

<title>Curling Barrel Wave — Three.js</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #061923;
    font-family:
      Inter,

  }

    height: 100%;

  }

    display: grid;

    gap: 5px 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.11);
    padding-top: 8px;
    margin-top: 8px;
    font-size: 10px;
    color: #aacbd4;
  }

  .stats b {
    color: #fff;
  }

  .buttons {

  button {

  #tag {

</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
</head>

<body>
<div id="ui">
  <h1>CURLING BARREL WAVE</h1>

  <p class="desc">
    Finite-depth wave values plus a connected Lagrangian lip sheet.
    The rotational breaker field carries the lip over the crest,
    downward, and back toward the wave face.
  </p>

  <div class="row">
    <label>Wave height</label>
    <input
      id="height"
      type="range"
      min="2.4"
      max="7.5"
      step="0.1"
      value="5.2"
    />
    <output id="heightO"></output>
  </div>

  <div class="row">
    <label>Period</label>
    <input
      id="period"
      type="range"
      min="7"
      max="16"
      step="0.1"
      value="11.5"
    />
    <output id="periodO"></output>
  </div>

  <div class="row">
    <label>Reef depth</label>
    <input
      id="depth"
      type="range"
      min="4"
      max="10"
      step="0.1"
      value="6.8"
    />
    <output id="depthO"></output>
  </div>

  <div class="row">
    <label>Curl strength</label>
    <input
      id="curl"
      type="range"
      min="0.55"
      max="1.45"
      step="0.01"
      value="1.12"
    />
    <output id="curlO"></output>
  </div>

  <div class="row">
    <label>Lip thickness</label>
    <input
      id="thick"
      type="range"
      min="0.12"
      max="0.55"
      step="0.01"
      value="0.28"
    />
    <output id="thickO"></output>
  </div>

  <div class="stats">
    <span>Wavelength <b id="sL">—</b></span>
    <span>Phase speed <b id="sC">—</b></span>
    <span>Breaker ratio <b id="sR">—</b></span>
    <span>Sheet angle <b id="sA">—</b></span>
  </div>

  <div class="buttons">
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    <button id="cameraBtn">Cinematic camera</button>
  </div>
</div>

<div id="tag">
  Drag to orbit · pinch/scroll to zoom
</div>

<script type="module">
import * as THREE from "three";
import {
  OrbitControls
} from "three/addons/controls/OrbitControls.js";

const G = 9.81;
const TAU = Math.PI * 2;

const clamp = THREE.MathUtils.clamp;
const lerp = THREE.MathUtils.lerp;

const smoothstep = (a, b, x) => {
  const t = clamp(
    (x - a) / (b - a),
    0,
    1
  );

  return t * t * (3 - 2 * t);
};

const ui = {
  height:
    document.querySelector("#height"),

  period:
    document.querySelector("#period"),

  depth:
    document.querySelector("#depth"),

  curl:
    document.querySelector("#curl"),

  thick:
    document.querySelector("#thick")
};

const out = {
  height:
    document.querySelector("#heightO"),

  period:
    document.querySelector("#periodO"),

  depth:
    document.querySelector("#depthO"),

  curl:
    document.querySelector("#curlO"),

  thick:
    document.querySelector("#thickO")
};

function solveK(
  omega,
  waterDepth
) {
  let k = Math.max(
    omega * omega / G,
    omega /
      Math.sqrt(
        G * waterDepth
      )
  );

  for (
    let i = 0;
    i < 14;
    i++
  ) {
    const kh =
      k * waterDepth;

    const tanh =
      Math.tanh(kh);

    const sech2 =
      1 /
      (
        Math.cosh(kh) **
        2
      );

    const f =
      G *
      k *
      tanh -
      omega *
      omega;

    const df =
      G *
      (
        tanh +
        k *
        waterDepth *
        sech2
      );

    k = Math.max(
      1e-5,
      k - f / df
    );
  }

  return k;
}

function physics() {
  const H0 =
    +ui.height.value;

  const T =
    +ui.period.value;

  const waterDepth =
    +ui.depth.value;

  const omega =
    TAU / T;

  const k =
    solveK(
      omega,
      waterDepth
    );

  const wavelength =
    TAU / k;

  const phaseSpeed =
    omega / k;

  const H =
    Math.min(
      H0,
      0.78 *
      waterDepth
    );

  return {
    H0,
    H,
    T,
    h: waterDepth,
    omega,
    k,
    L: wavelength,
    c: phaseSpeed,
    ratio:
      H / waterDepth,

    curl:
      +ui.curl.value,

    thick:
      +ui.thick.value
  };
}

function readout(p) {
  out.height.textContent =
    (+ui.height.value)
      .toFixed(1) +
    "m";

  out.period.textContent =
    (+ui.period.value)
      .toFixed(1) +
    "s";

  out.depth.textContent =
    (+ui.depth.value)
      .toFixed(1) +
    "m";

  out.curl.textContent =
    (+ui.curl.value)
      .toFixed(2);

  out.thick.textContent =
    (+ui.thick.value)
      .toFixed(2) +
    "m";

  document
    .querySelector("#sL")
    .textContent =
      p.L.toFixed(1) +
      "m";

  document
    .querySelector("#sC")
    .textContent =
      p.c.toFixed(1) +
      "m/s";

  document
    .querySelector("#sR")
    .textContent =
      p.ratio.toFixed(2);
}

Object
  .values(ui)
  .forEach(element => {
    element.addEventListener(
      "input",
      () => readout(
        physics()
      )
    );
  });

// -----------------------------------------------------------------------------
// Renderer and camera
// -----------------------------------------------------------------------------

const renderer =
  new THREE.WebGLRenderer({
    antialias: true,
    powerPreference:
      "high-performance"
  });

renderer.setPixelRatio(
  Math.min(
    devicePixelRatio,
    1.75
  )
);

renderer.setSize(
  innerWidth,
  innerHeight
);

renderer.outputColorSpace =
  THREE.SRGBColorSpace;

renderer.toneMapping =
  THREE.ACESFilmicToneMapping;

renderer.toneMappingExposure =
  1.04;

renderer.shadowMap.enabled =
  true;

renderer.shadowMap.type =
  THREE.PCFSoftShadowMap;

document.body.appendChild(
  renderer.domElement
);

const scene =
  new THREE.Scene();

scene.background =
  new THREE.Color(
    0x79cfe1
  );

scene.fog =
  new THREE.FogExp2(
    0x79cbd9,
    0.014
  );

const camera =
  new THREE.PerspectiveCamera(
    47,
    innerWidth /
      innerHeight,
    0.1,
    180
  );

camera.position.set(
  12,
  6.1,
  14.5
);

const controls =
  new OrbitControls(
    camera,
    renderer.domElement
  );

controls.enableDamping = true;
controls.dampingFactor = 0.06;

controls.target.set(
  0.5,
  2.15,
  0
);

controls.minDistance = 6;
controls.maxDistance = 48;

controls.maxPolarAngle =
  Math.PI * 0.54;

controls.update();

// -----------------------------------------------------------------------------
// Lighting and sky
// -----------------------------------------------------------------------------

scene.add(
  new THREE.HemisphereLight(
    0xd9f8ff,
    0x173944,
    2.3
  )
);

const sun =
  new THREE.DirectionalLight(
    0xfff2d3,
    4.2
  );

sun.position.set(
  -8,
  15,
  10
);

sun.castShadow = true;

sun.shadow.mapSize.set(
  2048,
  2048
);

sun.shadow.camera.left = -28;
sun.shadow.camera.right = 28;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -12;

scene.add(sun);

const rim =
  new THREE.DirectionalLight(
    0x66dcff,
    1.2
  );

rim.position.set(
  12,
  6,
  -12
);

scene.add(rim);

const sky =
  new THREE.Mesh(
    new THREE.SphereGeometry(
      110,
      32,
      16
    ),

    new THREE.ShaderMaterial({
      side:
        THREE.BackSide,

      uniforms: {
        top: {
          value:
            new THREE.Color(
              0x0b587b
            )
        },

        bottom: {
          value:
            new THREE.Color(
              0xbceff2
            )
        }
      },

      vertexShader: `
        varying vec3 p;

        void main() {
          p = position;

          gl_Position =
            projectionMatrix *
            modelViewMatrix *
            vec4(
              position,
              1.0
            );
        }
      `,

      fragmentShader: `
        uniform vec3 top;
        uniform vec3 bottom;

        varying vec3 p;

        void main() {
          float h =
            clamp(
              normalize(p).y *
              0.5 +
              0.5,

              0.0,
              1.0
            );

          gl_FragColor =
            vec4(
              mix(
                bottom,
                top,
                pow(h, 0.74)
              ),

              1.0
            );
        }
      `
    })
  );

scene.add(sky);

// -----------------------------------------------------------------------------
// Background ocean
// -----------------------------------------------------------------------------

const OX = 96;
const OZ = 70;

const oceanGeometry =
  new THREE.PlaneGeometry(
    OX,
    OZ,
    110,
    70
  );

oceanGeometry.rotateX(
  -Math.PI / 2
);

const oceanBase =
  oceanGeometry
    .attributes
    .position
    .array
    .slice();

const ocean =
  new THREE.Mesh(
    oceanGeometry,

    new THREE.MeshPhysicalMaterial({
      color:
        0x118ca2,

      roughness:
        0.2,

      clearcoat:
        1,

      clearcoatRoughness:
        0.08,

      side:
        THREE.DoubleSide
    })
  );

ocean.position.y = -0.18;
ocean.receiveShadow = true;

scene.add(ocean);

const floor =
  new THREE.Mesh(
    new THREE.PlaneGeometry(
      95,
      70
    ),

    new THREE.MeshStandardMaterial({
      color:
        0x6c7f72,

      roughness:
        1
    })
  );

floor.rotation.x =
  -Math.PI / 2;

floor.position.y = -5.4;
floor.receiveShadow = true;

scene.add(floor);

// -----------------------------------------------------------------------------
// Broad open wave face
// -----------------------------------------------------------------------------

const FACE_X = 92;
const FACE_Z = 56;
const SPAN = 24;
const REAR = -15;

const facePositions =
  new Float32Array(
    FACE_X *
    FACE_Z *
    3
  );

const faceColors =
  new Float32Array(
    FACE_X *
    FACE_Z *
    3
  );

const faceIndices = [];

for (
  let z = 0;
  z < FACE_Z - 1;
  z++
) {
  for (
    let x = 0;
    x < FACE_X - 1;
    x++
  ) {
    const a =
      z * FACE_X + x;

    const b = a + 1;

    const c =
      (z + 1) *
      FACE_X +
      x;

    const d = c + 1;

    faceIndices.push(
      a,
      c,
      b,

      b,
      c,
      d
    );
  }
}

const faceGeometry =
  new THREE.BufferGeometry();

faceGeometry.setAttribute(
  "position",

  new THREE.BufferAttribute(
    facePositions,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

faceGeometry.setAttribute(
  "color",

  new THREE.BufferAttribute(
    faceColors,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

faceGeometry.setIndex(
  faceIndices
);

const faceMesh =
  new THREE.Mesh(
    faceGeometry,

    new THREE.MeshPhysicalMaterial({
      vertexColors:
        true,

      roughness:
        0.13,

      clearcoat:
        1,

      clearcoatRoughness:
        0.05,

      side:
        THREE.DoubleSide
    })
  );

faceMesh.castShadow = true;
faceMesh.receiveShadow = true;

scene.add(faceMesh);

const deepColor =
  new THREE.Color(
    0x075c72
  );

const faceColor =
  new THREE.Color(
    0x078fa2
  );

const topColor =
  new THREE.Color(
    0x35c7d2
  );

const tempColor =
  new THREE.Color();

function crestData(
  p,
  z,
  time
) {
  const span =
    0.82 +
    0.18 *
    Math.exp(
      -Math.pow(
        z / 8.5,
        4
      )
    );

  const H =
    p.H * span;

  const crestX =
    0.25 +
    0.12 *
    Math.sin(
      time * 0.35 +
      z * 0.09
    );

  const crestY =
    0.18 +
    H * 0.83;

  return {
    H,
    crestX,
    crestY
  };
}

function faceY(
  p,
  x,
  z,
  time
) {
  const data =
    crestData(
      p,
      z,
      time
    );

  const q =
    clamp(
      (
        data.crestX -
        x
      ) /
      (
        data.crestX -
        REAR
      ),

      0,
      1
    );

  const shape =
    Math.pow(
      Math.sin(
        q *
        Math.PI *
        0.5
      ),

      1.7
    );

  let y =
    data.crestY *
    shape;

  const orbital =
    0.055 *
    p.H *
    Math.sin(
      0.42 * x +
      0.15 * z -
      time * 0.72
    ) *
    Math.pow(
      shape,
      0.7
    );

  y += orbital;

  return y;
}

function updateFace(
  p,
  time
) {
  for (
    let zIndex = 0;
    zIndex < FACE_Z;
    zIndex++
  ) {
    const z =
      lerp(
        -SPAN / 2,
        SPAN / 2,

        zIndex /
        (FACE_Z - 1)
      );

    const data =
      crestData(
        p,
        z,
        time
      );

    for (
      let xIndex = 0;
      xIndex < FACE_X;
      xIndex++
    ) {
      const s =
        xIndex /
        (FACE_X - 1);

      const clustered =
        1 -
        Math.pow(
          1 - s,
          2.25
        );

      let x =
        lerp(
          REAR,
          data.crestX,
          clustered
        );

      const y =
        faceY(
          p,
          x,
          z,
          time
        );

      const lean =
        0.62 *
        p.curl *
        Math.pow(
          clamp(
            y /
            data.crestY,

            0,
            1
          ),

          5
        );

      x += lean;

      const offset =
        (
          zIndex *
          FACE_X +
          xIndex
        ) *
        3;

      facePositions[offset] =
        x;

      facePositions[offset + 1] =
        y;

      facePositions[offset + 2] =
        z +
        0.045 *
        Math.sin(
          z * 0.5 +
          x * 0.3 -
          time * 0.8
        );

      const heightRatio =
        clamp(
          y /
          data.crestY,

          0,
          1
        );

      tempColor
        .copy(deepColor)
        .lerp(
          faceColor,

          smoothstep(
            0.12,
            0.72,
            heightRatio
          )
        )
        .lerp(
          topColor,

          smoothstep(
            0.78,
            1,
            heightRatio
          )
        );

      faceColors[offset] =
        tempColor.r;

      faceColors[offset + 1] =
        tempColor.g;

      faceColors[offset + 2] =
        tempColor.b;
    }
  }

  faceGeometry
    .attributes
    .position
    .needsUpdate = true;

  faceGeometry
    .attributes
    .color
    .needsUpdate = true;

  if ((frame & 1) === 0) {
    faceGeometry.computeVertexNormals();
  }
}

// -----------------------------------------------------------------------------
// Curling lip
// -----------------------------------------------------------------------------

const LIP_Z = 46;
const MAX_ROWS = 46;
const LIP_LIFE = 1.95;
const SPAWN_INTERVAL = 0.045;

const lipRows = [];

let spawnClock = 0;

function spawnLipRow() {
  lipRows.push({
    age: 0
  });

  while (
    lipRows.length >
    MAX_ROWS
  ) {
    lipRows.shift();
  }
}

function lipPoint(
  p,
  age,
  z,
  time,
  target =
    new THREE.Vector3()
) {
  const data =
    crestData(
      p,
      z,
      time -
      age * 0.18
    );

  const span =
    Math.exp(
      -Math.pow(
        z / 10.5,
        6
      )
    );

  const progress =
    clamp(
      age /
      LIP_LIFE,

      0,
      1
    );

  const curl =
    p.curl *
    (
      0.72 +
      0.28 *
      span
    );

  const crest =
    new THREE.Vector2(
      data.crestX +
      0.54 * curl,

      data.crestY
    );

  const barrelCenter =
    new THREE.Vector2(
      data.crestX +
      2.15 * curl,

      data.crestY *
      0.47
    );

  const dx =
    crest.x -
    barrelCenter.x;

  const dy =
    crest.y -
    barrelCenter.y;

  const initialRadius =
    Math.hypot(
      dx,
      dy
    );

  const initialAngle =
    Math.atan2(
      dy,
      dx
    );

  /*
    The angle exceeds 180 degrees.

    This makes the lip move:
    crest -> overhead -> downward ->
    inward toward the wave face.
  */

  const totalTurn =
    (
      3.1 +
      0.62 * curl
    ) *
    Math.pow(
      progress,
      0.9
    );

  const angle =
    initialAngle -
    totalTurn;

  /*
    The shrinking radius creates a slight
    inward spiral instead of a perfect
    circular tube.
  */

  const radius =
    initialRadius *
    (
      1 -
      0.19 *
      progress -
      0.035 *
      progress *
      progress
    );

  const arcX =
    barrelCenter.x +
    radius *
    Math.cos(angle) +
    0.18 *
    progress *
    progress;

  const arcY =
    barrelCenter.y +
    radius *
    Math.sin(angle);

  /*
    Initial ballistic launch.

    The rotational path gradually takes
    over after the lip leaves the crest.
  */

  const launchX =
    crest.x +
    (
      2.05 +
      0.45 * curl
    ) *
    age;

  const launchY =
    crest.y +
    (
      1.1 +
      0.35 * curl
    ) *
    age -
    0.5 *
    G *
    0.62 *
    age *
    age;

  const vortexBlend =
    smoothstep(
      0.04,
      0.38,
      progress
    );

  let x =
    lerp(
      launchX,
      arcX,
      vortexBlend
    );

  let y =
    lerp(
      launchY,
      arcY,
      vortexBlend
    );

  /*
    The middle of the wave barrels hardest.
    The shoulders remain less curled.
  */

  const baseX =
    data.crestX +
    0.18;

  const baseY =
    data.crestY *
    0.97;

  x = lerp(
    baseX,
    x,
    span
  );

  y = lerp(
    baseY,
    y,
    span
  );

  target.set(
    x,
    y,

    z +
    0.06 *
    Math.sin(
      z * 0.55 +
      age * 2.1
    )
  );

  return target;
}

// -----------------------------------------------------------------------------
// Thick lip mesh
// -----------------------------------------------------------------------------

const VERTICES_PER_LAYER =
  MAX_ROWS *
  LIP_Z;

const lipPositions =
  new Float32Array(
    VERTICES_PER_LAYER *
    2 *
    3
  );

const lipColors =
  new Float32Array(
    VERTICES_PER_LAYER *
    2 *
    3
  );

const lipIndices =
  new Uint32Array(
    (
      MAX_ROWS - 1
    ) *
    (
      LIP_Z - 1
    ) *
    12 +
    (
      MAX_ROWS +
      LIP_Z
    ) *
    24
  );

const lipGeometry =
  new THREE.BufferGeometry();

lipGeometry.setAttribute(
  "position",

  new THREE.BufferAttribute(
    lipPositions,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

lipGeometry.setAttribute(
  "color",

  new THREE.BufferAttribute(
    lipColors,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

lipGeometry.setIndex(
  new THREE.BufferAttribute(
    lipIndices,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

const lipMesh =
  new THREE.Mesh(
    lipGeometry,

    new THREE.MeshPhysicalMaterial({
      vertexColors:
        true,

      roughness:
        0.1,

      clearcoat:
        1,

      clearcoatRoughness:
        0.04,

      side:
        THREE.DoubleSide
    })
  );

lipMesh.castShadow = true;
lipMesh.renderOrder = 2;

scene.add(lipMesh);

const upperLipColor =
  new THREE.Color(
    0x25b9c6
  );

const lipEdgeColor =
  new THREE.Color(
    0x74e9ed
  );

const lipUnderColor =
  new THREE.Color(
    0x033d4f
  );

const pointA =
  new THREE.Vector3();

const pointB =
  new THREE.Vector3();

const curveCenter =
  new THREE.Vector2();

function addTriangle(
  a,
  b,
  c,
  pointer
) {
  lipIndices[pointer++] = a;
  lipIndices[pointer++] = b;
  lipIndices[pointer++] = c;

  return pointer;
}

function addQuad(
  a,
  b,
  c,
  d,
  pointer,
  flip = false
) {
  if (!flip) {
    pointer =
      addTriangle(
        a,
        c,
        b,
        pointer
      );

    pointer =
      addTriangle(
        b,
        c,
        d,
        pointer
      );
  } else {
    pointer =
      addTriangle(
        a,
        b,
        c,
        pointer
      );

    pointer =
      addTriangle(
        b,
        d,
        c,
        pointer
      );
  }

  return pointer;
}

function updateLipGeometry(
  p,
  time
) {
  const rowCount =
    lipRows.length;

  for (
    let row = 0;
    row < MAX_ROWS;
    row++
  ) {
    for (
      let spanIndex = 0;
      spanIndex < LIP_Z;
      spanIndex++
    ) {
      const base =
        row *
        LIP_Z +
        spanIndex;

      const upperIndex =
        base;

      const lowerIndex =
        VERTICES_PER_LAYER +
        base;

      const upperOffset =
        upperIndex * 3;

      const lowerOffset =
        lowerIndex * 3;

      if (row < rowCount) {
        const z =
          lerp(
            -SPAN / 2,
            SPAN / 2,

            spanIndex /
            (LIP_Z - 1)
          );

        const age =
          lipRows[row].age;

        lipPoint(
          p,
          age,
          z,
          time,
          pointA
        );

        lipPoint(
          p,
          Math.min(
            LIP_LIFE,
            age + 0.025
          ),
          z,
          time,
          pointB
        );

        let tangentX =
          pointB.x -
          pointA.x;

        let tangentY =
          pointB.y -
          pointA.y;

        const tangentLength =
          Math.hypot(
            tangentX,
            tangentY
          ) || 1;

        tangentX /=
          tangentLength;

        tangentY /=
          tangentLength;

        let normalX =
          -tangentY;

        let normalY =
          tangentX;

        const data =
          crestData(
            p,
            z,
            time -
            age * 0.18
          );

        curveCenter.set(
          data.crestX +
          2.15 *
          p.curl,

          data.crestY *
          0.47
        );

        const toCenterX =
          curveCenter.x -
          pointA.x;

        const toCenterY =
          curveCenter.y -
          pointA.y;

        /*
          Force the lower lip surface to
          point inward toward the barrel.
        */

        if (
          normalX *
          toCenterX +
          normalY *
          toCenterY <
          0
        ) {
          normalX =
            -normalX;

          normalY =
            -normalY;
        }

        const thickness =
          p.thick *
          (
            0.75 +
            0.25 *
            Math.exp(
              -Math.pow(
                z / 10,
                4
              )
            )
          );

        lipPositions[upperOffset] =
          pointA.x;

        lipPositions[upperOffset + 1] =
          pointA.y;

        lipPositions[upperOffset + 2] =
          pointA.z;

        lipPositions[lowerOffset] =
          pointA.x +
          normalX *
          thickness;

        lipPositions[lowerOffset + 1] =
          pointA.y +
          normalY *
          thickness;

        lipPositions[lowerOffset + 2] =
          pointA.z;

        const ageRatio =
          clamp(
            age /
            LIP_LIFE,

            0,
            1
          );

        tempColor
          .copy(lipEdgeColor)
          .lerp(
            upperLipColor,
            ageRatio
          );

        lipColors[upperOffset] =
          tempColor.r;

        lipColors[upperOffset + 1] =
          tempColor.g;

        lipColors[upperOffset + 2] =
          tempColor.b;

        lipColors[lowerOffset] =
          lipUnderColor.r;

        lipColors[lowerOffset + 1] =
          lipUnderColor.g;

        lipColors[lowerOffset + 2] =
          lipUnderColor.b;
      } else {
        lipPositions[upperOffset + 1] =
          -999;

        lipPositions[lowerOffset + 1] =
          -999;
      }
    }
  }

  let pointer = 0;

  /*
    Connect adjacent emitted crest lines.
  */

  for (
    let row = 0;
    row < rowCount - 1;
    row++
  ) {
    for (
      let spanIndex = 0;
      spanIndex < LIP_Z - 1;
      spanIndex++
    ) {
      const a =
        row *
        LIP_Z +
        spanIndex;

      const b =
        a + 1;

      const c =
        (
          row + 1
        ) *
        LIP_Z +
        spanIndex;

      const d =
        c + 1;

      pointer =
        addQuad(
          a,
          b,
          c,
          d,
          pointer,
          false
        );

      pointer =
        addQuad(
          VERTICES_PER_LAYER + a,
          VERTICES_PER_LAYER + b,
          VERTICES_PER_LAYER + c,
          VERTICES_PER_LAYER + d,
          pointer,
          true
        );
    }
  }

  /*
    Close the leading and trailing edges
    of the thick lip.
  */

  if (rowCount) {
    for (
      const row of [
        0,
        rowCount - 1
      ]
    ) {
      for (
        let spanIndex = 0;
        spanIndex < LIP_Z - 1;
        spanIndex++
      ) {
        const a =
          row *
          LIP_Z +
          spanIndex;

        const b =
          a + 1;

        pointer =
          addQuad(
            a,
            b,
            VERTICES_PER_LAYER + a,
            VERTICES_PER_LAYER + b,
            pointer,
            row === 0
          );
      }
    }

    /*
      Close both spanwise ends.
    */

    for (
      let row = 0;
      row < rowCount - 1;
      row++
    ) {
      for (
        const spanIndex of [
          0,
          LIP_Z - 1
        ]
      ) {
        const a =
          row *
          LIP_Z +
          spanIndex;

        const b =
          (
            row + 1
          ) *
          LIP_Z +
          spanIndex;

        pointer =
          addQuad(
            a,
            VERTICES_PER_LAYER + a,
            b,
            VERTICES_PER_LAYER + b,
            pointer,
            spanIndex === 0
          );
      }
    }
  }

  lipIndices.fill(
    0,
    pointer
  );

  lipGeometry.setDrawRange(
    0,
    pointer
  );

  lipGeometry
    .attributes
    .position
    .needsUpdate = true;

  lipGeometry
    .attributes
    .color
    .needsUpdate = true;

  lipGeometry.index.needsUpdate =
    true;

  if ((frame & 1) === 0) {
    lipGeometry.computeVertexNormals();
  }

  const oldest =
    lipRows[0];

  if (oldest) {
    const angle =
      (
        3.1 +
        0.62 *
        p.curl
      ) *
      Math.pow(
        clamp(
          oldest.age /
          LIP_LIFE,

          0,
          1
        ),

        0.9
      ) *
      180 /
      Math.PI;

    document
      .querySelector("#sA")
      .textContent =
        angle.toFixed(0) +
        "°";
  }
}

// -----------------------------------------------------------------------------
// Foam and spray
// -----------------------------------------------------------------------------

const PARTICLE_COUNT =
  1250;

const sprayPositions =
  new Float32Array(
    PARTICLE_COUNT *
    3
  );

const sprayVelocities =
  new Float32Array(
    PARTICLE_COUNT *
    3
  );

const sprayLife =
  new Float32Array(
    PARTICLE_COUNT
  );

const spraySizes =
  new Float32Array(
    PARTICLE_COUNT
  );

for (
  let i = 0;
  i < PARTICLE_COUNT;
  i++
) {
  sprayPositions[
    i * 3 + 1
  ] = -999;
}

const sprayGeometry =
  new THREE.BufferGeometry();

sprayGeometry.setAttribute(
  "position",

  new THREE.BufferAttribute(
    sprayPositions,
    3
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

sprayGeometry.setAttribute(
  "life",

  new THREE.BufferAttribute(
    sprayLife,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

sprayGeometry.setAttribute(
  "size",

  new THREE.BufferAttribute(
    spraySizes,
    1
  ).setUsage(
    THREE.DynamicDrawUsage
  )
);

const sprayMaterial =
  new THREE.ShaderMaterial({
    transparent:
      true,

    depthWrite:
      false,

    vertexShader: `
      attribute float life;
      attribute float size;

      varying float vLife;

      void main() {
        vLife = life;

        vec4 mv =
          modelViewMatrix *
          vec4(
            position,
            1.0
          );

        gl_PointSize =
          size *
          (
            220.0 /
            max(
              1.0,
              -mv.z
            )
          );

        gl_Position =
          projectionMatrix *
          mv;
      }
    `,

    fragmentShader: `
      varying float vLife;

      void main() {
        vec2 q =
          gl_PointCoord -
          0.5;

        float d =
          dot(q, q);

        if (d > 0.25) {
          discard;
        }

        float alpha =
          smoothstep(
            0.25,
            0.02,
            d
          ) *
          smoothstep(
            0.0,
            0.13,
            vLife
          );

        gl_FragColor =
          vec4(
            mix(
              vec3(
                0.67,
                0.94,
                0.98
              ),

              vec3(1.0),

              vLife
            ),

            alpha * 0.9
          );
      }
    `
  });

const spray =
  new THREE.Points(
    sprayGeometry,
    sprayMaterial
  );

spray.frustumCulled =
  false;

spray.renderOrder = 4;

scene.add(spray);

let sprayCursor = 0;

function emitSpray(
  position,
  impact = false,
  count = 1
) {
  for (
    let particle = 0;
    particle < count;
    particle++
  ) {
    const index =
      sprayCursor++ %
      PARTICLE_COUNT;

    const offset =
      index * 3;

    sprayPositions[offset] =
      position.x +
      (
        Math.random() -
        0.5
      ) *
      0.18;

    sprayPositions[offset + 1] =
      position.y +
      (
        Math.random() -
        0.5
      ) *
      0.1;

    sprayPositions[offset + 2] =
      position.z +
      (
        Math.random() -
        0.5
      ) *
      0.28;

    sprayVelocities[offset] =
      (
        impact
          ? 0.3
          : 1
      ) +
      Math.random() *
      (
        impact
          ? 1.7
          : 2.1
      );

    sprayVelocities[offset + 1] =
      (
        impact
          ? 0.7
          : 1
      ) +
      Math.random() *
      (
        impact
          ? 2.3
          : 2.8
      );

    sprayVelocities[offset + 2] =
      (
        Math.random() -
        0.5
      ) *
      (
        impact
          ? 3.8
          : 2
      );

    sprayLife[index] =
      0.65 +
      Math.random() *
      0.35;

    spraySizes[index] =
      (
        impact
          ? 7
          : 4
      ) +
      Math.random() *
      (
        impact
          ? 10
          : 7
      );
  }
}

function updateSpray(
  dt,
  p,
  time
) {
  if (lipRows.length) {
    /*
      Spray along the outer lip.
    */

    for (
      let emission = 0;
      emission < 5;
      emission++
    ) {
      const row =
        lipRows[
          Math.floor(
            Math.random() *
            Math.min(
              lipRows.length,
              12
            )
          )
        ];

      const z =
        lerp(
          -8,
          8,
          Math.random()
        );

      lipPoint(
        p,
        row.age,
        z,
        time,
        pointA
      );

      if (
        Math.random() <
        0.7
      ) {
        emitSpray(
          pointA,
          false,
          1
        );
      }
    }

    /*
      Whitewater where the curled lip
      reaches the lower face.
    */

    const oldest =
      lipRows[0];

    if (
      oldest &&
      oldest.age >
      1.15
    ) {
      for (
        let emission = 0;
        emission < 8;
        emission++
      ) {
        const z =
          lerp(
            -9,
            9,
            Math.random()
          );

        lipPoint(
          p,
          oldest.age,
          z,
          time,
          pointA
        );

        if (pointA.y < 1) {
          emitSpray(
            pointA,
            true,
            1
          );
        }
      }
    }
  }

  for (
    let index = 0;
    index < PARTICLE_COUNT;
    index++
  ) {
    if (
      sprayLife[index] <=
      0
    ) {
      continue;
    }

    const offset =
      index * 3;

    sprayLife[index] -=
      dt *
      (
        0.36 +
        0.35 *
        (
          1 -
          sprayLife[index]
        )
      );

    sprayVelocities[offset + 1] -=
      G *
      0.33 *
      dt;

    sprayVelocities[offset] *=
      Math.pow(
        0.989,
        dt * 60
      );

    sprayVelocities[offset + 2] *=
      Math.pow(
        0.989,
        dt * 60
      );

    sprayPositions[offset] +=
      sprayVelocities[offset] *
      dt;

    sprayPositions[offset + 1] +=
      sprayVelocities[offset + 1] *
      dt;

    sprayPositions[offset + 2] +=
      sprayVelocities[offset + 2] *
      dt;

    if (
      sprayLife[index] <=
      0
    ) {
      sprayPositions[
        offset + 1
      ] = -999;
    }
  }

  sprayGeometry
    .attributes
    .position
    .needsUpdate = true;

  sprayGeometry
    .attributes
    .life
    .needsUpdate = true;

  sprayGeometry
    .attributes
    .size
    .needsUpdate = true;
}

// -----------------------------------------------------------------------------
// Low-poly surfboard
// -----------------------------------------------------------------------------

function makeBoard() {
  const group =
    new THREE.Group();

  const segments = 16;
  const length = 2.8;
  const width = 0.66;
  const thickness = 0.11;

  const vertices = [];
  const indices = [];

  for (
    let ring = 0;
    ring < 2;
    ring++
  ) {
    const y =
      ring
        ? thickness / 2
        : -thickness / 2;

    for (
      let segment = 0;
      segment < segments;
      segment++
    ) {
      const angle =
        TAU *
        segment /
        segments;

      const z =
        Math.cos(angle) *
        length /
        2;

      const taper =
        Math.pow(
          Math.max(
            0,

            1 -
            Math.pow(
              Math.abs(z) /
              (length / 2),

              1.7
            )
          ),

          0.34
        );

      const x =
        Math.sin(angle) *
        width /
        2 *
        taper;

      const rocker =
        0.12 *
        Math.pow(
          Math.abs(z) /
          (length / 2),

          2.5
        );

      vertices.push(
        x,
        y + rocker,
        z
      );
    }
  }

  const topCenter =
    vertices.length / 3;

  vertices.push(
    0,
    thickness / 2 +
    0.015,
    0
  );

  const bottomCenter =
    vertices.length / 3;

  vertices.push(
    0,
    -thickness / 2,
    0
  );

  for (
    let segment = 0;
    segment < segments;
    segment++
  ) {
    const next =
      (
        segment + 1
      ) %
      segments;

    indices.push(
      topCenter,
      segments + segment,
      segments + next,

      bottomCenter,
      next,
      segment,

      segment,
      next,
      segments + segment,

      next,
      segments + next,
      segments + segment
    );
  }

  const geometry =
    new THREE.BufferGeometry();

  geometry.setAttribute(
    "position",

    new THREE.Float32BufferAttribute(
      vertices,
      3
    )
  );

  geometry.setIndex(
    indices
  );

  geometry.computeVertexNormals();

  const deck =
    new THREE.Mesh(
      geometry,

      new THREE.MeshStandardMaterial({
        color:
          0xf0cf54,

        roughness:
          0.56,

        flatShading:
          true
      })
    );

  deck.castShadow = true;

  group.add(deck);

  const stripe =
    new THREE.Mesh(
      new THREE.BoxGeometry(
        0.07,
        0.02,
        1.15
      ),

      new THREE.MeshStandardMaterial({
        color:
          0x164d5f,

        roughness:
          0.7
      })
    );

  stripe.position.y =
    0.08;

  group.add(stripe);

  return group;
}

const board =
  makeBoard();

scene.add(board);

let boardZ = -7.5;

function updateBoard(
  dt,
  p,
  time
) {
  boardZ +=
    dt *
    (
      1.1 +
      1.5 *
      clamp(
        p.H / 6,
        0,
        1
      )
    );

  if (boardZ > 8.5) {
    boardZ = -8.5;
  }

  const data =
    crestData(
      p,
      boardZ,
      time
    );

  const x =
    data.crestX -
    4;

  const y =
    faceY(
      p,
      x,
      boardZ,
      time
    ) +
    0.23;

  const epsilon =
    0.2;

  const slopeX =
    (
      faceY(
        p,
        x + epsilon,
        boardZ,
        time
      ) -
      faceY(
        p,
        x - epsilon,
        boardZ,
        time
      )
    ) /
    (
      2 *
      epsilon
    );

  const slopeZ =
    (
      faceY(
        p,
        x,
        boardZ + epsilon,
        time
      ) -
      faceY(
        p,
        x,
        boardZ - epsilon,
        time
      )
    ) /
    (
      2 *
      epsilon
    );

  board.position.set(
    x,
    y,
    boardZ
  );

  board.rotation.order =
    "YXZ";

  board.rotation.y =
    0.05;

  board.rotation.x =
    -Math.atan(
      slopeZ
    ) +
    0.025 *
    Math.sin(
      time * 4
    );

  board.rotation.z =
    Math.atan(
      slopeX
    ) *
    0.72;
}

// -----------------------------------------------------------------------------
// Animation
// -----------------------------------------------------------------------------

let paused = false;
let cinematic = false;

let simulationTime = 0;
let frame = 0;

let lastTime =
  performance.now();

function resetSimulation() {
  lipRows.length = 0;

  spawnClock = 0;
  simulationTime = 0;

  for (
    let i = 0;
    i < 18;
    i++
  ) {
    spawnLipRow();
  }

  for (
    let i = 0;
    i < lipRows.length;
    i++
  ) {
    lipRows[i].age =
      (
        lipRows.length -
        1 -
        i
      ) *
      SPAWN_INTERVAL;
  }

  boardZ = -7.5;
}

document
  .querySelector("#pause")
  .onclick = () => {
    paused =
      !paused;

    document
      .querySelector("#pause")
      .textContent =
        paused
          ? "Resume"
          : "Pause";
  };

document
  .querySelector("#reset")
  .onclick =
    resetSimulation;

document
  .querySelector("#cameraBtn")
  .onclick = () => {
    cinematic =
      !cinematic;

    controls.enabled =
      !cinematic;

    document
      .querySelector("#cameraBtn")
      .textContent =
        cinematic
          ? "Free camera"
          : "Cinematic camera";
  };

function animate(now) {
  requestAnimationFrame(
    animate
  );

  let dt =
    Math.min(
      0.033,

      (
        now -
        lastTime
      ) /
      1000
    );

  lastTime = now;

  if (paused) {
    dt = 0;
  }

  const p =
    physics();

  readout(p);

  if (dt > 0) {
    simulationTime +=
      dt;

    spawnClock +=
      dt;

    if (
      spawnClock >=
      SPAWN_INTERVAL
    ) {
      spawnClock -=
        SPAWN_INTERVAL;

      spawnLipRow();
    }

    for (
      const row of lipRows
    ) {
      row.age +=
        dt;
    }

    while (
      lipRows.length &&
      lipRows[0].age >
      LIP_LIFE
    ) {
      lipRows.shift();
    }

    updateSpray(
      dt,
      p,
      simulationTime
    );

    updateBoard(
      dt,
      p,
      simulationTime
    );
  }

  frame++;

  const oceanPositions =
    oceanGeometry
      .attributes
      .position
      .array;

  for (
    let i = 0;
    i <
    oceanGeometry
      .attributes
      .position
      .count;
    i++
  ) {
    const x =
      oceanBase[i * 3];

    const z =
      oceanBase[
        i * 3 + 2
      ];

    oceanPositions[i * 3] =
      x;

    oceanPositions[
      i * 3 + 1
    ] =
      0.11 *
      Math.sin(
        0.2 * x +
        0.08 * z -
        simulationTime *
        0.8
      ) +
      0.05 *
      Math.sin(
        -0.11 * x +
        0.27 * z -
        simulationTime *
        1.3
      );

    oceanPositions[
      i * 3 + 2
    ] =
      z;
  }

  oceanGeometry
    .attributes
    .position
    .needsUpdate = true;

  if ((frame & 3) === 0) {
    oceanGeometry.computeVertexNormals();
  }

  updateFace(
    p,
    simulationTime
  );

  updateLipGeometry(
    p,
    simulationTime
  );

  if (cinematic) {
    const angle =
      simulationTime *
      0.12;

    camera.position.set(
      11.5 +
      Math.sin(angle) *
      1.5,

      5.5 +
      0.25 *
      Math.sin(
        angle * 0.7
      ),

      13.5 +
      Math.cos(angle) *
      1.5
    );

    camera.lookAt(
      0.8,
      2.2,
      0
    );
  } else {
    controls.update();
  }

  renderer.render(
    scene,
    camera
  );
}

resetSimulation();
readout(physics());

requestAnimationFrame(
  animate
);

addEventListener(
  "resize",
  () => {
    camera.aspect =
      innerWidth /
      innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
      innerWidth,
      innerHeight
    );

    renderer.setPixelRatio(
      Math.min(
        devicePixelRatio,
        1.75
      )
    );
  }
);
</script>
</body>
</html>
