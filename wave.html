<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Reef Barrel Wave Simulator</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #07131c;
    font-family: Inter, system-ui, sans-serif;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #ui {
    position: fixed;
    left: 14px;
    top: 14px;
    z-index: 10;
    width: min(330px, calc(100vw - 28px));
    padding: 13px 14px 12px;
    color: #eefaff;
    background: rgba(4, 18, 27, .77);
    border: 1px solid rgba(180, 235, 255, .22);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 35px rgba(0,0,0,.28);
    user-select: none;
  }

  #ui h1 {
    margin: 0 0 5px;
    font-size: 16px;
    letter-spacing: .02em;
  }

  #ui p {
    margin: 0 0 10px;
    font-size: 11px;
    line-height: 1.35;
    color: #b9d5df;
  }

  .row {
    display: grid;
    grid-template-columns: 105px 1fr 42px;
    gap: 8px;
    align-items: center;
    margin: 7px 0;
    font-size: 11px;
  }

  input[type="range"] {
    width: 100%;
  }

  output {
    text-align: right;
    color: #d9fbff;
    font-variant-numeric: tabular-nums;
  }

  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  button {
    border: 1px solid rgba(180,235,255,.25);
    border-radius: 8px;
    padding: 7px 10px;
    color: #eefaff;
    background: rgba(67, 151, 180, .2);
    cursor: pointer;
    font-size: 11px;
  }

  button:hover {
    background: rgba(67, 151, 180, .35);
  }

  #status {
    position: fixed;
    right: 12px;
    bottom: 10px;
    color: rgba(235,250,255,.72);
    font: 11px/1.3 monospace;
    text-align: right;
    pointer-events: none;
  }

  @media (max-width: 680px) {
    #ui {
      width: 270px;
      padding: 10px 11px;
    }

    #ui p {
      display: none;
    }

    .row {
      grid-template-columns: 88px 1fr 38px;
      margin: 5px 0;
    }
  }
</style>
</head>

<body>
<div id="ui">
  <h1>Reef Barrel Wave Simulator</h1>
  <p>
    Bathymetry-driven shoaling, a folding parametric lip,
    whitewater particles, refractive water shading,
    and a buoyant low-poly surfboard.
  </p>

  <div class="row">
    <label for="height">Wave height</label>
    <input id="height" type="range" min="1.2" max="4.6" step="0.1" value="3.2">
    <output id="heightOut">3.2</output>
  </div>

  <div class="row">
    <label for="period">Period</label>
    <input id="period" type="range" min="4.2" max="9.0" step="0.1" value="6.2">
    <output id="periodOut">6.2</output>
  </div>

  <div class="row">
    <label for="reef">Reef height</label>
    <input id="reef" type="range" min="0.55" max="1.25" step="0.01" value="1.00">
    <output id="reefOut">1.00</output>
  </div>

  <div class="row">
    <label for="curl">Lip curl</label>
    <input id="curl" type="range" min="0.2" max="1.5" step="0.01" value="1.00">
    <output id="curlOut">1.00</output>
  </div>

  <div class="row">
    <label for="spray">Whitewater</label>
    <input id="spray" type="range" min="0" max="1.8" step="0.05" value="1.00">
    <output id="sprayOut">1.00</output>
  </div>

  <div class="buttons">
    <button id="pause">Pause</button>
    <button id="resetBoard">Reset board</button>
    <button id="camera">Barrel camera</button>
  </div>
</div>

<div id="status"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const clamp = THREE.MathUtils.clamp;
const lerp = THREE.MathUtils.lerp;

const smoothstep = (a, b, x) => {
  const t = clamp((x - a) / (b - a), 0, 1);
  return t * t * (3 - 2 * t);
};

const wrapPi = a => Math.atan2(Math.sin(a), Math.cos(a));

const params = {
  waveHeight: 3.2,
  period: 6.2,
  reefHeight: 1.0,
  curl: 1.0,
  spray: 1.0
};

let paused = false;
let simTime = 0;
let frameCount = 0;
let fpsTime = performance.now();
let fps = 0;

/* -------------------------------------------------------
   Scene, renderer and camera
------------------------------------------------------- */

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x8bb4c1, 0.009);

const camera = new THREE.PerspectiveCamera(
  50,
  innerWidth / innerHeight,
  0.1,
  220
);

camera.position.set(30, 15, 34);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: 'high-performance'
});

renderer.setPixelRatio(Math.min(devicePixelRatio, 1.75));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, -3);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 7;
controls.maxDistance = 95;

/* -------------------------------------------------------
   Lighting and sky
------------------------------------------------------- */

scene.add(
  new THREE.HemisphereLight(
    0xbfe8ff,
    0x34452d,
    1.7
  )
);

const sun = new THREE.DirectionalLight(0xfff3d2, 3.6);
sun.position.set(-28, 42, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -48;
sun.shadow.camera.right = 48;
sun.shadow.camera.top = 48;
sun.shadow.camera.bottom = -48;
sun.shadow.camera.near = 2;
sun.shadow.camera.far = 100;
scene.add(sun);

const sky = new THREE.Mesh(
  new THREE.SphereGeometry(120, 32, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,

    uniforms: {
      sunDir: {
        value: sun.position.clone().normalize()
      }
    },

    vertexShader: `
      varying vec3 vDir;

      void main() {
        vDir = normalize(position);

        gl_Position =
          projectionMatrix *
          modelViewMatrix *
          vec4(position, 1.0);
      }
    `,

    fragmentShader: `
      varying vec3 vDir;
      uniform vec3 sunDir;

      void main() {
        float h = clamp(vDir.y * 0.5 + 0.5, 0.0, 1.0);

        vec3 horizon = vec3(0.66, 0.84, 0.90);
        vec3 zenith = vec3(0.08, 0.27, 0.43);

        vec3 col = mix(
          horizon,
          zenith,
          pow(h, 0.65)
        );

        float sunGlow =
          pow(max(dot(vDir, sunDir), 0.0), 550.0) *
          7.0;

        col += vec3(1.0, 0.72, 0.42) * sunGlow;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  })
);

scene.add(sky);

/* -------------------------------------------------------
   Reef and beach bathymetry
------------------------------------------------------- */

function channelFactor(x) {
  return Math.exp(
    -Math.pow((x + 15.0) / 6.5, 2)
  );
}

function reefProfile(z) {
  return Math.exp(
    -Math.pow((z + 2.5) / 10.0, 4)
  );
}

function bedHeight(x, z) {
  const channel = channelFactor(x);

  const alongshore =
    0.92 +
    0.10 * Math.sin(x * 0.16) +
    0.06 * Math.sin(x * 0.37 + 1.1);

  const reef =
    8.05 *
    params.reefHeight *
    reefProfile(z) *
    alongshore *
    (1.0 - 0.58 * channel);

  const shoreT = smoothstep(17.0, 35.0, -z);

  const beach =
    12.2 *
    Math.pow(shoreT, 1.42);

  const outerRidge =
    0.75 *
    Math.exp(-Math.pow((z - 14.0) / 8.0, 2)) *
    (0.5 + 0.5 * Math.sin(x * 0.12 + 2.0));

  return -10.2 + reef + beach + outerRidge;
}

/* -------------------------------------------------------
   Wave model

   The base mesh is indexed by fixed parameters x and z,
   but the returned world position moves in all 3 axes.

   The large negative worldZ displacement at the lip makes
   the z mapping reverse locally, allowing an overhang.
------------------------------------------------------- */

function localWaveData(x, z, time, out) {
  const bottom = bedHeight(x, z);
  const depth = Math.max(0.04, -bottom);

  const channel = channelFactor(x);
  const reef = reefProfile(z);
  const shoreward = smoothstep(7.0, 28.0, -z);

  const wavelength = params.period * 3.15;
  const k = Math.PI * 2 / wavelength;
  const omega = Math.PI * 2 / params.period;

  /*
    Approximate shallow-water travel-time delay.

    Shallower parts of the reef delay the wave more than
    the deeper channel, creating a bent crest line.
  */
  const delay =
    reef * (1.9 - 0.75 * channel) +
    shoreward * (0.7 - 0.22 * channel) +
    0.13 * Math.sin(x * 0.11);

  const theta = k * z + omega * time + delay;
  const phi = wrapPi(theta);

  /*
    Approximate shoaling: wave amplitude grows as depth
    decreases, until post-breaking dissipation takes over.
  */
  const shoal = clamp(
    Math.pow(8.5 / Math.max(depth, 0.6), 0.22),
    0.88,
    1.78
  );

  const postBreakDecay = lerp(
    1.0,
    0.32,
    shoreward
  );

  const amplitude =
    params.waveHeight *
    0.5 *
    shoal *
    postBreakDecay;

  const slope = Math.abs(
    (
      bedHeight(x, z + 0.45) -
      bedHeight(x, z - 0.45)
    ) / 0.9
  );

  /*
    Simplified breaker detector using local wave-height
    to depth ratio plus seabed slope.
  */
  const heightDepthRatio =
    (2.0 * amplitude) /
    Math.max(depth, 0.25);

  const breaking =
    smoothstep(
      0.48,
      0.82,
      heightDepthRatio + slope * 0.24
    ) *
    smoothstep(0.08, 0.48, reef);

  const crest =
    Math.exp(
      -(phi * phi) /
      (2.0 * 0.52 * 0.52)
    );

  const front =
    Math.exp(
      -Math.pow((phi + 0.34) / 0.42, 2)
    );

  const lip =
    breaking *
    Math.exp(
      -Math.pow((phi + 0.20) / 0.25, 2)
    );

  const curlBand =
    breaking *
    Math.exp(
      -Math.pow((phi + 0.55) / 0.52, 2)
    );

  /*
    Vertically skewed wave profile.
  */
  let y =
    amplitude *
    (
      Math.cos(phi) +
      0.18 * Math.cos(2.0 * phi) -
      0.06 * Math.cos(3.0 * phi)
    );

  y += amplitude * breaking * 0.32 * crest;

  /*
    Pull the lip down as it moves forward.
  */
  y -=
    amplitude *
    params.curl *
    (
      0.90 * lip +
      0.22 * curlBand
    );

  /*
    Horizontal orbital motion.

    This is the important part that Evan's heightfield
    cannot do. The lip displacement can become strong
    enough for the parameter-to-world mapping to reverse.
  */
  const orbitalQ = 0.48 + 0.95 * breaking;

  let worldZ =
    z +
    orbitalQ *
    amplitude *
    Math.sin(phi);

  worldZ -=
    amplitude *
    params.curl *
    (
      1.82 * lip +
      0.48 * curlBand
    );

  const chop =
    (
      0.055 +
      0.035 * reef
    ) *
    Math.sin(
      x * 0.72 +
      z * 0.34 +
      time * 2.1
    ) +
    0.035 *
    Math.sin(
      -x * 0.41 +
      z * 0.86 +
      time * 2.8
    );

  y += chop * (1.0 - 0.55 * breaking);

  /*
    Blend the water onto the beach in extremely
    shallow areas.
  */
  const wet = smoothstep(0.02, 0.55, depth);
  y = lerp(bottom + 0.018, y, wet);

  out.x =
    x +
    0.10 *
    amplitude *
    Math.sin(phi + x * 0.05) *
    (1.0 - channel * 0.4);

  out.y = y;
  out.z = worldZ;
  out.depth = depth;
  out.breaking = breaking;
  out.crest = crest;
  out.front = front;

  out.foam = clamp(
    breaking *
    (
      0.40 * crest +
      0.92 * front +
      0.55 * lip
    ) +
    shoreward * 0.13,
    0,
    1
  );

  out.flowZ =
    -0.25 -
    breaking * crest * 4.2 -
    shoreward * 0.35;

  out.bottom = bottom;

  return out;
}

/* -------------------------------------------------------
   Seabed mesh
------------------------------------------------------- */

const bedGeo = new THREE.PlaneGeometry(
  82,
  82,
  150,
  150
);

bedGeo.rotateX(-Math.PI / 2);

const bedPositions = bedGeo.attributes.position;

function updateBedGeometry() {
  for (let i = 0; i < bedPositions.count; i++) {
    const x = bedPositions.getX(i);
    const z = bedPositions.getZ(i);

    bedPositions.setY(
      i,
      bedHeight(x, z)
    );
  }

  bedPositions.needsUpdate = true;

  bedGeo.computeVertexNormals();
  bedGeo.attributes.normal.needsUpdate = true;
}

updateBedGeometry();

const bedMat = new THREE.ShaderMaterial({
  uniforms: {
    time: {
      value: 0
    }
  },

  vertexShader: `
    varying vec3 vWorld;
    varying vec3 vNormal;

    void main() {
      vec4 worldPosition =
        modelMatrix *
        vec4(position, 1.0);

      vWorld = worldPosition.xyz;
      vNormal =
        normalize(
          mat3(modelMatrix) *
          normal
        );

      gl_Position =
        projectionMatrix *
        viewMatrix *
        worldPosition;
    }
  `,

  fragmentShader: `
    varying vec3 vWorld;
    varying vec3 vNormal;

    uniform float time;

    float hash(vec2 p) {
      return fract(
        sin(
          dot(
            p,
            vec2(127.1, 311.7)
          )
        ) *
        43758.5453
      );
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);

      f = f * f * (3.0 - 2.0 * f);

      return mix(
        mix(
          hash(i),
          hash(i + vec2(1.0, 0.0)),
          f.x
        ),
        mix(
          hash(i + vec2(0.0, 1.0)),
          hash(i + vec2(1.0, 1.0)),
          f.x
        ),
        f.y
      );
    }

    void main() {
      float wet =
        1.0 -
        smoothstep(
          -0.05,
          0.35,
          vWorld.y
        );

      float n =
        noise(vWorld.xz * 0.22) * 0.55 +
        noise(vWorld.xz * 0.72) * 0.25;

      vec3 sand = mix(
        vec3(0.42, 0.36, 0.22),
        vec3(0.72, 0.64, 0.40),
        n
      );

      vec3 reef = mix(
        vec3(0.12, 0.18, 0.12),
        vec3(0.31, 0.29, 0.17),
        n
      );

      float reefMix =
        smoothstep(
          -7.5,
          -1.0,
          vWorld.y
        ) *
        wet;

      vec3 col = mix(
        sand,
        reef,
        reefMix * 0.72
      );

      vec3 dry = mix(
        vec3(0.46, 0.40, 0.24),
        vec3(0.68, 0.58, 0.34),
        n
      );

      col = mix(
        dry,
        col,
        wet
      );

      /*
        Approximate animated caustic pattern.
      */
      float c1 =
        sin(
          vWorld.x * 1.75 +
          sin(
            vWorld.z * 1.15 +
            time * 0.45
          )
        );

      float c2 =
        sin(
          vWorld.z * 1.62 -
          sin(
            vWorld.x * 1.05 -
            time * 0.38
          )
        );

      float caustic =
        pow(
          max(0.0, c1 * c2),
          2.0
        );

      col +=
        vec3(0.20, 0.29, 0.19) *
        caustic *
        wet *
        smoothstep(
          -9.0,
          -0.4,
          vWorld.y
        );

      float light =
        0.50 +
        0.50 *
        max(
          dot(
            normalize(vNormal),
            normalize(
              vec3(-0.4, 1.0, 0.25)
            )
          ),
          0.0
        );

      gl_FragColor =
        vec4(
          col * light,
          1.0
        );
    }
  `
});

const bedMesh = new THREE.Mesh(
  bedGeo,
  bedMat
);

bedMesh.receiveShadow = true;
scene.add(bedMesh);

/* -------------------------------------------------------
   Dynamic water mesh
------------------------------------------------------- */

const NX = 104;
const NZ = 150;

const WATER_WIDTH = 80;
const WATER_DEPTH = 80;

const vertexCount = NX * NZ;

const positions =
  new Float32Array(vertexCount * 3);

const normals =
  new Float32Array(vertexCount * 3);

const foamAttribute =
  new Float32Array(vertexCount);

const depthAttribute =
  new Float32Array(vertexCount);

const baseX =
  new Float32Array(vertexCount);

const baseZ =
  new Float32Array(vertexCount);

const indices = [];

for (let j = 0; j < NZ; j++) {
  const z =
    -WATER_DEPTH / 2 +
    WATER_DEPTH *
    j /
    (NZ - 1);

  for (let i = 0; i < NX; i++) {
    const x =
      -WATER_WIDTH / 2 +
      WATER_WIDTH *
      i /
      (NX - 1);

    const vertex = j * NX + i;

    baseX[vertex] = x;
    baseZ[vertex] = z;
  }
}

for (let j = 0; j < NZ - 1; j++) {
  for (let i = 0; i < NX - 1; i++) {
    const a = j * NX + i;
    const b = a + 1;
    const c = a + NX;
    const d = c + 1;

    indices.push(
      a, c, b,
      b, c, d
    );
  }
}

const waterGeo =
  new THREE.BufferGeometry();

waterGeo.setAttribute(
  'position',
  new THREE.BufferAttribute(
    positions,
    3
  )
);

waterGeo.setAttribute(
  'normal',
  new THREE.BufferAttribute(
    normals,
    3
  )
);

waterGeo.setAttribute(
  'aFoam',
  new THREE.BufferAttribute(
    foamAttribute,
    1
  )
);

waterGeo.setAttribute(
  'aDepth',
  new THREE.BufferAttribute(
    depthAttribute,
    1
  )
);

waterGeo.setIndex(indices);

/* -------------------------------------------------------
   Refraction render target
------------------------------------------------------- */

const refractionTarget =
  new THREE.WebGLRenderTarget(
    Math.max(
      1,
      Math.floor(
        innerWidth *
        renderer.getPixelRatio()
      )
    ),
    Math.max(
      1,
      Math.floor(
        innerHeight *
        renderer.getPixelRatio()
      )
    ),
    {
      depthBuffer: true,
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter
    }
  );

refractionTarget.texture.colorSpace =
  THREE.SRGBColorSpace;

/* -------------------------------------------------------
   Water shader
------------------------------------------------------- */

const waterMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  transparent: true,
  depthWrite: true,

  uniforms: {
    time: {
      value: 0
    },

    sunDir: {
      value: sun.position.clone().normalize()
    },

    tScene: {
      value: refractionTarget.texture
    },

    resolution: {
      value: new THREE.Vector2(
        innerWidth *
        renderer.getPixelRatio(),

        innerHeight *
        renderer.getPixelRatio()
      )
    }
  },

  vertexShader: `
    attribute float aFoam;
    attribute float aDepth;

    varying vec3 vWorld;
    varying vec3 vNormal;
    varying float vFoam;
    varying float vDepth;

    void main() {
      vec4 worldPosition =
        modelMatrix *
        vec4(position, 1.0);

      vWorld = worldPosition.xyz;

      vNormal =
        normalize(
          mat3(modelMatrix) *
          normal
        );

      vFoam = aFoam;
      vDepth = aDepth;

      gl_Position =
        projectionMatrix *
        viewMatrix *
        worldPosition;
    }
  `,

  fragmentShader: `
    varying vec3 vWorld;
    varying vec3 vNormal;
    varying float vFoam;
    varying float vDepth;

    uniform float time;
    uniform vec3 sunDir;
    uniform sampler2D tScene;
    uniform vec2 resolution;

    vec3 skyColor(vec3 direction) {
      float h =
        clamp(
          direction.y * 0.5 + 0.5,
          0.0,
          1.0
        );

      return mix(
        vec3(0.64, 0.82, 0.88),
        vec3(0.06, 0.25, 0.42),
        pow(h, 0.72)
      );
    }

    void main() {
      if (vDepth < 0.025) {
        discard;
      }

      vec3 N = normalize(vNormal);

      if (!gl_FrontFacing) {
        N = -N;
      }

      vec3 V =
        normalize(
          cameraPosition -
          vWorld
        );

      vec3 R =
        reflect(-V, N);

      float fresnel =
        0.025 +
        0.975 *
        pow(
          1.0 -
          max(dot(N, V), 0.0),
          5.0
        );

      float shallow =
        1.0 -
        smoothstep(
          1.0,
          8.5,
          vDepth
        );

      vec3 bottomTint =
        mix(
          vec3(0.015, 0.22, 0.26),
          vec3(0.22, 0.53, 0.49),
          shallow
        );

      float c =
        sin(
          vWorld.x * 1.45 +
          sin(
            vWorld.z * 0.9 +
            time * 0.5
          )
        ) *
        sin(
          vWorld.z * 1.7 -
          sin(
            vWorld.x * 0.8 -
            time * 0.42
          )
        );

      float caustic =
        pow(
          max(c, 0.0),
          2.0
        );

      float absorb =
        exp(-vDepth * 0.11);

      /*
        Screen-space refraction.

        The scene without water is rendered into tScene.
        The water normal distorts the screen coordinate.
      */
      vec2 screenUV =
        gl_FragCoord.xy /
        resolution;

      vec2 bend =
        vec2(N.x, N.z) *
        mix(
          0.010,
          0.026,
          shallow
        ) *
        (1.0 - 0.55 * fresnel);

      vec3 sceneThroughWater =
        texture2D(
          tScene,
          clamp(
            screenUV + bend,
            vec2(0.002),
            vec2(0.998)
          )
        ).rgb;

      vec3 refracted =
        mix(
          sceneThroughWater,
          bottomTint,
          0.30 +
          0.34 *
          (1.0 - absorb)
        );

      refracted +=
        vec3(0.08, 0.20, 0.13) *
        caustic *
        shallow;

      refracted =
        mix(
          vec3(0.01, 0.11, 0.17),
          refracted,
          absorb
        );

      vec3 reflected =
        skyColor(R);

      float spec =
        pow(
          max(
            dot(
              reflect(-sunDir, N),
              -V
            ),
            0.0
          ),
          260.0
        );

      vec3 col =
        mix(
          refracted,
          reflected,
          fresnel
        );

      col +=
        vec3(1.0, 0.86, 0.62) *
        spec *
        2.5;

      float foamNoise =
        0.72 +
        0.28 *
        sin(
          vWorld.x * 3.2 +
          vWorld.z * 2.1 +
          time * 4.0
        );

      float foam =
        smoothstep(
          0.22,
          0.82,
          vFoam * foamNoise
        );

      col =
        mix(
          col,
          vec3(0.88, 0.97, 1.0),
          foam
        );

      float alpha =
        mix(
          0.90,
          0.985,
          clamp(
            fresnel + foam,
            0.0,
            1.0
          )
        );

      gl_FragColor =
        vec4(col, alpha);
    }
  `
});

/* -------------------------------------------------------
   Update water positions and normals
------------------------------------------------------- */

const sample = {
  x: 0,
  y: 0,
  z: 0,
  depth: 0,
  breaking: 0,
  crest: 0,
  front: 0,
  foam: 0,
  flowZ: 0,
  bottom: 0
};

function updateWater(time) {
  for (let vertex = 0; vertex < vertexCount; vertex++) {
    localWaveData(
      baseX[vertex],
      baseZ[vertex],
      time,
      sample
    );

    const p = vertex * 3;

    positions[p] = sample.x;
    positions[p + 1] = sample.y;
    positions[p + 2] = sample.z;

    foamAttribute[vertex] = sample.foam;
    depthAttribute[vertex] = sample.depth;
  }

  /*
    Recompute normals using the actual deformed positions.

    This remains valid after the mesh folds because it is
    no longer deriving normals from only a height value.
  */
  for (let j = 0; j < NZ; j++) {
    const jm = Math.max(j - 1, 0);
    const jp = Math.min(j + 1, NZ - 1);

    for (let i = 0; i < NX; i++) {
      const im = Math.max(i - 1, 0);
      const ip = Math.min(i + 1, NX - 1);

      const vertex = j * NX + i;

      const left =
        (j * NX + im) * 3;

      const right =
        (j * NX + ip) * 3;

      const down =
        (jm * NX + i) * 3;

      const upIndex =
        (jp * NX + i) * 3;

      const tx0 =
        positions[right] -
        positions[left];

      const tx1 =
        positions[right + 1] -
        positions[left + 1];

      const tx2 =
        positions[right + 2] -
        positions[left + 2];

      const tz0 =
        positions[upIndex] -
        positions[down];

      const tz1 =
        positions[upIndex + 1] -
        positions[down + 1];

      const tz2 =
        positions[upIndex + 2] -
        positions[down + 2];

      let nx =
        tz1 * tx2 -
        tz2 * tx1;

      let ny =
        tz2 * tx0 -
        tz0 * tx2;

      let nz =
        tz0 * tx1 -
        tz1 * tx0;

      const inverseLength =
        1 /
        Math.max(
          0.000001,
          Math.hypot(nx, ny, nz)
        );

      nx *= inverseLength;
      ny *= inverseLength;
      nz *= inverseLength;

      if (ny < 0) {
        nx = -nx;
        ny = -ny;
        nz = -nz;
      }

      const normalIndex =
        vertex * 3;

      normals[normalIndex] = nx;
      normals[normalIndex + 1] = ny;
      normals[normalIndex + 2] = nz;
    }
  }

  waterGeo.attributes.position.needsUpdate = true;
  waterGeo.attributes.normal.needsUpdate = true;
  waterGeo.attributes.aFoam.needsUpdate = true;
  waterGeo.attributes.aDepth.needsUpdate = true;
}

const MAX_PARTICLES = 5200;

const particlePositions =
  new Float32Array(
    MAX_PARTICLES * 3
  );

const particleColors =
  new Float32Array(
    MAX_PARTICLES * 3
  );

const particleVelocities =
  Array.from(
    { length: MAX_PARTICLES },
    () => new THREE.Vector3()
  );

const particleLife =
  new Float32Array(MAX_PARTICLES);

const particleMaxLife =
  new Float32Array(MAX_PARTICLES);

const particleType =
  new Uint8Array(MAX_PARTICLES);

let particleCursor = 0;

for (let i = 0; i < MAX_PARTICLES; i++) {
  particlePositions[i * 3 + 1] = -100;
}

const particleGeo =
  new THREE.BufferGeometry();

particleGeo.setAttribute(
  'position',
  new THREE.BufferAttribute(

);

particleGeo.setAttribute(

    particleColors,
    3
  )
);

const particleMat =
  new THREE.PointsMaterial({
    size: 0.19,
    sizeAttenuation: true,
    vertexColors: true,
    transparent: true,
    opacity: 0.88,

  });

function spawnParticle(
  x,
  y,
  z,
  velocityX,
  velocityY,
  velocityZ,
  life,
  type = 0
) {
  const index =
    particleCursor++ %
    MAX_PARTICLES;

  const p = index * 3;

  particlePositions[p] = x;
  particlePositions[p + 1] = y;
  particlePositions[p + 2] = z;

  particleVelocities[index].set(
    velocityX,
    velocityY,
    velocityZ
  );

  particleLife[index] = life;
  particleMaxLife[index] = life;
  particleType[index] = type;

  if (type === 0) {
    particleColors[p] = 0.88;
    particleColors[p + 1] = 0.97;
    particleColors[p + 2] = 1.0;
  } else {
    particleColors[p] = 0.72;
    particleColors[p + 1] = 0.90;
    particleColors[p + 2] = 0.94;
  }
}

const spawnSample = {
  x: 0,
  y: 0,
  z: 0,
  depth: 0,
  breaking: 0,
  crest: 0,
  front: 0,
  foam: 0,
  flowZ: 0,
  bottom: 0
};

function spawnWhitewater(deltaTime, time) {
  const attempts =
    Math.floor(
      42 *
      params.spray *
      deltaTime *
      60
    );

  for (let attempt = 0; attempt < attempts; attempt++) {
    const x =
      THREE.MathUtils.randFloat(
        -31,
        31
      );

    const z =
      THREE.MathUtils.randFloat(
        -15,
        9
      );

    localWaveData(
      x,
      z,
      time,
      spawnSample
    );

    const probability =
      spawnSample.breaking *
      spawnSample.crest *
      0.34 *
      params.spray;

    if (Math.random() < probability) {
      const airborneSpray =
        Math.random() < 0.66;

      const breakerStrength =
        spawnSample.breaking;

      spawnParticle(
        spawnSample.x +
        THREE.MathUtils.randFloatSpread(0.45),

        spawnSample.y +
        THREE.MathUtils.randFloat(0, 0.22),

        spawnSample.z +
        THREE.MathUtils.randFloatSpread(0.35),

        THREE.MathUtils.randFloatSpread(1.25),

        airborneSpray
          ? THREE.MathUtils.randFloat(1.1, 3.5) *
            breakerStrength
          : THREE.MathUtils.randFloat(0.15, 0.65),

        airborneSpray
          ? THREE.MathUtils.randFloat(-4.6, -1.4) *
            breakerStrength
          : THREE.MathUtils.randFloat(-1.7, -0.35),

        airborneSpray
          ? THREE.MathUtils.randFloat(0.7, 1.8)
          : THREE.MathUtils.randFloat(1.8, 4.0),

        airborneSpray ? 0 : 1
      );
    }
  }
}

function updateParticles(deltaTime) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (particleLife[i] <= 0) {
      continue;
    }

    particleLife[i] -= deltaTime;

    const p = i * 3;

    if (particleLife[i] <= 0) {
      particlePositions[p + 1] = -100;
      continue;
    }

    const velocity =
      particleVelocities[i];

    if (particleType[i] === 0) {
      velocity.y -=
        5.6 *
        deltaTime;

      velocity.multiplyScalar(
        Math.exp(
          -0.42 *
          deltaTime
        )
      );
    } else {
      velocity.y -=
        0.25 *
        deltaTime;

      velocity.multiplyScalar(
        Math.exp(
          -1.15 *
          deltaTime
        )
      );
    }

    particlePositions[p] +=
      velocity.x *
      deltaTime;

    particlePositions[p + 1] +=
      velocity.y *
      deltaTime;

    particlePositions[p + 2] +=
      velocity.z *
      deltaTime;

    const fade = clamp(
      particleLife[i] /
      particleMaxLife[i],
      0,
      1
    );

    particleColors[p] =
      lerp(
        0.42,
        0.93,
        fade
      );

    particleColors[p + 1] =
      lerp(
        0.66,
        0.98,
        fade
      );

    particleColors[p + 2] =
      lerp(
        0.72,
        1.0,
        fade
      );
  }

  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.color.needsUpdate = true;
}

   Low-poly surfboard
------------------------------------------------------- */

function createBoardGeometry() {
  const segments = 18;
  const vertices = [];
  const boardIndices = [];

  for (let layer = 0; layer < 2; layer++) {
    const y =
      layer === 0
        ? 0.09
        : -0.07;

    for (let i = 0; i <= segments; i++) {
      const t =
        i /
        segments;

      const z =
        (t - 0.5) *
        3.7;

      const width =
        0.58 *
        Math.pow(
          Math.max(
            0,
            Math.sin(Math.PI * t)
          ),
          0.52
        ) *
        (
          1.0 -
          0.10 *
          Math.max(
            0,
            (t - 0.68) / 0.32
          )
        );

      vertices.push(
        -width, y, z,
        width, y, z
      );
    }
  }

  const row =
    (segments + 1) * 2;

  for (let i = 0; i < segments; i++) {
    const a = i * 2;
    const b = a + 1;
    const c = a + 2;
    const d = a + 3;

    boardIndices.push(
      a, c, b,
      b, c, d
    );

    const A = row + a;
    const B = row + b;
    const C = row + c;
    const D = row + d;

    boardIndices.push(
      A, B, C,
      B, D, C
    );
  }

  for (let i = 0; i <= segments; i++) {
    const a = i * 2;
    const b = a + 1;

    const A = row + a;
    const B = row + b;

    if (i < segments) {
      const c = a + 2;
      const d = b + 2;

      const C = A + 2;
      const D = B + 2;

      boardIndices.push(
        a, A, c,
        A, C, c,

        b, d, B,
        d, D, B
      );
    }
  }

  boardIndices.push(
    0,
    1,
    row,

    1,
    row + 1,
    row
  );

  const end = segments * 2;

  boardIndices.push(
    end,
    row + end,
    end + 1,

    end + 1,
    row + end,
    row + end + 1
  );

  const geometry =
    new THREE.BufferGeometry();

  geometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(
      vertices,
      3
    )
  );

  geometry.setIndex(boardIndices);
  geometry.computeVertexNormals();

  return geometry;
}

   Surfboard dynamics
------------------------------------------------------- */

const boardState = {
  x: 13.0,
  z: -2.5,
  velocityX: 0,
  velocityZ: -0.2
};

const boardSample = {
  x: 0,
  y: 0,
  z: 0,
  depth: 0,
  breaking: 0,
  crest: 0,
  front: 0,
  foam: 0,
  flowZ: 0,
  bottom: 0
};

const sampleXPositive = {
  x: 0,
  y: 0,
  z: 0
};

const sampleXNegative = {
  x: 0,
  y: 0,
  z: 0
};

const sampleZPositive = {
  x: 0,
  y: 0,
  z: 0
};

const sampleZNegative = {
  x: 0,
  y: 0,
  z: 0
};

const boardTargetPosition =
  new THREE.Vector3();

const boardTargetQuaternion =
  new THREE.Quaternion();

const tangentX =
  new THREE.Vector3();

const tangentZ =
  new THREE.Vector3();

const boardUp =
  new THREE.Vector3();

const boardRight =
  new THREE.Vector3();

const boardBasis =
  new THREE.Matrix4();

function resetBoard() {
  boardState.x = 13.0;
  boardState.z = -2.5;
  boardState.velocityX = 0;
  boardState.velocityZ = -0.12;

  localWaveData(
    boardState.x,
    boardState.z,
    simTime,
    boardSample
  );

  board.position.set(
    boardSample.x,
    boardSample.y + 0.22,
    boardSample.z
  );
}

resetBoard();

function updateBoard(deltaTime, time) {
  localWaveData(
    boardState.x,
    boardState.z,
    time,
    boardSample
  );

  const breakerPush =
    boardSample.breaking *
    boardSample.crest;

  /*
    Shoreward flow acceleration and drag.
  */
  boardState.velocityZ +=
    (
      boardSample.flowZ *
      (
        0.18 +
        breakerPush * 1.15
      ) -
      boardState.velocityZ * 0.48
    ) *
    deltaTime;

  boardState.velocityX +=
    (
      Math.sin(
        time * 0.48 +
        boardState.z * 0.08
      ) *
      0.22 +

      Math.sin(
        boardState.x * 0.11
      ) *
      0.08 -

      boardState.velocityX *
      0.65
    ) *
    deltaTime;

  boardState.x +=
    boardState.velocityX *
    deltaTime;

  boardState.z +=
    boardState.velocityZ *
    deltaTime;

  boardState.x = clamp(
    boardState.x,
    -31,
    31
  );

  if (
    boardState.z < -27 ||
    boardSample.depth < 0.13
  ) {
    resetBoard();
  }

  /*
    Sample the water around the board to estimate two
    surface tangents and an orientation normal.
  */
  localWaveData(
    boardState.x,
    boardState.z,
    time,
    boardSample
  );

  const epsilon = 0.18;

  localWaveData(
    boardState.x + epsilon,
    boardState.z,
    time,
    sampleXPositive
  );

  localWaveData(
    boardState.x - epsilon,
    boardState.z,
    time,
    sampleXNegative
  );

  localWaveData(
    boardState.x,
    boardState.z + epsilon,
    time,
    sampleZPositive
  );

  localWaveData(
    boardState.x,
    boardState.z - epsilon,
    time,
    sampleZNegative
  );

  tangentX.set(
    sampleXPositive.x -
    sampleXNegative.x,

    sampleXPositive.y -
    sampleXNegative.y,

    sampleXPositive.z -
    sampleXNegative.z
  ).normalize();

  /*
    Local +Z on the board points shoreward.
  */
  tangentZ.set(
    sampleZNegative.x -
    sampleZPositive.x,

    sampleZNegative.y -
    sampleZPositive.y,

    sampleZNegative.z -
    sampleZPositive.z
  ).normalize();

  boardUp
    .crossVectors(
      tangentZ,
      tangentX
    )
    .normalize();

  if (boardUp.y < 0) {
    boardUp.negate();
  }

  boardRight
    .crossVectors(
      boardUp,
      tangentZ
    )
    .normalize();

  tangentZ
    .crossVectors(
      boardRight,
      boardUp
    )
    .normalize();

  boardBasis.makeBasis(
    boardRight,
    boardUp,
    tangentZ
  );

  boardTargetQuaternion
    .setFromRotationMatrix(
      boardBasis
    );

  boardTargetPosition.set(
    boardSample.x,
    boardSample.y + 0.20,
    boardSample.z
  );

  board.position.lerp(
    boardTargetPosition,
    1 -
    Math.exp(
      -8 *
      deltaTime
    )
  );

  board.quaternion.slerp(
    boardTargetQuaternion,
    1 -
    Math.exp(
      -5 *
      deltaTime
    )
  );

  board.rotation.z +=
    Math.sin(time * 2.1) *
    0.0015;
}

  const element =
    document.getElementById(id);

  const output =

  element.addEventListener(
    'input',
    update

  update();

      devicePixelRatio,

/* -------------------------------------------------------
   Animation
------------------------------------------------------- */

const clock =
  new THREE.Clock();

const status =
  document.getElementById('status');

updateWater(0);

function animate() {
  requestAnimationFrame(animate);

  const rawDeltaTime =
    Math.min(
      clock.getDelta(),
      0.035
    );

  const deltaTime =
    paused
      ? 0
      : rawDeltaTime;

  if (!paused) {
    simTime += deltaTime;
  }

  updateWater(simTime);

  if (!paused) {
    spawnWhitewater(
      deltaTime,
      simTime
    );

    updateParticles(
      deltaTime
    );

    updateBoard(
      deltaTime,
      simTime
    );
  }

  bedMat.uniforms.time.value =
    simTime;

  waterMat.uniforms.time.value =
    simTime;

  controls.update();

  /*
    First render the scene without water. This image is
    sampled and distorted by the water shader.

    Board and particles are omitted from the refraction
    pass because they sit on or above the surface.
  */
  waterMesh.visible = false;
  particlePoints.visible = false;
  board.visible = false;

  renderer.setRenderTarget(
    refractionTarget
  );

  renderer.render(
    scene,
    camera
  );

  renderer.setRenderTarget(null);

  waterMesh.visible = true;
  particlePoints.visible = true;
  board.visible = true;

  renderer.render(
    scene,
    camera
  );

  frameCount++;

  const now =
    performance.now();

  if (now - fpsTime > 500) {
    fps =
      Math.round(
        frameCount *
        1000 /
        (now - fpsTime)
      );

    frameCount = 0;
    fpsTime = now;
  }

  status.textContent =
    `${fps} fps\n` +
    `${renderer.info.render.triangles.toLocaleString()} triangles`;
}

animate();
</script>
</body>
</html>
